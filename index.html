  {topic:"晚唐·延祚原因（政治）",q:"宣宗一朝短暫中興、平息牛李黨爭並限制宦官、乘吐蕃內亂收復河湟，史稱？",options:["元和中興","大中暫治","永貞內禪","甘露之變"],answer:1,explain:"宣宗平牛李黨爭、限宦官專權、乘吐蕃內亂收復河湟，使西北邊疆安寧，史稱「大中暫治」，有助延續唐祚。"},
  {topic:"晚唐·延祚原因（政治）",q:"憲宗「元和中興」削藩成功，主要因為他改用甚麼策略？",options:["先強後弱、同時並進","全面和議、放任藩鎮","先弱後強、逐個擊破","盡撤藩鎮、改設郡縣"],answer:2,explain:"憲宗總結德宗削藩失敗的經驗，改用「先弱後強、逐個擊破」之策，使全國藩鎮名義上服從中央，連河北三鎮亦順服。"},
  {topic:"晚唐·延祚原因（政治）",q:"「宦官得勢全靠皇帝支持，縱能操控廢立，卻不能代唐為天子，更會協助皇帝解決政權危機」。這說明宦官對唐室？",options:["只會加速唐亡、毫無延祚作用","能直接取代唐室稱帝","與唐室存亡無關","亦有「延祚」的一面：宦官依附皇權、無意亦無力取代唐室"],answer:3,explain:"宦官權力來自皇權、不能代唐稱帝，又會助皇帝解危（如涇原兵變得神策軍護德宗），故宦官對唐室亦有延祚的一面。"},
  {topic:"晚唐·延祚原因（政治）",q:"同樣是「藩鎮」，既被視為導致唐衰亡，又被視為唐室延祚之由。最能解釋此「雙向」現象的是？",options:["跋扈藩鎮致亂，但藩鎮互相牽制又使無強藩獨大，故唐弱而不亡；及至強藩打破均勢，唐遂亡","藩鎮對唐只有害而無益","藩鎮對唐只有益而無害","藩鎮與唐室存亡毫無關係"],answer:0,explain:"藩鎮割據致亂，但其互相牽制使無強藩獨大、唐室得以苟存（弱而不亡）；黃巢亂後強藩打破均勢，唐遂亡，故藩鎮對唐有雙向作用。"},
  {topic:"晚唐·延祚原因（政治）",q:"下列關於「藩鎮互相牽制有助延祚」的說法，哪些正確？\n(1) 藩鎮間的均勢早在黃巢之亂前已被朱溫打破\n(2) 河朔割據型雖跋扈，卻無取代中央的實力\n(3) 中原防遏型制衡跋扈藩鎮、邊疆禦邊型抵禦外族\n(4) 藩鎮內部經常內訌、互相攻伐而自削實力",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——朱溫、李克用等強藩是黃巢之亂後才崛起、打破均勢，並非亂前。"},
  {topic:"晚唐·延祚原因（政治）",q:"下列關於唐室「兩次中興」的說法，哪些正確？\n(1) 憲宗「元和中興」削藩、使藩鎮名義服從中央\n(2) 兩次中興均發生於安史之亂以前\n(3) 宣宗「大中暫治」平黨爭、限宦官\n(4) 兩次中興短暫紓解藩鎮、宦官、朋黨、外族等問題",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——元和中興（憲宗）與大中暫治（宣宗）皆在安史之亂之後，並非之前。"},
  {topic:"晚唐·延祚原因（政治）",q:"下列關於「藩鎮互相牽制有助延祚」的說法，哪些正確？\n(1) 顧炎武謂「弱唐而不亡，諸候維之也」\n(2) 跋扈藩鎮並無取代中央的實力\n(3) 君主往往因勢利導、以藩制藩\n(4) 黃巢亂後強藩崛起、藩鎮均勢更趨穩固",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——黃巢亂後朱溫、李克用等強藩崛起、打破藩鎮均勢，唐遂亡，並非均勢更趨穩固。"},
  {topic:"晚唐·延祚原因（政治）",q:"下列關於「元和中興」的說法，哪些正確？\n(1) 元和年間，河北三鎮始終拒不奉朝命\n(2) 憲宗重用杜黃裳、李吉甫等主戰大臣\n(3) 總結德宗削藩失敗的經驗\n(4) 改用「先弱後強、逐個擊破」之策削藩",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——元和中興時「五十年不沾皇化」的河北三鎮亦願順服中央，並非始終拒命。"},
  {topic:"晚唐·延祚原因（政治）",q:"下列關於「大中暫治」的說法，哪些正確？\n(1) 為宣宗一朝的短暫中興\n(2) 「大中暫治」與「元和中興」均在黃巢之亂以後出現\n(3) 平息牛李黨爭、限制宦官專權\n(4) 乘吐蕃內亂收復河湟、西北邊疆安寧",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——兩次中興皆在黃巢之亂之前；黃巢亂後唐已名存實亡。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"安史亂後唐室最重要的經濟支柱，是哪一地區透過大運河上繳的財賦？",options:["關中地區","河北地區","東南（江淮）地區","河西地區"],answer:2,explain:"經濟重心南移後，東南財源型藩鎮多由「儒帥」出掌、服從中央，透過大運河把賦稅交到中央，成為唐室經濟支柱。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"代宗時大力整頓漕運、疏通運河、改革鹽法的理財名臣是？",options:["楊炎","李吉甫","杜黃裳","劉晏"],answer:3,explain:"代宗時劉晏整頓漕運、疏通運河使南糧北運，又改革鹽法使政府歲得鹽利四十萬緡，穩定唐室財政收入。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"德宗時採納宰相楊炎建議、以「量出為入、按資產定稅額、用錢繳稅」為原則推行的稅制是？",options:["兩稅制","租庸調制","一條鞭法","攤丁入畝"],answer:0,explain:"安史亂後租庸調制崩壞、收入銳減，德宗納楊炎議行兩稅制：收夏秋兩稅、量出為入、按資產定稅、用錢繳稅，穩定稅收。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"安史亂後西北陸上絲路受阻，唐室在廣州、泉州、杭州等地設置、管理對外貿易與徵收關稅的是？",options:["節度使","市舶使","採訪使","度支使"],answer:1,explain:"西北陸路絲路受回紇、吐蕃所阻，廣州往阿拉伯海路成主要通商路；唐設市舶使管對外貿易、徵關稅，市舶之利成重要財源。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"唐代規定平民出家為僧須領取憑證、藉此向出家者徵稅以增收入，該憑證稱為？",options:["告身","魚符","度牒","國子監牒"],answer:2,explain:"唐代佛教盛行，平民出家須領「度牒」方可為僧，朝廷藉發給度牒徵稅，增加國家財入、有助延續唐祚。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"唐室針對北方回紇、西方吐蕃所採取、藉賞賜通婚互市爭取回紇以抵禦吐蕃的政策是？",options:["聯吐抗回","遠交近攻","閉關自守","聯回抗吐"],answer:3,explain:"唐採「聯回抗吐」：以賞賜、通婚、互市爭取回紇為外援、全力抵禦吐蕃；宣宗時更收復河湟，使唐終不為回紇吐蕃所亡。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"安史亂後西北陸上絲路受回紇、吐蕃所阻，這對唐室對外貿易格局的影響是？",options:["海上貿易（廣州往阿拉伯）轉趨重要，故設市舶使管理以補國用","對外貿易完全斷絕","陸路貿易更為興盛","唐室從此閉關鎖國"],answer:0,explain:"陸路受阻後，廣州往阿拉伯的海上交通成為東西方主要通商路，唐遂設市舶使管理海貿、徵關稅，以市舶之利補國用。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"莊園（含寺院）對唐末社會的穩定作用，主要在於？",options:["莊園鼓動佃農造反","佃農依附莊園可減輕賦役負擔、並獲農具苗種與賑濟，有助穩定民生","莊園加重佃農賦役","莊園專事兼併、毫無救濟"],answer:1,explain:"佃農依附莊園可免向政府納稅服役、負擔減輕，莊園與寺院又提供農具苗種、贈醫施藥等救濟，有助穩定民生、維持統治。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"綜合而言，兩稅制、專賣、市舶使、度牒等措施對唐室的共同作用是？",options:["削減國家收入、加速唐亡","只利地方藩鎮","有效提升財政收入、滿足國用，延長唐的國祚","與唐室存亡無關"],answer:2,explain:"兩稅、專賣、市舶、度牒等措施皆有效提升唐室財政收入、滿足國用，是安史亂後唐祚得以延續百多年的重要經濟原因。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"下列關於唐室「整頓經濟」以延祚的措施，哪些正確？\n(1) 代宗時劉晏整頓漕運、疏通運河，南糧得以北運\n(2) 肅宗、代宗推行鹽、鐵、酒、茶專賣\n(3) 「度牒」由地方藩鎮發給，收益歸節度使所有\n(4) 藉發給「度牒」向出家者徵稅以增收入",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——度牒由朝廷發給、收益歸國家以增財入，並非由藩鎮發給、歸節度使。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"下列關於「南方經濟支援」有助延祚的說法，哪些正確？\n(1) 張巡、許遠死守睢陽保全江南、為經濟重心南移創造條件\n(2) 東南藩鎮多由「儒帥」出掌、願服從中央\n(3) 東南財源型透過大運河把賦稅交到中央\n(4) 黃巢亂後江淮殘破，唐室卻因而財源更充裕",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——黃巢亂後江淮遭嚴重破壞、唐室失去賦稅命脈而隨之滅亡，並非因而財源更充裕。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"下列關於唐室延祚的「經濟、外交、社會」原因，哪些正確？\n(1) 市舶使設於長安、洛陽兩京以管理貿易\n(2) 行兩稅制、設市舶使，提升財政收入\n(3) 推行專賣與度牒制度、增加國家財入\n(4) 採「聯回抗吐」外交、宣宗時收復河湟",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——市舶使設於廣州、泉州、杭州等沿海港口管理海上貿易，並非兩京。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"下列關於唐室延祚「經濟措施」的說法，哪些正確？\n(1) 德宗行兩稅制、簡化稅制、量出為入\n(2) 劉晏整頓漕運、改革鹽法以增收入\n(3) 設市舶使管理海上貿易、徵收關稅\n(4) 藉發給度牒向出家者徵稅、增國家財入",options:["只有(2)、(3)及(4)","只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:2,explain:"四項皆正確：兩稅制、整頓漕運與專賣、市舶使、度牒等措施皆有效提升唐室財政收入，是延續唐祚的經濟原因。"},
  {topic:"晚唐·延祚原因（經濟外交社會）",q:"下列關於唐室延祚「外交與社會」原因的說法，哪些正確？\n(1) 採「聯回抗吐」、以賞賜通婚互市爭取回紇\n(2) 宣宗時收復河湟、暫解吐蕃威脅\n(3) 唐最終為回紇或吐蕃所滅亡\n(4) 莊園、寺院具社會救濟功能、有助穩定民生",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——唐對外政策得宜，最終並未被回紇或吐蕃所亡，並非為回紇吐蕃所滅。"},
  {topic:"三治世·君主與得位",q:"「開皇之治」「貞觀之治」「開元之治」分別是哪三位君主的治世？",options:["隋文帝、唐太宗、唐玄宗","隋煬帝、唐高祖、武則天","隋文帝、唐高宗、唐玄宗","北周武帝、唐太宗、唐肅宗"],answer:0,explain:"開皇之治為隋文帝（楊堅）、貞觀之治為唐太宗（李世民）、開元之治為唐玄宗（李隆基）的治世。"},
  {topic:"三治世·君主與得位",q:"開皇、貞觀、開元三個年號，按時間先後排列正確的是？",options:["貞觀→開皇→開元","開皇→貞觀→開元","開元→貞觀→開皇","開皇→開元→貞觀"],answer:1,explain:"開皇為隋文帝（隋）、貞觀為唐太宗、開元為唐玄宗的年號，三者按時序為開皇→貞觀→開元。"},
  {topic:"三治世·君主與得位",q:"三治世的君主中，「篡奪北周、代周建隋」而得位的是？",options:["唐太宗","唐玄宗","隋文帝","唐高祖"],answer:2,explain:"隋文帝輔政專權、代周稱帝建隋；唐太宗藉玄武門之變得位；唐玄宗平韋后、由睿宗傳位而即位。"},
  {topic:"三治世·君主與得位",q:"三治世的君主中，藉「玄武門之變」殺兄迫父而得位的是？",options:["隋文帝","唐玄宗","唐高祖","唐太宗"],answer:3,explain:"唐太宗發動玄武門之變、殺太子建成與齊王元吉、迫高祖禪位而得太子位，繼而即位改元貞觀。"},
  {topic:"三治世·君主與得位",q:"唐玄宗得以即位，主要因為他？",options:["平定韋后之亂、由睿宗傳位","篡奪北周","發動玄武門之變","廢唐自立"],answer:0,explain:"唐玄宗李隆基平定欲干政的韋后，睿宗繼而傳位予他，是為玄宗、改元開元；篡北周者為文帝、玄武門者為太宗。"},
  {topic:"三治世·君主與得位",q:"開元之治被形容為「貞觀之風，一朝復振」。這最能說明開元與貞觀的關係是？",options:["開元與貞觀毫無關係","開元上承貞觀餘緒、力圖重現貞觀治世的盛況","開元全面否定貞觀之政","貞觀承襲開元的制度"],answer:1,explain:"「貞觀之風一朝復振」指開元上承貞觀、重現其治世景象，反映兩個唐代盛世前後相承的關係。"},
  {topic:"三治世·君主與得位",q:"三治世之中，唯一不屬於唐朝、且為其餘兩者奠定制度基礎的是？",options:["貞觀之治","開元之治","開皇之治（隋）","三者皆屬唐朝"],answer:2,explain:"開皇之治屬隋朝，隋文帝所創三省六部、均田、租庸調、府兵、科舉雛形等為唐所沿用，奠定貞觀、開元的制度基礎。"},
  {topic:"三治世·君主與得位",q:"下列三治世按出現時間先後排列，何者正確？\n(甲) 貞觀之治\n(乙) 開皇之治\n(丙) 開元之治",options:["甲→乙→丙","丙→甲→乙","乙→丙→甲","乙→甲→丙"],answer:3,explain:"開皇之治（隋文帝）最早，繼為唐太宗貞觀之治，再為唐玄宗開元之治，故時序為乙→甲→丙。"},
  {topic:"三治世·君主與得位",q:"下列關於三治世君主得位方式的說法，哪些正確？\n(1) 隋文帝乘北周武帝死後、靜帝年幼之機輔政專權\n(2) 隋文帝代周稱帝、建立隋朝\n(3) 唐太宗藉玄武門之變得太子位、繼而即位\n(4) 唐玄宗平定韋后、由睿宗傳位而即位",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——楊堅是乘宣帝死後、靜帝年幼之機輔政，並非武帝死後。"},
  {topic:"三治世·君主與得位",q:"下列關於三治世君主與年號的配對，哪些正確？\n(1) 唐太宗李世民是唐高祖的嫡長子\n(2) 開皇之治——隋文帝楊堅\n(3) 貞觀之治——唐太宗李世民\n(4) 開元之治——唐玄宗李隆基",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——李世民是高祖次子；嫡長子是太子李建成。"},
  {topic:"三治世·君主與得位",q:"下列關於三治世時序與承襲的說法，哪些正確？\n(1) 時序為開皇→貞觀→開元\n(2) 貞觀之治在開皇之治之前出現\n(3) 隋文帝所創制度為唐所沿用\n(4) 開元「貞觀之風一朝復振」、上承貞觀",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——開皇之治（隋）在貞觀之治（唐太宗）之前，並非貞觀在開皇之前。"},
  {topic:"三治世·君主與得位",q:"下列關於三治世君主得位的說法，哪些正確？\n(1) 隋文帝輔政專權、代周稱帝\n(2) 唐太宗發動玄武門之變、殺兄迫父\n(3) 李淵起兵的根據地是隴西\n(4) 唐玄宗平定韋后、由睿宗傳位",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——李淵起兵於太原，並非隴西。"},
  {topic:"三治世·政治制度",q:"「三省六部制」的創立與演變，下列何者正確？",options:["隋文帝確立、唐太宗完善、玄宗一度恢復","唐太宗首創、隋文帝沿用","武則天首創、玄宗廢除","唐玄宗首創、隋文帝完善"],answer:0,explain:"三省六部制由隋文帝確立，唐太宗加以完善（並設政事堂），武后時遭破壞，玄宗即位後又恢復三省權力。"},
  {topic:"三治世·政治制度",q:"唐太宗為提高三省決策效率而增設、供三省長官合議的機關是？",options:["集賢院","政事堂","弘文館","採訪使"],answer:1,explain:"唐太宗設政事堂供三省長官合議、行多相合議；玄宗則恢復被武后破壞的三省權力、限宰相三人。"},
  {topic:"三治世·政治制度",q:"武則天時三省制遭破壞、詔令多不經三省，其後恢復三省原有權力的是哪位治世君主？",options:["隋文帝","唐太宗","唐玄宗","唐高祖"],answer:2,explain:"武后詔令不經三省、三省制遭破壞；玄宗即位後恢復三省權力，使政令重歸中書草擬、門下審議。"},
  {topic:"三治世·政治制度",q:"就「科舉制」的發展而言，下列何者正確？",options:["唐太宗首創科舉、隋文帝廢除","隋文帝完善、武則天首創","玄宗首創、唐太宗收緊","隋文帝開科舉先河、唐太宗發展完善、玄宗收緊名額"],answer:3,explain:"隋文帝廢九品中正、開科舉先河（雛形），唐太宗發展為完善制度，玄宗則收緊及第名額、嚴定吏部甄選。"},
  {topic:"三治世·政治制度",q:"三治世君主的地方行政改革，配對正確的是？",options:["隋文帝——州縣二級制；玄宗——十五道","隋文帝——十道；太宗——十五道","太宗——州郡縣三級制；玄宗——十道","隋文帝——十五道；玄宗——州縣二級制"],answer:0,explain:"隋文帝行州縣二級制（廢郡）；唐太宗分全國為十道（監察）；玄宗把十道改為十五道、置採訪使。"},
  {topic:"三治世·政治制度",q:"隋唐三治世編訂的法典中，以「寬仁、慎刑」為旨、較《開皇律》更寬簡的是？",options:["《開皇律》","《唐律》","《大業律》","《唐六典》"],answer:1,explain:"隋文帝《開皇律》刪苛法、廢酷刑；唐太宗命長孫無忌等編《唐律》、以寬仁慎刑為旨、較《開皇律》更寬簡。"},
  {topic:"三治世·政治制度",q:"范文瀾以「秦始皇創秦制……隋文帝創隋制，為唐以後各朝所遵循」相比並論。這最能說明開皇之治在制度史上的地位是？",options:["隋制旋即被唐廢除","隋制只行於隋朝一代","隋文帝創設的制度為唐（含貞觀、開元）所承襲、影響深遠","唐制與隋制毫無關係"],answer:2,explain:"范文瀾把隋文帝創隋制與秦始皇創秦制並論，肯定隋制為唐所沿用、影響後世，正是貞觀、開元制度的根源。"},
  {topic:"三治世·政治制度",q:"三治世在中央政制上的共通取向是？",options:["集大權於宰相一人","廢除一切審議程序","回復世卿世祿","藉三省分權合議、防止權臣專擅，使政務歸於合理"],answer:3,explain:"隋文帝確立、太宗完善、玄宗恢復三省，皆藉三省分權合議牽制相權、使政務歸於合理，是三治世政治的共通取向。"},
  {topic:"三治世·政治制度",q:"下列關於三省六部制演變的說法，哪些正確？\n(1) 隋文帝確立三省六部制\n(2) 唐玄宗即位後廢除三省、由皇帝獨斷\n(3) 唐太宗加以完善並增設政事堂\n(4) 武則天時三省制一度遭破壞",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——玄宗即位後是恢復三省原有權力、重建相權制衡，並非廢除三省、由皇帝獨斷。"},
  {topic:"三治世·政治制度",q:"下列關於三治世「選官／科舉」的說法，哪些正確？\n(1) 隋文帝廢九品中正、開科舉之先河\n(2) 唐太宗使科舉發展為完善制度\n(3) 科舉常科之中，以秀才、明法兩科最為重要\n(4) 唐玄宗收緊及第名額、重申及第須經吏部甄選",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——常科以明經、進士兩科最為重要，並非秀才、明法。"},
  {topic:"三治世·政治制度",q:"下列關於三治世「整頓吏治」的說法，哪些正確？\n(1) 隋文帝裁汰冗官、合併郡縣以節省經費\n(2) 唐太宗親選刺史、錄其功過於屏風\n(3) 唐玄宗罷斜封官、限內外文武官為一萬八千多人\n(4) 隋文帝合併州縣後，行政經費仍與南北朝相若",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——嚴耕望指合併郡縣後行政經費僅及南北朝三分之一，並非相若。"},
  {topic:"三治世·政治制度",q:"下列關於三治世「法律」的說法，哪些正確？\n(1) 隋文帝命修《開皇律》、刪苛法廢酷刑\n(2) 唐太宗命修《唐律》、以寬仁慎刑為旨\n(3) 《唐律》較《開皇律》更為寬簡\n(4) 《唐律》由蘇威、牛弘奉太宗之命修訂",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——《唐律》由長孫無忌、房玄齡等修訂；蘇威、牛弘所修是《開皇律》。"},
  {topic:"三治世·政治制度",q:"下列關於三治世「地方制度」的說法，哪些正確？\n(1) 把全國分為十道作監察區的是隋文帝\n(2) 隋文帝行州縣二級制、裁去郡級\n(3) 唐太宗分全國為十道作監察區\n(4) 唐玄宗把十道改為十五道、置採訪使",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——分十道是唐太宗之制；隋文帝行州縣二級制。"},
  {topic:"三治世·經濟措施",q:"三治世在田制上的共通點是？",options:["皆廢除均田、改行兩稅法","皆沿用／改良「均田制」、為民制產","皆放任土地兼併","皆恢復井田制"],answer:1,explain:"隋沿北魏均田、唐太宗加以改良（口分田／永業田、田不可買賣）、玄宗續行，三者皆藉均田為民制產。"},
  {topic:"三治世·經濟措施",q:"三治世在賦稅上的共通制度是？",options:["兩稅法","一條鞭法","租庸調制（輕徭薄賦）","攤丁入畝"],answer:2,explain:"隋創租庸調制、唐太宗沿用（貞觀約四十稅一）、玄宗續行，三治世皆以租庸調制、輕徭薄賦為特色。"},
  {topic:"三治世·經濟措施",q:"下列「君主——增加人口／戶口措施」配對，何者正確？",options:["唐太宗——大索貌閱","唐玄宗——輸籍法","隋文帝——清查戶籍（宇文融）","隋文帝——大索貌閱、輸籍法"],answer:3,explain:"隋文帝行大索貌閱、輸籍法；唐太宗助婚配獎生育；玄宗命宇文融清查戶籍，三者皆增課稅戶。"},
  {topic:"三治世·經濟措施",q:"三治世中，戶口達唐代最高紀錄（約八百四十餘萬戶）的是？",options:["開元之治","開皇之治","貞觀之治","三者相同"],answer:0,explain:"隋開皇人口激增（煬帝初約八百九十萬戶為隋最高）；貞觀約三百八十萬戶；開元（740）增至約八百四十餘萬戶、為唐戶口最高紀錄。"},
  {topic:"三治世·經濟措施",q:"「古今稱國計之富者莫如隋」（馬端臨），最能說明三治世中哪一者「國計富足」最為突出？",options:["貞觀之治","開皇之治","開元之治","三者相同"],answer:1,explain:"馬端臨稱隋國計之富古今莫及，倉窖滿溢，故開皇之治以「國計富足」最為突出，是其最大盛況特色。"},
  {topic:"三治世·經濟措施",q:"三治世皆出現「人口增加、倉廩充實」的盛況，其共通的根本原因是？",options:["大舉對外征戰、掠奪財富","放任豪強兼併土地","輕徭薄賦、為民制產與整理戶籍，鼓勵生產、增加課稅戶","廢除一切賦稅"],answer:2,explain:"三治世皆藉均田為民制產、租庸調輕徭薄賦、整理戶籍增課稅戶，鼓勵生產，故人口增加、倉廩充實。"},
  {topic:"三治世·經濟措施",q:"杜甫《憶昔》「公私倉廩俱豐實」與馬端臨「國計之富莫如隋」，分別描述哪兩個治世的富足？",options:["前者開皇、後者貞觀","前者貞觀、後者開元","二者皆指貞觀之治","前者開元之治、後者開皇之治"],answer:3,explain:"杜甫《憶昔》追憶開元全盛、公私倉廩俱豐實；馬端臨「國計之富莫如隋」則極言開皇之治的富足。"},
  {topic:"三治世·經濟措施",q:"下列關於三治世經濟措施的共通點，哪些正確？\n(1) 唐代均田制下，永業田須於死後交還政府\n(2) 皆沿用或改良均田制、為民制產\n(3) 皆推行租庸調制、輕徭薄賦\n(4) 皆設法整理戶籍、增加課稅戶",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——永業田為私有田產，口分田才須於死後交還政府。"},
  {topic:"三治世·經濟措施",q:"下列「治世——經濟建設」配對，哪些正確？\n(1) 開皇之治——開鑿廣通渠、廣設官倉義倉\n(2) 貞觀之治——大索貌閱、輸籍法整理戶籍\n(3) 開元之治——裴耀卿分段運輸、韋堅鑿廣運潭\n(4) 開皇之治——倉窖滿溢、糧食陳腐",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——大索貌閱、輸籍法是隋文帝（開皇）的措施；貞觀整理戶籍是助婚獎育、招撫流民，故此配對錯誤。"},
  {topic:"三治世·經濟措施",q:"下列「君主——戶口措施」配對，哪些正確？\n(1) 隋文帝——大索貌閱、輸籍法\n(2) 「輸籍法」由蘇威向隋文帝建議推行\n(3) 唐太宗——助婚配、獎生育、招撫流民\n(4) 唐玄宗——命宇文融清查戶籍",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——輸籍法由高熲建議推行，並非蘇威。"},
  {topic:"三治世·經濟措施",q:"下列關於三治世經濟成效的說法，哪些正確？\n(1) 開皇「國計富足」、倉窖滿溢\n(2) 貞觀米價大降、牛馬遍野\n(3) 米價曾降至每斗兩錢，是開皇年間富足之況\n(4) 開元戶口達唐最高、公私倉廩俱豐實",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——米價每斗約兩錢是貞觀年間之況，並非開皇。"},
  {topic:"三治世·軍事與外族",q:"就「府兵制」而言，下列何者正確？",options:["隋文帝改革、唐太宗沿用改良、玄宗因其敗壞而改募兵制","隋文帝廢除、玄宗恢復","唐太宗首創、隋文帝沿用","玄宗改良、太宗廢除"],answer:0,explain:"隋文帝改革府兵制（兵農合一）、唐太宗沿用改良（折衝府）、玄宗因府兵敗壞而改行募兵制（彍騎、長征健兒）。"},
  {topic:"三治世·軍事與外族",q:"三治世中，因府兵制敗壞而改行「募兵制」、以彍騎與長征健兒代替府兵的是？",options:["隋文帝（開皇）","唐玄宗（開元）","唐太宗（貞觀）","三者皆是"],answer:1,explain:"府兵制歷隋文帝改革、太宗沿用，至玄宗時敗壞，玄宗遂改行募兵制：彍騎守京、長征健兒戍邊。"},
  {topic:"三治世·軍事與外族",q:"三治世君主對「突厥」的處置，配對正確的是？",options:["唐太宗——離間使突厥分裂","唐玄宗——俘頡利可汗","隋文帝——離間使突厥分裂為東西兩部","隋文帝——被尊為天可汗"],answer:2,explain:"隋文帝採離間之計使突厥分裂東西；唐太宗派李靖俘頡利可汗、被尊天可汗；玄宗派郭虔瓘破突厥。"},
  {topic:"三治世·軍事與外族",q:"三治世中，被西北各族尊為「天可汗」的是？",options:["隋文帝（開皇）","唐玄宗（開元）","三者皆是","唐太宗（貞觀）"],answer:3,explain:"唐太宗降東突厥後被西北各族尊為「天可汗」；玄宗則延續睦鄰政策、保持天可汗地位；隋文帝未有此尊號。"},
  {topic:"三治世·軍事與外族",q:"三治世對外皆能「恩威並施、邊境安寧」。下列何者最能說明此一共通成效？",options:["或征討、或和親互市使諸族歸附，邊疆少有大規模入侵","三者皆放棄邊防、任外族入侵","三者皆連年征戰、邊釁不斷","三者皆與外族斷絕往來"],answer:0,explain:"隋文帝、唐太宗、玄宗皆兼用征討與和親互市，使諸族歸附、邊疆安寧，是三治世對外的共通成效。"},
  {topic:"三治世·軍事與外族",q:"府兵制由「兵農合一」走向敗壞、終為募兵制取代，這一演變橫跨三治世。其敗壞的主因是？",options:["府兵戰鬥力過強","邊事頻繁、兵役漸重，加上府兵受田不足、難以務農自給","國家財政過於充裕","外族完全消失"],answer:1,explain:"高宗以後邊事頻繁、兵役漸重，府兵又受田不足、難以自給，逃兵漸多，府兵制遂敗壞，玄宗終改行募兵制。"},
  {topic:"三治世·軍事與外族",q:"下列關於三治世軍事制度的說法，哪些正確？\n(1) 隋文帝改革府兵制、行兵農合一\n(2) 唐太宗沿用並改良府兵制、廣設折衝府\n(3) 折衝府近八成兵力集中於江南、嶺南地區\n(4) 唐玄宗因府兵敗壞而改行募兵制",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——折衝府近八成兵力集中於關中及鄰近地區（關中本位），並非江南嶺南。"},
  {topic:"三治世·軍事與外族",q:"下列關於三治世對外族措施的說法，哪些正確？\n(1) 隋文帝離間突厥、使其分裂為東西兩部\n(2) 唐太宗平東突厥、被尊為「天可汗」\n(3) 唐玄宗擊退突厥、征吐蕃，並行睦鄰四方政策\n(4) 俘頡利可汗的是隋將賀若弼、韓擒虎",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——俘頡利可汗者是唐太宗所遣李靖等；賀若弼、韓擒虎是隋滅陳之將。"},
  {topic:"三治世·軍事與外族",q:"下列關於三治世「府兵制」演變的說法，哪些正確？\n(1) 隋文帝改革府兵、行兵農合一\n(2) 唐太宗沿用並改良、廣設折衝府\n(3) 唐玄宗因府兵敗壞改行募兵制\n(4) 府兵制下的「彍騎」由唐太宗創設以守京師",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——彍騎是玄宗行募兵制後守衛京師之兵，並非太宗所創的府兵。"},
  {topic:"三治世·軍事與外族",q:"下列「君主——對外族作為」配對，哪些正確？\n(1) 唐太宗——離間突厥、使其分裂東西\n(2) 隋文帝——離間突厥、使其分裂東西\n(3) 唐太宗——平東突厥、被尊天可汗\n(4) 唐玄宗——擊突厥、征吐蕃、睦鄰四方",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——離間突厥使其分裂東西是隋文帝之策；唐太宗是出兵平東突厥、俘頡利可汗。"},
  {topic:"三治世·軍事與外族",q:"下列關於三治世對外共通點的說法，哪些正確？\n(1) 皆兼用征討與和親互市、恩威並施\n(2) 「天可汗」尊號由隋文帝首先取得\n(3) 皆使諸族歸附、邊疆相對安寧\n(4) 唐太宗、玄宗皆保持「天可汗」地位",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——天可汗之號始於唐太宗，隋文帝並無此尊號。"},
  {topic:"三治世·個人特質",q:"三治世君主有利於開創盛世的共通個人特質是？",options:["皆奢侈好大喜功","皆怠政而寬縱","皆崇尚游獵享樂","早年皆勤政、節儉"],answer:3,explain:"隋文帝（日膳一肉）、唐太宗（自奉儉約）、唐玄宗（焚錦繡、罷織錦坊）早年皆勤政節儉，是盛世出現的個人因素。"},
  {topic:"三治世·個人特質",q:"三治世君主中，以「善於納諫、從諫如流」最為突出、有魏徵犯顏直諫的是？",options:["唐太宗","隋文帝","唐玄宗","三者相同"],answer:0,explain:"唐太宗以隋煬帝拒諫亡國為戒、廣開言路，魏徵屢屢犯顏直諫；玄宗早年亦以太宗為榜樣納諫；隋文帝則晚年猜忌。"},
  {topic:"三治世·個人特質",q:"唐玄宗「以太宗為榜樣、虛懷納諫、下詔求諫」。這說明開元在個人特質上？",options:["承襲開皇君主的猜忌作風","承襲貞觀君主的納諫作風","完全摒棄納諫","以拒諫為治國之道"],answer:1,explain:"玄宗以太宗為榜樣、恢復貞觀諫官議政制、重用韓休張九齡，反映開元在個人特質上承襲貞觀君主的納諫作風。"},
  {topic:"三治世·個人特質",q:"提出「為君之道，必須先存百姓」「水能載舟，亦能覆舟」、最具「以民為本」色彩的是？",options:["隋文帝","唐玄宗","唐太宗","三者相同"],answer:2,explain:"「先存百姓」「水能載舟亦能覆舟」是唐太宗的名言，最能體現其以民為本；文帝則有「藏富於國」而災荒拒賑之失。"},
  {topic:"三治世·個人特質",q:"以「用人唯才、不問出身」而論，唐太宗用魏徵（建成舊臣）、唐玄宗用姚崇宋璟（武后舊臣）。這最能說明二人？",options:["皆只用親信、排斥外人","皆任人唯親、不論才幹","皆刻意排斥前朝舊臣","皆能不計前嫌、唯才是用，故賢才匯聚、開創盛世"],answer:3,explain:"太宗用建成舊臣魏徵、玄宗用武后舊臣姚崇宋璟，皆不計前嫌、唯才是用，使賢才匯聚、開創盛世。"},
  {topic:"三治世·個人特質",q:"同樣面對「府庫充盈」，隋文帝災荒卻拒開倉賑災（藏富於國），唐太宗則開倉濟民。這一對比最能說明？",options:["二人民本程度有別：太宗更重民生，文帝則偏重藏富於國","二人施政完全相同","文帝較太宗更愛民","二人皆不理民生"],answer:0,explain:"文帝災荒拒賑、被評「不憐百姓而惜倉庫」，太宗則開倉濟民、以民為本，反映二人在民本程度上的差異。"},
  {topic:"三治世·個人特質",q:"下列關於三治世君主個人特質的共通點，哪些正確？\n(1) 三君皆以「藏富於民」見稱、災荒必開倉賑濟\n(2) 早年皆勤政、生活節儉\n(3) 皆能不問出身、任用賢才\n(4) 皆藉整頓吏治、輕徭薄賦使民休息",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——隋文帝重藏富於國、災荒拒開倉賑濟，並非三君皆藏富於民、必開倉賑災。"},
  {topic:"三治世·個人特質",q:"下列關於三治世君主「納諫」的比較，哪些正確？\n(1) 唐太宗以隋煬帝拒諫亡國為戒、最善納諫\n(2) 魏徵、韓休同朝輔佐唐太宗、以直諫見稱\n(3) 唐玄宗早年以太宗為榜樣、虛懷納諫\n(4) 隋文帝晚年趨於猜忌、未及太宗善於納諫",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——韓休是玄宗朝的直諫之臣，與魏徵並非同朝。"},
  {topic:"三治世·個人特質",q:"下列關於三治世君主「早年特質」的共通點，哪些正確？\n(1) 皆勤於政事\n(2) 皆生活節儉、力戒奢華\n(3) 「焚錦繡、金銀器玩於殿前」是唐太宗崇儉之舉\n(4) 皆能用人唯才、不問出身",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——焚錦繡於殿前是唐玄宗即位之初的崇儉之舉，並非太宗。"},
  {topic:"三治世·個人特質",q:"下列關於三治世君主「納諫」的比較，哪些正確？\n(1) 唐太宗以隋煬帝拒諫亡國為戒、最善納諫\n(2) 唐玄宗早年以太宗為榜樣、恢復諫官議政\n(3) 隋文帝晚年趨於猜忌、不及太宗善於納諫\n(4) 下詔求諫、恢復諫官議政之制的是隋文帝",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——下詔求諫、恢復諫官議政是唐玄宗仿效太宗之舉，並非隋文帝。"},
  {topic:"三治世·個人特質",q:"下列關於三治世君主「用人」的說法，哪些正確？\n(1) 唐太宗用善謀的房玄齡、善斷的杜如晦\n(2) 唐玄宗用姚崇、宋璟、韓休、張九齡等賢相\n(3) 太宗用建成舊臣魏徵、玄宗用武后舊臣姚宋，皆不計前嫌\n(4) 三治世皆藉用人唯才、賢才匯聚而開創盛世",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)"],answer:1,explain:"四項皆正確：房謀杜斷、姚宋韓張、不計前嫌、唯才是用以致盛世，皆為三治世用人的共通特色。"},
  {topic:"三治世·治世盛況",q:"下列哪一項，是開皇、貞觀、開元三治世「共有」的盛況？",options:["四夷賓服、君臣一體","首都成國際大都會","人口增加、社會安定、國家富足","邊境安寧、文教興盛"],answer:2,explain:"三治世皆有人口增加、國家富足（倉廩充實）、社會安定；四夷賓服君臣一體屬貞觀、首都國際大都會屬開元的獨有盛況。"},
  {topic:"三治世·治世盛況",q:"「四夷賓服、君臣一體」是三治世中哪一者特有的盛況？",options:["開皇之治","開元之治","三者共有","貞觀之治"],answer:3,explain:"貞觀盛況含制度完善、吏治清明、四夷賓服、君臣一體等九項，其中「四夷賓服（天可汗）、君臣一體」最具貞觀特色。"},
  {topic:"三治世·治世盛況",q:"「首都成為國際大都會」是哪一治世特有的盛況？",options:["開元之治","開皇之治","貞觀之治","三者共有"],answer:0,explain:"開元盛況含人口激增、國家富庶、社會安定、首都成國際大都會，其中「首都成國際大都會」（各族雲集長安）最具開元特色。"},
  {topic:"三治世·治世盛況",q:"開皇之治的盛況中，被視為最突出、史家極力稱譽的一項是？",options:["首都國際大都會","國計富足","君臣一體","四夷賓服"],answer:1,explain:"開皇之治盛況含制度優良、吏治清明、邊境安寧、國計富足等，其中「國計富足」（古今稱國計之富者莫如隋）最為突出。"},
  {topic:"三治世·治世盛況",q:"若以「國家富足」為焦點比較三治世，最能突顯此特色的史料配對是？",options:["貞觀——「莫如隋」；開皇——「憶昔開元」","開元——「莫如隋」；開皇——「憶昔開元」","開皇——「古今稱國計之富者莫如隋」；開元——「公私倉廩俱豐實」","三者皆無相關史料"],answer:2,explain:"馬端臨「莫如隋」極言開皇國計富足、杜甫《憶昔》「公私倉廩俱豐實」描繪開元富庶，二者最能突顯國家富足。"},
  {topic:"三治世·治世盛況",q:"三治世盛況雖各有側重，但其「共同基礎」可概括為？",options:["連年征戰、開疆拓土","君主奢華、好大喜功","放任豪強、藏富於民","政治清明、經濟富足、社會安定"],answer:3,explain:"三治世皆建基於政治清明（制度／吏治）、經濟富足（人口／倉廩）、社會安定，故能稱為治世，盛況雖有側重而基礎相通。"},
  {topic:"三治世·治世盛況",q:"下列關於三治世「共有盛況」的說法，哪些正確？\n(1) 三者皆人口增加\n(2) 三者皆社會安定\n(3) 三者皆有『首都成為國際大都會』之盛況\n(4) 三者皆國家富足、倉廩充實",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——「首都成為國際大都會」是開元之治的獨有盛況，並非三者共有。"},
  {topic:"三治世·治世盛況",q:"下列「治世——獨有盛況」配對，哪些正確？\n(1) 開皇之治——國計富足（莫如隋）\n(2) 貞觀之治——四夷賓服、君臣一體\n(3) 開元之治——首都成國際大都會\n(4) 開皇之治——首都成國際大都會",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——「首都成國際大都會」是開元之治的盛況；開皇之治最突出的是國計富足，故此配對錯誤。"},
  {topic:"三治世·治世盛況",q:"下列關於三治世盛況數目與特色的說法，哪些正確？\n(1) 「君臣一體」的盛況同樣見於開皇一朝\n(2) 開皇盛況約七項、含邊境安寧、文教興盛\n(3) 貞觀盛況約九項、含君臣一體、四夷賓服\n(4) 開元盛況約四項、含首都成國際大都會",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——「君臣一體」是貞觀之治的獨有盛況，開皇盛況並不包括此項。"},
  {topic:"三治世·治世盛況",q:"下列關於三治世「共有盛況」的說法，哪些正確？\n(1) 三者皆有「君臣一體」之盛況\n(2) 三者皆人口增加\n(3) 三者皆社會安定\n(4) 三者皆國家富足、倉廩充實",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——「君臣一體」是貞觀之治的獨有盛況，並非三者共有。"},
  {topic:"三治世·治世盛況",q:"下列「治世——獨有盛況」配對，哪些正確？\n(1) 開皇之治——國計富足（莫如隋）\n(2) 貞觀之治——首都成國際大都會\n(3) 貞觀之治——四夷賓服、君臣一體\n(4) 開元之治——首都成國際大都會",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——「首都成國際大都會」是開元之治的盛況，並非貞觀之治。"},
  {topic:"三治世·成因與評價結局",q:"三治世出現的共通成因，下列何者最為恰當？",options:["全憑對外戰爭掠奪","承前朝／前期積累，加上君主個人才識與時勢配合","全靠放任無為而治","全因外族扶持"],answer:1,explain:"三治世皆承前朝或前期積累（隋承北朝統一、太宗承隋制、玄宗承貞觀），再賴君主才識、用人納諫與久亂思治的時勢。"},
  {topic:"三治世·成因與評價結局",q:"三治世君主晚年或結局的比較，下列何者正確？",options:["唐太宗晚年釀成安史之亂","唐玄宗晚年使隋朝速亡","隋文帝晚年奢侈易儲，其後煬帝速亡","三者晚年皆毫無過失"],answer:2,explain:"隋文帝晚年奢侈、易儲（廢勇立廣）→煬帝速亡；玄宗晚年荒怠→安史之亂；太宗晚年雖有小疵而功大過微。"},
  {topic:"三治世·成因與評價結局",q:"三治世中，君主晚年荒怠、終引致「安史之亂」、令王朝由盛轉衰的是？",options:["開皇之治（隋文帝）","貞觀之治（唐太宗）","三者皆是","開元之治（唐玄宗）"],answer:3,explain:"唐玄宗晚年荒怠、罷賢相任奸佞、寵安祿山，終引致安史之亂、唐由盛轉衰；文帝之失導致隋速亡，太宗則功大過微。"},
  {topic:"三治世·成因與評價結局",q:"隋文帝雖創開皇盛世，但其後隋朝速亡。最關鍵的轉折是？",options:["晚年易儲、傳位煬帝，煬帝苛政無道","太宗發動玄武門之變","玄宗寵信安祿山","府兵制敗壞"],answer:0,explain:"文帝晚年廢太子楊勇、改立楊廣（煬帝），煬帝繼位後苛政揮霍、致隋速亡，是開皇盛世其後速亡的關鍵轉折。"},
  {topic:"三治世·成因與評價結局",q:"同為開創盛世的雄主，隋文帝與唐玄宗的結局都帶有「盛極而衰」的教訓。最能概括此教訓的是？",options:["盛世必然永久延續","君主能否善始善終，直接關乎盛世能否延續，治亂繫於人君作為","盛世與君主作為無關","晚年過失無損國運"],answer:1,explain:"文帝晚年易儲致隋速亡、玄宗晚年荒怠致安史之亂，皆說明君主能否善始善終關乎盛世存續，治亂繫於人君作為。"},
  {topic:"三治世·成因與評價結局",q:"史家以「秦始皇創秦制、隋文帝創隋制」並論，又謂開元「貞觀之風一朝復振」。綜合而言，三治世的歷史意義是？",options:["三治世互不相干、各自孤立","唐代制度與隋毫無關係","隋創制、唐承襲完善，三治世前後相承，共同構成隋唐制度與盛世的高峰","三治世皆無足稱道"],answer:2,explain:"隋文帝創制為唐所承襲完善、開元又上承貞觀，三治世前後相承，共同構成隋唐制度文明與盛世的高峰。"},
  {topic:"三治世·成因與評價結局",q:"就「同一王朝、同一君主」而言，最能說明「治亂繫於人君」的是？",options:["隋文帝與隋煬帝是同一人","唐太宗與唐玄宗是同一人","開皇與貞觀屬同一王朝","唐玄宗前期開創開元之治、後期卻釀成安史之亂"],answer:3,explain:"唐玄宗前期勵精圖治成開元之治、後期怠政任奸釀安史之亂，同一君主前後judgement，最能說明治亂繫於人君的作為。"},
  {topic:"三治世·成因與評價結局",q:"下列關於三治世「成因」的共通點，哪些正確？\n(1) 皆承前朝或前期所積累的基礎\n(2) 貞觀之治主要承襲武韋時期的積累而成\n(3) 皆賴君主個人的才識與作為\n(4) 皆得力於用人唯才、整頓吏治",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——武則天、韋后當政在貞觀之後，時序不合；貞觀承襲的是隋制與唐初的基礎。"},
  {topic:"三治世·成因與評價結局",q:"下列關於三治世君主「晚年／結局」的比較，哪些正確？\n(1) 隋文帝晚年奢侈、易儲，其後隋速亡\n(2) 唐太宗晚年雖有小疵、惟功大過微\n(3) 唐太宗晚年親征高麗得勝，國勢更上層樓\n(4) 唐玄宗晚年荒怠、終致安史之亂、由盛轉衰",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——太宗親征高麗無功而還、敗多勝少，並非得勝使國勢更上層樓。"},
  {topic:"三治世·成因與評價結局",q:"下列關於三治世「制度傳承」的說法，哪些正確？\n(1) 隋文帝創三省六部、均田、租庸調、府兵及科舉雛形\n(2) 唐太宗、玄宗大體沿用並完善隋制\n(3) 科舉、六部等更為宋至清所沿用\n(4) 《唐六典》與《開元禮》均為唐太宗時所修",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——《開元禮》《唐六典》修於玄宗朝，並非太宗之時。"},
  {topic:"三治世·成因與評價結局",q:"下列關於三治世君主「晚年／結局」的比較，哪些正確？\n(1) 隋文帝晚年奢侈、易儲，其後隋速亡\n(2) 唐玄宗晚年荒怠、終致安史之亂、由盛轉衰\n(3) 安史之亂爆發於玄宗「開元」年間\n(4) 唐太宗晚年雖有小疵、惟功大過微",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——安史之亂爆發於天寶年間，並非開元年間。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"篡奪西漢、建立「新」朝的外戚是？",options:["王莽","霍光","梁冀","董賢"],answer:0,explain:"西漢末年外戚王莽逐步掌權，最終接受孺子嬰「禪讓」、即位稱帝、改國號「新」，西漢滅亡。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王莽得以掌權的最關鍵外戚靠山——其姑母、漢元帝的皇后是？",options:["竇太后","王政君","呂后","傅太后"],answer:1,explain:"王莽的姑母王政君為漢元帝皇后，歷元、成、哀、平四帝，對漢室影響近六十年，不斷援引王氏外戚參政，是王氏掌權之本。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王政君歷經元、成、哀、平四帝，對漢室的影響力長達約多久？",options:["近十年","近二十年","近六十年","近百年"],answer:2,explain:"王政君任皇后、皇太后、太皇太后，歷四帝、影響漢室近六十年，期間不斷援引王氏子弟參政。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"成帝即位後尊王政君為皇太后，王政君任命其兄王鳳出任的要職是？",options:["丞相","太傅","廷尉","大司馬大將軍領尚書事"],answer:3,explain:"成帝時王政君以兄王鳳為「大司馬大將軍領尚書事」、位在三公之上，掌領內朝、把持朝政，是王氏專政之始。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"成帝時王政君之弟譚、商、立、根、逢時五人同日封侯，世稱？",options:["一日五侯","一日五公","五侯亂政","五王封侯"],answer:0,explain:"成帝時王政君五弟同日封侯，世稱「一日五侯」；成帝一世王氏為侯者九人、為大司馬者五人，王氏全面把持朝政。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"成帝時王鳳死後，相繼以「大司馬」之職掌領尚書、延續王氏專政的是？",options:["霍光、霍禹","王音、王商、王根","竇憲、竇武","梁商、梁冀"],answer:1,explain:"王鳳死後，其弟王音、王商、王根等相繼以大司馬之職掌領尚書，王氏外戚輪番把持權柄。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王莽最初獲伯父王鳳臨終薦舉而出任的官職是？",options:["大司馬","新都侯","黃門郎","安漢公"],answer:2,explain:"王莽先由伯父王鳳臨終薦為黃門郎，後由叔父王商薦為新都侯，再於叔父王根病重時接任大司馬，逐步掌權。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"哀帝在位期間，王氏外戚勢力一度受挫，主因是哀帝？",options:["重用宦官石顯","重用霍光家族","重用太學生","重用祖母傅家及母親丁家之人"],answer:3,explain:"哀帝重用其祖母傅家及母丁家外戚，王氏一度失勢，王莽遂稱病去職；至哀帝末年百官稱頌，哀帝才召王莽還朝。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"哀帝死、平帝年幼繼位後，以太皇太后身分臨朝稱制、命王莽復任大司馬的是？",options:["王政君","傅太后","竇太后","呂后"],answer:0,explain:"哀帝死、平帝年幼，王政君以太皇太后臨朝稱制，命王莽復任大司馬，王莽遂捲土重來、籌備篡漢。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王莽在平帝時所獲、自比商之伊尹、周之周公的尊號是？",options:["攝皇帝","安漢公（再進宰衡）","大將軍","新都侯"],answer:1,explain:"平帝時王莽進位太傅、號「安漢公」，再進「宰衡」，以伊尹、周公自任，造明堂、議九錫，政事皆由安漢公平決，權同皇帝。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"平帝死後，王莽改立年僅兩歲的皇帝是？",options:["漢少帝","漢獻帝","孺子嬰","劉賀"],answer:2,explain:"平帝不明不白死去，王莽改立兩歲的孺子嬰為帝，繼而以符命為據自稱「假皇帝」攝政，權勢遠在孺子嬰之上。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王莽攝政時，臣下對其的稱呼是？",options:["太上皇","真皇帝","安漢公","攝皇帝"],answer:3,explain:"王莽以「告安漢公莽為皇帝」的白石符命請王政君下詔讓其攝政，自稱「假皇帝」、臣下稱其為「攝皇帝」。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王莽接受孺子嬰「禪讓」、即位稱帝後所改的國號是？",options:["新","周","魏","漢"],answer:0,explain:"王莽假托天命、接受孺子嬰禪讓，即位稱帝、改國號「新」，西漢至此滅亡。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"白居易詩云「周公恐懼流言日，王莽謙恭未篡時」。此語最能說明王莽？",options:["一生謙恭、從無篡漢之心","篡漢之前刻意偽裝謙恭、以掩飾野心","篡漢之後仍然謙恭自抑","與周公一樣忠心輔政"],answer:1,explain:"白居易藉「謙恭未篡時」點出王莽篡漢前刻意偽裝謙恭、博取人心，以掩飾其代漢的野心。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"王氏外戚「參政之始」，可追溯至王政君之父王禁出任哪一職位、獲封陽平侯？",options:["大司馬","丞相","廷尉（九卿）","黃門郎"],answer:2,explain:"王政君之父王禁任廷尉（九卿）、拜陽平侯，是王氏參政之始；其後王政君為后，王氏勢力日盛。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列事件按時間先後排列，何者正確？\n(甲) 王莽自稱「假皇帝」攝政\n(乙) 王莽進號「安漢公」\n(丙) 王莽接受禪讓、改國號新",options:["甲→乙→丙","丙→乙→甲","乙→丙→甲","乙→甲→丙"],answer:3,explain:"平帝時王莽先進號安漢公（乙），平帝死後立孺子嬰、自稱假皇帝攝政（甲），最終接受禪讓改國號新（丙）。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列關於王政君的說法，哪些正確？\n(1) 她是哀帝的祖母、王莽的姑母\n(2) 她是漢元帝的皇后\n(3) 歷經元、成、哀、平四帝，對漢室影響近六十年\n(4) 成帝時她任命兄長王鳳為大司馬大將軍領尚書事",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——王政君是王莽的姑母、亦是元帝皇后，但她是元帝之后而非哀帝祖母；哀帝重用的是其祖母傅家。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列關於王莽官職晉升的說法，哪些正確？\n(1) 先由伯父王鳳臨終薦為黃門郎\n(2) 哀帝時進位宰衡、號安漢公\n(3) 再由叔父王商薦為新都侯\n(4) 於叔父王根病重時接任大司馬",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——安漢公、宰衡是平帝時所獲的尊號；哀帝時王氏一度失勢、王莽稱病去職。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列關於王莽篡漢過程的說法，哪些正確？\n(1) 平帝年幼繼位，王政君臨朝稱制、命王莽復任大司馬\n(2) 王莽改立兩歲的孺子嬰為帝、自稱假皇帝攝政\n(3) 王莽是以武力攻入長安、推翻孺子嬰而稱帝\n(4) 最終接受孺子嬰禪讓、即位稱帝、改國號新",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——王莽是假托符命、循「禪讓」形式和平代漢，並非以武力攻入長安推翻孺子嬰。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列關於王氏外戚崛起的說法，哪些正確？\n(1) 王政君之父王禁任廷尉、是王氏參政之始\n(2) 王莽是王政君的兄長、與王鳳屬同一輩\n(3) 成帝時王政君五弟同日封侯、世稱「一日五侯」\n(4) 王鳳以「大司馬大將軍領尚書事」輔政、位在三公之上",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——王莽是王政君的姪兒、屬王鳳等的姪輩，並非王政君的兄長、與王鳳同輩。"},
  {topic:"戚宦·王莽崛起與篡漢過程",q:"下列關於王莽尊號與篡漢步驟的說法，哪些正確？\n(1) 平帝時王莽進號「安漢公」、再進「宰衡」\n(2) 王莽以伊尹、周公自任、造明堂、議九錫\n(3) 「假皇帝」即正式即位、當時已改國號為新\n(4) 平帝死後立兩歲孺子嬰、王莽自稱「假皇帝」",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——「假皇帝」是攝行皇帝之權的攝政身分；正式即位、改國號新是其後接受禪讓之事。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"王莽篡漢的「歷史因素」，主要指西漢以來形成的哪一政治傳統？",options:["宦官專權的傳統","外戚輔政的政治傳統","丞相獨大的傳統","分封諸侯的傳統"],answer:1,explain:"西漢立國之初已有外戚涉政（如呂后家族），武帝更任外戚霍光託孤輔政，形成外戚輔政的政治傳統，王莽遂以王氏外戚身分輔政掌權。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"漢武帝所任、以「大司馬大將軍領尚書事」輔政、開啟外戚專擅朝政慣例的託孤重臣是？",options:["王鳳","竇憲","霍光","田蚡"],answer:2,explain:"武帝任外戚霍光為託孤重臣，昭帝繼位後霍光以「大司馬大將軍領尚書事」輔政、統領內朝二十年，開啟外戚專擅朝政的慣例。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"霍光輔政期間曾廢黜在位僅二十多天的昏庸君主、另立宣帝。此事最能說明外戚？",options:["只能處理民政、不涉皇權","忠心耿耿、從不干政","地位低於宦官","權勢之大，甚至能廢立皇帝"],answer:3,explain:"霍光廢昏庸的劉賀（在位二十餘天）、另立宣帝，反映外戚輔政權勢之大，甚至能廢立皇帝，為王莽日後廢立鋪路。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"王莽篡漢的「制度因素」，主要指漢武帝以來哪一機構權重、外戚得以乘機掌權？",options:["內朝（尚書）","外朝三公","御史台","太學"],answer:0,explain:"武帝把決策中心移至內朝、尚書權重，外朝三公淪為執行；武帝死後外戚常出任內朝要職（如大司馬領尚書事）乘機掌權，三公無力制衡。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"在「制度因素」下，王氏外戚（王鳳、王音、王商、王根、王莽）把持權柄，主要因為他們皆出任哪一內朝要職？",options:["丞相","大司馬","太尉","廷尉"],answer:1,explain:"王氏外戚王鳳、王音、王商、王根、王莽均出任內朝要職「大司馬」、掌領尚書，外朝三公無力制衡，王氏遂把持朝政。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"王莽篡漢的「漢室因素」，最能概括為？",options:["君主英明、漢統穩固","外族入侵、邊患不絕","君主昏庸、漢統屢絕","宦官專權、士人受禁"],answer:2,explain:"宣帝以後君主年幼又昏庸，元成哀只圖享樂、聽任外戚；哀平短壽無子，外戚乘機策立幼弱者為帝（如九歲平帝、兩歲孺子嬰），漢統屢絕。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"史載成帝「湛於酒色」、微服出宮，使「公卿百僚不知陛下所在」。這最能說明？",options:["君主勤政愛民","外戚忠心輔政","宦官把持朝政","君主昏庸怠政、聽任外戚擅政"],answer:3,explain:"成帝湛於酒色、微服出宮，反映西漢末君主昏庸怠政、不思進取，遂聽任外戚（王氏）擅政，為王莽掌權提供機會。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"王莽篡漢的「社會因素」，最能概括為？",options:["民生困苦、人心思變","國泰民安、安居樂業","府庫充盈、國計富足","邊境安寧、四夷賓服"],answer:0,explain:"元帝以後土地兼併嚴重、水旱災荒，農民失地淪為奴婢流民，貧富懸殊，「漢德已衰」之論蔓延，人民渴求新聖人改朝換代。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"西漢末年土地兼併嚴重、農民失去土地，最終淪為？",options:["諸侯或封君","奴婢或流民","太學生","內朝官員"],answer:1,explain:"元帝以後土地兼併愈嚴重、連年災荒，農民失去土地、無以為生，淪為奴婢或流民，貧富極度懸殊，人心思變。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"王莽篡漢的「思想因素」，是西漢末年哪一學說盛行、為其符命提供理論根據？",options:["黃老無為說","兼愛非攻說","五德終始說","合縱連橫說"],answer:2,explain:"武帝獨尊儒術、董仲舒吸納陰陽家「五德終始學說」；西漢末國勢日衰，五德終始說盛行、「漢德已衰，新聖將興」之說流行，為王莽符命提供理論根據。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"按「五德終始說」，當舊王朝將亡、君主政績不好時，上天會？",options:["顯現祥瑞","賜予長壽","廢除君主","降下災異示警"],answer:3,explain:"五德終始說認為：王朝德衰則君主應讓位新聖人；舊王朝將亡、君主政績不好則上天降災異示警；新朝將興則上天顯現祥瑞，為改朝換代提供理據。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"《漢書》謂王莽「乘四父歷世之權，而太后壽考為之宗主，以成篡盜之禍」。此最能說明王莽篡漢有賴？",options:["王氏外戚累世之權與王政君的庇蔭","宦官集團的扶植","軍隊將領的擁戴","外族勢力的支持"],answer:0,explain:"「四父歷世之權」「太后壽考為宗主」指王莽憑藉王氏（王鳳等）累世掌權與姑母王政君長壽庇蔭，方能成篡漢之禍。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"史家高明士稱王莽是「西漢後期政治、社會、思想變動結果的收割者」。此語最能說明王莽篡漢？",options:["全憑個人努力、與時勢無關","是充分利用了西漢末各種時勢（天時）的結果","純屬僥倖、毫無憑藉","靠武力征服而成"],answer:1,explain:"「收割者」一語指王莽收割了西漢後期政治（外戚／內朝）、社會（民困）、思想（五德終始）等變動的成果，說明其篡漢有賴時勢配合。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"西漢末年「漢德已衰，新聖將興」的輿論，對王莽篡漢的作用是？",options:["使百姓誓死保衛漢室","令外戚反對王莽","營造改朝換代的氣氛、為其代漢提供合法性","加強漢室統治"],answer:2,explain:"五德終始說下「漢德已衰、新聖將興」之論盛行，營造禪讓改朝的濃厚氣氛，為王莽以新聖人姿態代漢提供合法性。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「歷史因素」（外戚輔政傳統）的說法，哪些正確？\n(1) 西漢立國之初已有外戚涉政，如呂后家族專政\n(2) 漢武帝任外戚霍光為託孤重臣\n(3) 昭帝時霍光以大司馬大將軍領尚書事輔政、統領內朝\n(4) 漢光武帝任霍光輔政，開外戚專擅之始",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——霍光輔政在西漢昭帝時；漢光武帝是東漢開國之君，與霍光輔政無關。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「制度因素」（內朝權重）的說法，哪些正確？\n(1) 內朝權重始於漢光武帝削弱三公\n(2) 漢武帝把決策中心移至內朝、尚書權力漸大\n(3) 外朝三公權力削弱、淪為執行政務的官員\n(4) 武帝死後外戚常出任內朝要職乘機掌權",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——內朝權重、尚書漸大始於西漢漢武帝；光武帝削三公是東漢之事，屬東漢戚宦相爭的制度背景。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「漢室因素」的說法，哪些正確？\n(1) 宣帝以後君主多年幼繼位且昏庸\n(2) 外戚策立年長賢能的宗室為帝以圖中興\n(3) 元、成、哀帝只圖奢華享樂、聽任外戚擅政\n(4) 哀帝、平帝皆短壽而卒、又無子嗣",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——外戚正是乘機策立年幼弱小者（如九歲平帝、兩歲孺子嬰）為帝以便獨攬大權，並非策立年長賢能者。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「思想因素」（五德終始說）的說法，哪些正確？\n(1) 源於董仲舒改造儒學、吸納陰陽家學說\n(2) 主張王朝德衰則君主應讓位予新聖人\n(3) 主張君權永世不替、不容改朝換代\n(4) 新朝將興，上天會顯現祥瑞",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——五德終始說正是主張德衰者應禪讓予新聖人、改朝換代，並非主張君權永世不替。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「王氏外戚因素」的說法，哪些正確？\n(1) 王政君為元帝皇后、影響漢室近六十年\n(2) 成帝時太后王政君臨朝、援引王氏族人出任要職\n(3) 王鳳之後由王音、王商、王根輪番繼任輔政\n(4) 王氏外戚全力支持王莽篡漢、無一人反對",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——王氏外戚之中亦有人反對王莽篡漢（此為其局限），並非全力支持、無一人反對。"},
  {topic:"戚宦·王莽篡漢的天時（時勢）",q:"下列關於王莽篡漢「社會因素」的說法，哪些正確？\n(1) 漢武帝的新經濟政策已徹底解決土地兼併問題\n(2) 元帝以後土地兼併愈嚴重、加上連年水旱災荒\n(3) 農民失去土地、淪為奴婢或流民\n(4) 「漢德已衰」的輿論蔓延、成帝年間多次農民起事",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——漢武帝的新經濟政策並無解決土地兼併問題，元帝以後兼併反而愈加嚴重。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"成帝時王氏子弟大多驕奢放縱，王莽卻以哪種形象脫穎而出、得叔伯與王政君賞識？",options:["驕奢放縱、揮金如土","謙恭仁厚、生活儉樸、孝順長輩","勇猛善戰、軍功彪炳","沉迷酒色、不理政事"],answer:1,explain:"王氏子弟多驕奢，王莽卻謙恭仁厚、生活儉樸、孝順母親長輩，又酷愛儒學、禮賢下士，無王氏陋習，故得叔伯與姑母王政君賞識而被提拔。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"伯父王鳳患病時，王莽「親嘗藥，亂首垢面，不解衣帶連月」。此舉的作用是？",options:["藉軍功獲得提拔","討好宦官集團","藉孝行博取王鳳賞識、獲薦舉入仕（黃門郎）","拉攏太學生"],answer:2,explain:"王鳳病時王莽親侍湯藥、蓬頭垢面、衣不解帶連月，藉孝行博得王鳳賞識，王鳳臨終遂薦舉王莽為黃門郎，是其入仕之始。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽為「籠絡朝野」、爭取朝中大臣支持，於平帝時的做法是？",options:["盡誅宗室與功臣","廢除三公九卿","解散太學","廣封宗室、功臣後代約二百人為諸侯"],answer:3,explain:"平帝時王莽廣封宗室、功臣後代約二百人為諸侯，又規定郡太守以上年老退休者終身發還俸祿三分之一，藉以籠絡朝野、爭取大臣支持。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽為「籠絡儒生」，於平帝時的具體措施是？",options:["擴充太學、為太學生興建宿舍","廢除太學、禁止講學","焚毀儒家典籍","以法家取代儒學"],answer:0,explain:"平帝時王莽擴充太學、為太學生築宿舍萬間，又命郡縣設學校、廣置生徒，並輯出殘缺的《樂經》，以示尊儒、拉攏儒生支持。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽為「籠絡平民」、利用民生困苦的時勢，曾採取的做法是？",options:["大舉徵兵、開拓邊疆","捐田捐錢賑濟貧農、天災時素食以示與民同憂","加重賦稅、充實國庫","沒收百姓土地"],answer:1,explain:"王莽捐三十頃田、一百萬錢賑濟貧農，天災時素食與民同憂，又數次賜布帛予老人無依者，並把陪嫁之錢分予貧者，深得民眾稱頌。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽籠絡平民、廣施恩惠，所收得的最顯著效果是？",options:["百姓群起反對王莽","各地爆發大規模民變","受民眾稱頌，全國大量吏民上書要求朝廷厚賞王莽","儒生集體罷課抗議"],answer:2,explain:"王莽廣施恩惠後受廣大民眾稱頌，全國大量吏民上書朝廷要求厚加賞賜王莽，可見其籠絡平民之效，為篡漢累積民意基礎。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"哀帝時王莽面對傅、丁外戚把持朝政，採取的策略是？",options:["起兵討伐傅丁","聯合宦官奪權","投靠傅丁家族","韜光養晦、稱病去職"],answer:3,explain:"哀帝時朝政為傅、丁外戚把持，王莽轉而韜光養晦、稱病去職；至平帝繼位、王政君再起用他，他才重掌政權並消滅丁、傅二家外戚。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽利用「五德終始說」盛行的時勢，為篡漢製造合法性的手段是？",options:["假借符命、符瑞，把自己塑造為應運而生的新聖人","公開以武力威脅孺子嬰","頒佈嚴刑峻法","廢除五德終始說"],answer:0,explain:"王莽利用五德終始思潮、製造符瑞（如白雉），又指使黨羽偽造符命（井中白石、哀章銅盒金策書），把自己塑造為新聖人、為代漢提供合法性。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"平帝時益州塞外夷越裳氏來獻白雉，王政君遂賜王莽「安漢公」之號。此舉的用意是？",options:["賞賜王莽的軍功","以周公受越裳獻雉的故事，把王莽比為周公、增其認受性","懲戒王莽的過失","削奪王莽的權力"],answer:1,explain:"故事出自周公輔成王時越裳氏來獻白雉；王政君藉此賜王莽「安漢公」、把他比為周公，意味其地位等同周公，藉以增強篡漢的認受性。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"孺子嬰即位時，地方奏稱從井中得一白石、上書「告安漢公為皇帝」。王莽藉此？",options:["立即還政於孺子嬰","退隱還鄉","自稱「假皇帝」、攝行皇帝之權","發兵征討四方"],answer:2,explain:"井中白石符命「告安漢公為皇帝」，王莽藉此自稱「假皇帝」、攝行皇帝之權；其後再藉哀章偽造的金策書，假托天命接受禪讓稱帝。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"綜合王莽篡漢的「天時」與「人力」，最持平的評價是？",options:["純屬時勢造成、與王莽無關","純憑王莽之力、與時勢無關","純屬僥倖、毫無原因","既有西漢末時勢之助，亦賴王莽刻意經營，是時勢與人力交相作用的結果"],answer:3,explain:"王莽篡漢既得外戚傳統、內朝權重、民困、五德終始等時勢之助，亦賴其偽裝謙恭、籠絡各階層、製造符命的努力，是時勢與人力交相作用的結果。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"王莽「把女兒嫁與平帝為皇后」一事，最主要的政治作用是？",options:["拉近與漢室的關係、進一步鞏固權勢","削弱漢室皇權","討好宦官集團","平息農民起事"],answer:0,explain:"王莽把女兒嫁平帝為后，既獲厚賞（再分予貧者以籠絡人心），更拉近與漢室的關係、鞏固其權勢，為篡漢鋪路。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「籠絡王氏家族」的說法，哪些正確？\n(1) 當時王氏子弟大多驕奢放縱\n(2) 王莽則謙恭仁厚、生活儉樸、孝順長輩\n(3) 王莽酷愛儒學、禮賢下士、廣施財物\n(4) 王莽靠驕橫跋扈的作風壓服叔伯",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——王莽正是以謙恭儉樸、異於其他王氏子弟而得叔伯與王政君賞識，並非靠驕橫跋扈壓服叔伯。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「籠絡朝野與儒生」的說法，哪些正確？\n(1) 下令解散太學、禁止儒生議政\n(2) 廣封宗室、功臣後代約二百人為諸侯\n(3) 規定郡太守以上年老退休者終身發還俸祿三分之一\n(4) 擴充太學、為太學生興建宿舍",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——王莽是擴充太學、築宿舍以拉攏儒生，並非解散太學、禁止議政。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「籠絡平民」的說法，哪些正確？\n(1) 利用西漢末民生困苦、人心思變的時勢\n(2) 加徵賦稅、強徵民田以充國庫\n(3) 捐出田地與錢財賑濟貧農\n(4) 天災時素食、以示與民同憂",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——王莽是捐田捐錢、賑濟貧民以籠絡人心，並非加徵賦稅、強徵民田。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「假借符命稱帝」的說法，哪些正確？\n(1) 利用五德終始說盛行的時勢\n(2) 越裳氏獻白雉，王政君賜其「安漢公」、比之周公\n(3) 王莽公開否定符瑞、堅決拒絕稱帝\n(4) 指使黨羽偽造井中白石、哀章金策書等符命",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——王莽正是製造、利用符瑞符命以稱帝，並非否定符瑞、拒絕稱帝。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「鞏固權勢」的說法，哪些正確？\n(1) 哀帝時王莽韜光養晦、稱病去職\n(2) 王莽平帝時所消滅的是霍光、竇憲兩家外戚\n(3) 平帝繼位後王莽重掌政權、消滅丁傅二家外戚\n(4) 廣封黨羽百多人為侯、又把女兒嫁平帝為皇后",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——王莽平帝時消滅的是把持哀帝朝政的丁、傅二家外戚，並非霍光、竇憲。"},
  {topic:"戚宦·王莽篡漢的人力（王莽的努力）",q:"下列關於王莽「假借符命」的具體事例，哪些正確？\n(1) 越裳氏獻白雉、王政君藉周公故事賜王莽「安漢公」\n(2) 地方奏稱井中得白石、書「告安漢公為皇帝」\n(3) 上述符命皆由漢室所造、用以褒揚漢德\n(4) 哀章偽造銅盒金策書、置於漢高祖廟",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——這些符命是王莽及其黨羽偽造、用以為代漢製造合法性，並非漢室所造、褒揚漢德。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢戚宦相爭的「制度因素」，源於漢光武帝為防王莽篡位再現而採取的措施是？",options:["恢復丞相制度","廢除尚書台","擴大三公權力","削弱三公權力、加強尚書職權"],answer:3,explain:"光武帝為防王莽篡位再現、加強皇權，把三公改名只掌民政考課等閒事，並擴大尚書職權使凌駕三公，內朝成權力中心，下啟戚宦壟斷尚書專權。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢光武帝把「三公」改名為太尉、司徒、司空後，三公主要只掌管？",options:["民政、考課等閒事","審核詔令、參議朝政","統領全國軍隊","廢立皇帝"],answer:0,explain:"光武帝把三公改名為太尉、司徒、司空，只掌民政考課等閒事；審核詔令、參議朝政之權則歸尚書，尚書權力凌駕三公。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"《後漢書》謂東漢「雖置三公，事歸台閣」。「台閣」是指？",options:["御史台","尚書台","太學","內侍省"],answer:1,explain:"「事歸台閣」指東漢實權歸於尚書台（尚書），三公徒具虛名，明章以後尚書漸為宦官、外戚壟斷，外朝三公無力制止其專權。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢和帝以後，君主即位的最大特點是？",options:["多年長繼位、勵精圖治","多由外族擁立","多年幼繼位、無力理政","多由太學生選出"],answer:2,explain:"東漢和帝起君主多年幼繼位（如殤帝出生百餘日即位），又多短壽、無子嗣，無力理政，遂由太后臨朝、外戚輔政，埋下戚宦相爭之源。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢太后臨朝後，往往援引自己的父兄輔政，並授予他們哪一掌握軍政大權的職位？",options:["丞相","太尉","廷尉","大將軍領尚書事"],answer:3,explain:"東漢太后臨朝後援引父兄輔政、授「大將軍領尚書事」一職，使其掌握軍政大權，形成外戚專權；如和帝時竇太后援引兄竇憲。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"和帝十歲繼位，竇太后臨朝、援引當權的兄長是？",options:["竇憲","梁冀","鄧騭","何進"],answer:0,explain:"和帝十歲繼位，竇太后臨朝聽政、援引兄長竇憲當權，形成外戚專權；和帝長大後借宦官鄭眾誅竇憲，宦官鄭眾因而掌權。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢皇帝長大後，因受外戚嚴密監控、無法求助外朝大臣，遂借助哪一股力量剷除外戚？",options:["地方的州牧","身邊的宦官","外族的軍隊","太學的儒生"],answer:1,explain:"皇帝長大後不欲受外戚控制，但受嚴密監控、無法求助外朝大臣，只能以身邊宦官之力剷除外戚；事成後寵信宦官，形成宦官專權。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"和帝長大後，借助哪位宦官之力誅除外戚竇憲、該宦官因而掌權？",options:["單超","張讓","鄭眾","曹節"],answer:2,explain:"和帝長大後借宦官鄭眾之力誅除外戚竇憲，鄭眾因功掌權，成為東漢宦官藉助君主誅外戚而專權的先例。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"在戚宦相爭中，宦官地位較外戚穩固，其中一個原因是？",options:["宦官掌握地方兵權","宦官出身世家大族","宦官人數遠多於外戚","宦官無取代皇帝之可能，較易得皇帝信任"],answer:3,explain:"宦官較接近皇帝、感情親密；外戚擅權會威脅皇位，宦官則無取代皇帝之可能，故較易得皇帝信任，地位較外戚穩固。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢皇帝與當權外戚之間常有不和，主因是？",options:["皇帝多從宗室旁支挑選，與當權外戚並無血親關係","皇帝皆為外戚親生","外戚皆忠心護主","皇帝皆由宦官撫養"],answer:0,explain:"東漢皇帝早逝、子嗣稀少，繼位者常從宗室旁支挑選，與當權外戚並無血親關係，故皇帝長大後每欲擺脫外戚控制，戚宦相爭遂起。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢戚宦相爭循環的「起點」是？",options:["皇帝長大、連結宦官","皇帝年幼即位、母后臨朝","宦官誅殺外戚","袁紹入宮盡誅宦官"],answer:1,explain:"循環起於皇帝年幼即位、母后臨朝引外戚；皇帝長大後連結宦官奪權、宦官誅外戚；皇帝去世再立幼主，循環不已。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"東漢宦官能參與政治，可追溯至西漢哪位皇帝晚年用宦官主持中書、典尚書奏章？",options:["漢光武帝","漢明帝","漢武帝","漢和帝"],answer:2,explain:"西漢漢武帝晚年宴遊內廷、用身邊宦官主持中書、典尚書奏章，宣元帝時宦官弘恭石顯獲重用；東漢光武帝更專任宦官為中常侍，奠定宦官參政背景。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"《後漢書》謂東漢「皇統屢絕，權歸女主……貪孩童以久其政」。這最能說明戚宦相爭的根源是？",options:["皇帝長壽、政權穩固","外戚還政於君、不貪權位","宦官主動扶立賢君","皇帝早逝無嗣、外戚立幼主以久攬其政"],answer:3,explain:"「皇統屢絕、權歸女主、貪孩童以久其政」指東漢皇帝早逝無嗣，太后外戚為久攬朝政而貪立年幼之君，正是戚宦相爭循環的根源。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於東漢戚宦相爭「制度因素」的說法，哪些正確？\n(1) 光武帝為防王莽篡位再現而削弱三公\n(2) 三公改名後只掌民政、考課等閒事\n(3) 尚書職權擴大、權力凌駕三公\n(4) 光武帝恢復西漢丞相、使其總攬大權",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——光武帝是削弱三公、加強尚書，並非恢復丞相、使其總攬大權。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於東漢「外戚專權」的說法，哪些正確？\n(1) 外戚多擁立年長賢能的宗室為帝\n(2) 和帝起君主多年幼繼位、無力理政\n(3) 太后臨朝、援引父兄輔政\n(4) 外戚多獲授「大將軍領尚書事」掌軍政大權",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——外戚為方便控制君主而多擁立年幼者，並非擁立年長賢能的宗室。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於東漢「宦官得勢」的說法，哪些正確？\n(1) 皇帝長大後不欲受外戚控制\n(2) 皇帝多借助地方州牧之兵誅除外戚\n(3) 因受外戚嚴密監控、難以求助外朝大臣\n(4) 遂借身邊宦官之力剷除外戚",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——皇帝是借身邊宦官之力誅外戚，並非借地方州牧之兵。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於「宦官較外戚穩固」的原因，哪些正確？\n(1) 宦官較接近皇帝、感情較親密\n(2) 宦官無取代皇帝之可能，較易得信任\n(3) 宦官皆出身宗室、與皇帝有血緣\n(4) 外戚擅權會威脅皇位",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——宦官並非出身宗室、與皇帝無血緣；正因其無取代皇帝之可能，才較易得皇帝信任。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於東漢戚宦相爭「循環」的說法，哪些正確？\n(1) 皇帝年幼即位、母后臨朝引外戚\n(2) 皇帝長大後連結宦官、從外戚手中奪回政權\n(3) 宦官誅殺外戚、繼而得寵掌權\n(4) 此循環直至王莽篡漢方告終結",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——戚宦相爭循環直至東漢末袁紹入宮盡誅宦官方告終結，與西漢末的王莽篡漢無關。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於兩漢宦官參政背景的說法，哪些正確？\n(1) 東漢宦官從不參與政事、僅司宮中灑掃\n(2) 西漢武帝晚年用身邊宦官主持中書、典尚書奏章\n(3) 宣帝、元帝時宦官弘恭、石顯獲重用\n(4) 東漢光武帝專任宦官為中常侍、協助處理政事",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——東漢光武、明、章諸帝皆重用宦官傳詔閱奏，宦官早已參與政事，並非僅司灑掃。"},
  {topic:"戚宦·東漢戚宦相爭的原因",q:"下列關於和帝一朝戚宦相爭的說法，哪些正確？\n(1) 和帝十歲繼位、竇太后臨朝聽政\n(2) 竇太后援引兄長竇憲當權、形成外戚專權\n(3) 和帝長大後借宦官鄭眾之力誅除竇憲\n(4) 鄭眾因功掌權、開宦官藉誅外戚而專權之例",options:["只有(2)、(3)及(4)","只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:2,explain:"四項皆正確：和帝十歲繼位、竇太后臨朝援引竇憲，和帝借鄭眾誅竇憲、鄭眾因而掌權，皆為和帝一朝戚宦相爭的史實。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"東漢戚宦輪流專權，前後長達約多久？",options:["約十年","約二十年","約三百年","約一百年"],answer:3,explain:"東漢自和帝至少帝，外戚與宦官輪流專權長達約一百年，專權者只顧任用親信、貪污賣官，令朝政日壞、國力日衰。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"無論外戚或宦官專權，其共同的禍害是？",options:["任用親信、排除異己、貪污受賄、賣官鬻爵","輕徭薄賦、與民休息","整頓吏治、裁汰冗官","廣納賢才、虛懷納諫"],answer:0,explain:"外戚與宦官專權者都只顧任用親信、排除異己、貪污受賄、賣官鬻爵，又互相傾軋輪流掌權，令東漢朝政日壞、逐漸步向衰亡。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"桓帝時專政、迫害李固杜喬、抄沒巨富孫奮家財的外戚是？",options:["竇憲","梁冀","何進","鄧騭"],answer:1,explain:"桓帝時外戚梁冀專政，迫害不順從的官員李固、杜喬致死，又為侵吞扶風巨富孫奮家財而將其抄家處死，禍害百姓甚深。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"漢質帝因指斥外戚梁冀為「跋扈將軍」，結果竟被梁冀？",options:["罷官","流放","毒殺","囚禁"],answer:2,explain:"漢質帝年幼卻指斥專政的梁冀為「跋扈將軍」，竟被梁冀毒殺，反映外戚專橫、連皇帝亦不能制，朝政敗壞至極。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"梁冀「大興土木、圈佔園林、擄掠百姓做奴婢」，更聲稱這些百姓是？",options:["「黨人」","「流民」","「佃戶」","「自賣人」"],answer:3,explain:"梁冀大興土木、圈佔園林、擄掠百姓做奴婢，更狡稱他們是「自賣人」，禍害百姓甚深，是外戚專權禍國殃民的典型。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"誅除梁冀後，宦官侯覽之兄侯參任益州刺史時「借故沒收當地富戶財產」。這最能說明？",options:["外戚倒台後宦官同樣貪暴，戚宦相爭只是禍害的輪替","宦官廉潔奉公、與外戚不同","宦官還富於民","侯參整頓了益州吏治"],answer:0,explain:"誅梁冀（外戚）後，宦官侯覽之兄侯參同樣借故沒收富戶財產，說明外戚倒台後宦官照樣貪暴，戚宦相爭不過是禍害的輪替。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"質帝被毒殺、李固杜喬被害等事件，共同反映東漢政治的甚麼特徵？",options:["君主英明、賢臣得用","外戚專橫、賢臣受害，朝政敗壞、君權旁落","外戚忠良、政治清明","宦官斂跡、朝政穩定"],answer:1,explain:"質帝被毒殺、李固杜喬被害，反映外戚（梁冀）專橫跋扈、賢臣慘遭迫害，東漢朝政敗壞、君權旁落。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"下列關於東漢戚宦相爭導致朝政腐敗的說法，哪些正確？\n(1) 戚宦輪流專權長達約一百年\n(2) 專權者只顧任用親信、排除異己\n(3) 貪污受賄、賣官鬻爵，令朝政日壞\n(4) 戚宦雖專權卻廉潔奉公、政治清明",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——戚宦專權者貪污賣官、禍國殃民，令朝政日壞，並非廉潔奉公、政治清明。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"下列關於外戚梁冀專政的說法，哪些正確？\n(1) 因被質帝斥為「跋扈將軍」而幡然悔改、還政於君\n(2) 梁冀於桓帝時專政\n(3) 迫害不順從的官員李固、杜喬致死\n(4) 為侵吞巨富孫奮家財而將其抄家處死",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——質帝斥梁冀為「跋扈將軍」後反被梁冀毒殺，並非梁冀幡然悔改、還政於君。"},
  {topic:"戚宦·戚宦相爭與朝政腐敗",q:"下列關於外戚梁冀禍害的說法，哪些正確？\n(1) 梁冀於桓帝時專政\n(2) 質帝斥其跋扈後、梁冀主動辭職謝罪\n(3) 大興土木、圈佔園林、擄掠百姓做奴婢\n(4) 狡稱被擄掠的百姓為「自賣人」",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——質帝斥梁冀為「跋扈將軍」後反被梁冀毒殺，並非梁冀主動辭職謝罪。"},
  {topic:"戚宦·黨錮之禍",q:"東漢太學生關懷國事、討論朝政得失，所形成的風氣稱為？",options:["清談","清議","玄學","黨人"],answer:1,explain:"光武帝尊崇儒學、獎勵氣節，太學生多關懷國事、討論朝政得失，形成「清議」風氣；桓靈時更上書抨擊宦官亂政，終招黨錮之禍。"},
  {topic:"戚宦·黨錮之禍",q:"「黨錮」一詞的含義是？",options:["外戚禁止宦官參政","皇帝禁止外戚封侯","宦官以「黨人」罪名、終生禁止士人為官","太學生結黨營私"],answer:2,explain:"桓靈時正直官員與太學生抨擊宦官，宦官得勢報復、以「黨人」罪名終生禁止士人為官，是為「黨錮」，前後兩次。"},
  {topic:"戚宦·黨錮之禍",q:"被太學生譽為「天下模楷李元禮，不畏強御陳仲舉」的兩位反宦官名士是？",options:["郭泰、賈彪","張讓、趙忠","竇武、何進","李膺、陳蕃"],answer:3,explain:"李膺、陳蕃為反宦官名士、名滿天下，太學生譽為「天下模楷李元禮（膺），不畏強御陳仲舉（蕃）」，能受李膺延見更被視為「登龍門」。"},
  {topic:"戚宦·黨錮之禍",q:"士大夫與太學生痛恨宦官的原因之一是？",options:["宦官專權下賣官鬻爵，士人求官須行賄或投靠宦官","宦官壟斷了科舉考試","宦官禁止太學招生","宦官廢除了清議"],answer:0,explain:"宦官專權下賂賄公行，士人求官須付鉅財行賄或投靠社會身份低下的宦官，太學生既無財力又不甘為伍，故對宦官深惡痛絕。"},
  {topic:"戚宦·黨錮之禍",q:"第一次黨錮之禍發生於哪一位皇帝在位時？",options:["靈帝","桓帝","和帝","少帝"],answer:1,explain:"第一次黨錮之禍在桓帝時：李膺、陳蕃抨擊宦官、太學生響應，李膺被誣結黨誹謗朝政，桓帝下詔將「黨人」二百多人下獄、罷黜禁錮。"},
  {topic:"戚宦·黨錮之禍",q:"第二次黨錮之禍發生於靈帝時，當時掌權、與陳蕃李膺密謀誅宦官的外戚是？",options:["梁冀","何進","竇武","竇憲"],answer:2,explain:"靈帝繼位、外戚竇武掌權，陳蕃、李膺重新起用、密謀誅宦官，事洩；宦官挾持靈帝先發制人、搜捕黨人，李膺等百餘人死於獄中。"},
  {topic:"戚宦·黨錮之禍",q:"黨錮之禍後，士子「為求明哲保身，乃崇尚玄理、轉研佛學老莊」。這對後世學風的影響是？",options:["促成獨尊儒術","開創科舉制度","興起五德終始說","下啟魏晉的清談風氣"],answer:3,explain:"黨錮之禍摧殘士風氣節，士子為保身而崇尚玄理、研究佛老、空談高論，由「清議」轉為「清談」，下啟魏晉清談風氣。"},
  {topic:"戚宦·黨錮之禍",q:"靈帝竟稱「張常侍是我父，趙常侍是我母」，又有人賄賂張讓即得任刺史。這最能說明黨錮之後？",options:["宦官專權達於極點、賣官鬻爵、政治黑暗腐敗","宦官廉潔自守","皇帝勵精圖治","士人重新得勢"],answer:0,explain:"靈帝視宦官張讓趙忠如父母、孟佗賄張讓得涼州刺史，反映黨錮之後宦官專權達極點、公開賣官鬻爵，政治黑暗腐敗至極。"},
  {topic:"戚宦·黨錮之禍",q:"就士人與宦官的鬥爭結果而言，兩次黨錮之禍的總體影響是？",options:["宦官被徹底鏟除","國家忠直之士一掃而空、朝政更為腐敗，加速東漢衰亡","士人完全掌握朝政","東漢由此中興"],answer:1,explain:"兩次黨錮之禍後，正直大臣與太學生被殺或禁錮、忠直之士一掃而空，朝廷被宦官把持、朝政更腐敗，加速東漢走向衰亡。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於黨錮之禍背景的說法，哪些正確？\n(1) 光武帝尊崇儒學、獎勵氣節\n(2) 清議是宦官用以打擊士人的工具\n(3) 太學生關懷國事、形成「清議」風氣\n(4) 桓靈時正直官員與太學生上書抨擊宦官",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——清議是士人關懷國事、批評朝政的風氣，宦官則以「黨人」罪名打擊清議之士，並非清議是宦官打擊士人的工具。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於士人痛恨宦官原因的說法，哪些正確？\n(1) 士子出路狹窄，多靠進太學、依世家提拔以求一官\n(2) 桓帝時太學生已增至三萬餘人\n(3) 太學生甘願投靠宦官、依附其門下\n(4) 宦官專權下求官須行賄或投靠宦官",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——太學生經濟力量不足、又不甘依靠社會身份低下的宦官，故痛恨宦官，並非甘願投靠依附。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於兩次黨錮之禍的說法，哪些正確？\n(1) 第一次在桓帝時，黨人二百多人下獄、陳蕃被罷黜\n(2) 第二次在靈帝時，外戚竇武與陳蕃李膺密謀誅宦官\n(3) 第二次事洩，宦官先發制人、李膺等死於獄中\n(4) 兩次黨錮之禍均由外戚發動以打擊宦官",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——黨錮之禍是宦官以「黨人」罪名打擊士人，並非外戚發動以打擊宦官。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於黨錮之禍影響的說法，哪些正確？\n(1) 黨錮之禍後宦官勢力大減、士人得勢\n(2) 朝中正直之士被殺或被禁錮，人才凋零\n(3) 宦官更加橫行無忌、政治更為黑暗\n(4) 士子明哲保身、轉而崇尚玄理，下啟魏晉清談",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——黨錮之禍後忠直一掃而空、宦官更加橫行（如張讓趙忠封侯），並非宦官勢力大減、士人得勢。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於黨錮名士的說法，哪些正確？\n(1) 李膺、陳蕃為反宦官名士、名滿天下\n(2) 太學生譽為「天下模楷李元禮，不畏強御陳仲舉」\n(3) 李膺、陳蕃皆為當權宦官的首領\n(4) 能受李膺延見者被視為「登龍門」、身價十倍",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——李膺、陳蕃是抨擊宦官的正直名士，並非當權宦官的首領。"},
  {topic:"戚宦·黨錮之禍",q:"下列關於「清議」轉「清談」的說法，哪些正確？\n(1) 光武帝尊崇儒學、獎勵氣節\n(2) 太學生討論朝政得失、形成「清議」風氣\n(3) 黨錮之後士子明哲保身、轉而崇尚玄理、研究佛老\n(4) 黨錮使「清議」更盛、士人更勇於批評朝政",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——黨錮摧殘士風氣節，士人為保身而由「清議」轉為「清談」、不再勇於批評朝政。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"黃巾之亂的領袖、自稱「大賢良師」、創立「太平道」的是？",options:["張角","張讓","董卓","袁紹"],answer:0,explain:"靈帝時張角自稱「大賢良師」、創「太平道」，以符水治病聚眾，宣稱「蒼天已死，黃天當立」，發動黃巾之亂。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"張角發動黃巾之亂時的口號是？",options:["王侯將相，寧有種乎","蒼天已死，黃天當立","蒼天當立，黃天已死","誅國忠，清君側"],answer:1,explain:"張角以「蒼天已死，黃天當立，歲在甲子，天下大吉」為口號聚眾起事，黃巾軍起初聲勢浩大、遍及八州。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"導致黃巾之亂的背景，下列哪一項最切合筆記所述？",options:["輕徭薄賦、與民休息","政治清明、吏治廉潔","戚宦交替擅權、掠奪土地搜刮民財，加上連年災荒","國泰民安、府庫充盈"],answer:2,explain:"東漢後期戚宦交替擅權、掠奪土地搜刮民財，黨錮後十常侍橫徵暴斂、賣官鬻爵，又征西羌軍費浩大、連年災荒，民不聊生，遂爆發黃巾之亂。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"朝廷派哪兩位將領率重兵討伐、用兵一年便擊潰黃巾主力？",options:["袁紹、董卓","曹操、劉焉","李膺、陳蕃","皇甫嵩、盧植"],answer:3,explain:"朝廷派皇甫嵩、盧植率重兵討伐，用兵一年便擊潰黃巾主力，但黃巾餘部仍在黃河流域擾攘二十餘年，動搖了東漢統治基礎。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"黃巾亂後，宗室劉焉提議「廢史立牧」，即把地方刺史改為州牧，並給予州牧？",options:["軍、政、財大權","只掌監察之權","只掌民政之權","只掌考課之權"],answer:0,explain:"黃巾餘黨竄擾，宗室劉焉提議「廢史立牧」、改刺史為州牧，給予地方長官軍政財大權、招募私兵鎮壓，州牧得掌兵權，終致州牧割據。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"少帝時，外戚何進與朝臣袁紹合謀清除宦官，並密召哪位州牧領兵入京？",options:["曹操","董卓","劉焉","皇甫嵩"],answer:1,explain:"少帝時外戚何進與袁紹合謀清除宦官（十常侍），密召涼州牧董卓入京；事洩何進被宦官所殺，袁紹遂領兵入宮盡殺宦官。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"何進被宦官所殺後，袁紹領兵入宮的結果是？",options:["扶立宦官掌權","誅滅外戚而保全宦官","盡殺宦官二千餘人，外戚與宦官勢力皆除","平定州牧割據"],answer:2,explain:"何進被殺後，袁紹領兵入宮盡殺宦官二千餘人，至此外戚與宦官勢力皆除；不久董卓領兵入京、控制朝廷，廢少帝、立獻帝。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"董卓之後崛起、迎漢獻帝至許昌「挾天子以令諸侯」的是？",options:["董卓","袁紹","劉焉","曹操"],answer:3,explain:"董卓之後，兗州牧曹操崛起、殲滅北方群雄，迎獻帝至許昌「挾天子以令諸侯」，東漢至此名存實亡。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"東漢正式滅亡，是由誰逼漢獻帝禪位、建立哪一國號？",options:["曹丕；魏","曹操；魏","董卓；新","袁紹；魏"],answer:0,explain:"曹操死後，其子曹丕逼漢獻帝禪位、建國號「魏」，東漢正式滅亡；曹操生前則是「挾天子以令諸侯」、未稱帝。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"張角「以符水治病為手段、聚眾反政府」，反映黃巾之亂的性質是？",options:["外戚發動的宮廷政變","以宗教（太平道）組織發動的大規模民變","宦官策動的奪權","州牧之間的兼併戰爭"],answer:1,explain:"張角創太平道、以符水治病聚眾，藉宗教組織發動大規模民變，反映黃巾之亂是宗教性的農民起事，動搖東漢統治基礎。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"從「黨錮之禍→宦禍加劇→黃巾之亂→州牧割據→東漢滅亡」的脈絡看，東漢滅亡的根源在於？",options:["外族入侵","君主勤政過度","戚宦相爭、宦官專權令朝政腐敗，引發連鎖禍亂","太學生作亂"],answer:2,explain:"黨錮之禍源於宦官打擊士人，宦禍加劇致民變（黃巾）、為平亂而廢史立牧致州牧割據，終至東漢滅亡，根源在戚宦相爭、宦官專權令朝政腐敗。"},
  {topic:"戚宦·黃巾之亂與東漢滅亡",q:"下列東漢末事件按時間先後排列，何者正確？\n(甲) 袁紹入宮盡殺宦官\n(乙) 黃巾之亂爆發\n(丙) 曹丕篡漢、建國號魏",options:["甲→乙→丙","丙→甲→乙","甲→丙→乙","乙→甲→丙"],answer:3,explain:"黃巾之亂（乙）在先，其後少帝時袁紹入宮盡殺宦官（甲），再經董卓曹操之世，最終曹丕篡漢建魏（丙）。"},

function buildCourse(){
  const box=document.getElementById('courseChips');box.innerHTML='';
  const wbN=wbGet().length;
  if(wbN>0){
    const wb=document.createElement('div');wb.className='course-card';
    wb.style.borderColor='var(--gold)';wb.style.borderStyle='dashed';
    wb.innerHTML='<div class="course-name">\ud83d\udcd5 我的錯題本</div><div class="course-meta">共 '+wbN+' 題 · 答對後自動移除 · 不計入排行榜</div>';
    wb.onclick=startWrongBook;
    box.appendChild(wb);
  }
  COURSES.forEach(co=>{
    const tps=co.topics.filter(t=>QUESTIONS.some(q=>q.topic===t));
    const cnt=QUESTIONS.filter(q=>tps.includes(q.topic)).length;
    const el=document.createElement('div');el.className='course-card';
    el.innerHTML='<div class="course-name">'+co.name+'</div><div class="course-meta">'+tps.length+' 個範圍 · 共 '+cnt+' 題</div>';
    el.onclick=()=>selectCourse(co.name);
    box.appendChild(el);
  });
}
function selectCourse(name){
  state.course=name;buildSetup();go('setup');
}
function buildSetup(){
  const co=COURSES.find(c=>c.name===state.course)||COURSES[0];
  const topics=co.topics.filter(t=>QUESTIONS.some(q=>q.topic===t));
  state.topics=[...topics];
  document.getElementById('courseLabel').textContent='課題：'+co.name;
  const box=document.getElementById('topicChips');box.innerHTML='';
  topics.forEach(t=>{
    const el=document.createElement('div');el.className='chip on';el.textContent=t;
    el.onclick=()=>{el.classList.toggle('on');syncTopics();};box.appendChild(el);
  });
  document.querySelectorAll('#countChips .chip').forEach(c=>{
    c.onclick=()=>{document.querySelectorAll('#countChips .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');state.count=c.dataset.c;};
  });
  syncTopics();
}
function syncTopics(){
  state.topics=[...document.querySelectorAll('#topicChips .chip.on')].map(c=>c.textContent);
  const n=QUESTIONS.filter(q=>state.topics.includes(q.topic)).length;
  document.getElementById('poolInfo').textContent='可選題庫共 '+n+' 題';
}
function toggleAllTopics(){
  const chips=[...document.querySelectorAll('#topicChips .chip')];
  const allOn=chips.every(c=>c.classList.contains('on'));
  chips.forEach(c=>c.classList.toggle('on',!allOn));syncTopics();
}
function startQuiz(){
  let pool=QUESTIONS.filter(q=>state.topics.includes(q.topic));
  if(pool.length===0){alert('請至少選擇一個範圍');return;}
  pool=shuffle([...pool]);
  if(state.count!=='all')pool=pool.slice(0,Math.min(parseInt(state.count),pool.length));
  state.pool=pool;state.perms=pool.map(()=>shuffle([0,1,2,3]));state.answers=new Array(pool.length).fill(null);state.cur=0;
  go('quiz');renderQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderQ(){
  const q=state.pool[state.cur],ans=state.answers[state.cur];
  document.getElementById('qPos').textContent='第 '+(state.cur+1)+' / '+state.pool.length+' 題';
  document.getElementById('qScore').textContent=score();
  document.getElementById('qBar').style.width=((state.cur)/state.pool.length*100)+'%';
  document.getElementById('qTopic').textContent=q.topic;
  document.getElementById('qText').textContent=q.q;
  const ob=document.getElementById('qOptions');ob.innerHTML='';
  const perm=(state.perms&&state.perms[state.cur])?state.perms[state.cur]:[0,1,2,3];
  perm.forEach((oi,j)=>{
    const el=document.createElement('div');el.className='option';
    const mk=document.createElement('span');mk.className='mk';mk.textContent=MARKS[j];
    const tx=document.createElement('span');tx.textContent=q.options[oi];
    el.appendChild(mk);el.appendChild(tx);
    if(ans!==null){el.classList.add('locked');if(oi===q.answer)el.classList.add('correct');else if(oi===ans)el.classList.add('wrong');}
    else{el.onclick=()=>answer(oi);}
    ob.appendChild(el);
  });
  const ex=document.getElementById('qExplain');
  if(ans!==null){ex.innerHTML='<b>解析：</b>'+esc(q.explain);ex.classList.add('show');}
  else{ex.classList.remove('show');ex.innerHTML='';}
  document.getElementById('btnPrev').disabled=(state.cur===0);
  document.getElementById('btnNext').textContent=(state.cur===state.pool.length-1)?'交卷':'下一題';
}
function answer(i){state.answers[state.cur]=i;const q=state.pool[state.cur];if(q&&typeof q._id==='number'){if(i===q.answer)wbRemove(q._id);else wbAdd(q._id);}document.getElementById('qScore').textContent=score();renderQ();}
function score(){return state.pool.reduce((s,q,i)=>s+(state.answers[i]===q.answer?1:0),0);}
function prevQ(){if(state.cur>0){state.cur--;renderQ();}}
function nextQ(){if(state.cur<state.pool.length-1){state.cur++;renderQ();}else finish();}
async function finish(){
  const sc=score(),total=state.pool.length,pct=Math.round(sc/total*100);
  document.getElementById('resScore').textContent=sc+'/'+total;
  document.getElementById('resPct').textContent=pct+'%';
  const ring=document.getElementById('scoreRing');
  let col='var(--wrong)',v='繼續努力！',sub='重溫一下相關章節，再挑戰一次。';
  if(pct>=85){col='var(--correct)';v='表現優異！';sub='史學根基紮實，值得嘉許。';}
  else if(pct>=60){col='var(--gold)';v='合格達標';sub='大致掌握，仍有提升空間。';}
  ring.style.background=col;
  document.getElementById('resVerdict').textContent=v;
  document.getElementById('resSub').textContent=sub;
  if(state.course!=='錯題本'){await saveScore({name:state.student.name,cls:state.student.cls,no:state.student.no,score:sc,total:total,pct:pct,topic:(state.course||"未指定"),date:new Date().toISOString()});}
  go('result');
}
function reviewWrong(){
  const wrong=state.pool.map((q,i)=>({q,i})).filter(o=>state.answers[o.i]!==o.q.answer);
  if(wrong.length===0){alert('全部答對，沒有錯題！');return;}
  state.cur=state.pool.indexOf(wrong[0].q);go('quiz');renderQ();
}

function wbKey(){const s=state.student;return 'cn_hist_wrongbook_'+(s?(s.cls+'_'+s.no+'_'+s.name):'guest');}
function wbGet(){try{const v=localStorage.getItem(wbKey());if(!v)return[];const a=JSON.parse(v);return Array.isArray(a)?a.filter(i=>Number.isInteger(i)&&i>=0&&i<QUESTIONS.length):[];}catch(e){return[];}}
function wbSave(a){try{localStorage.setItem(wbKey(),JSON.stringify(a));}catch(e){}}
function wbAdd(id){const a=wbGet();if(!a.includes(id)){a.push(id);wbSave(a);}}
function wbRemove(id){const a=wbGet();const i=a.indexOf(id);if(i>=0){a.splice(i,1);wbSave(a);}}
function startWrongBook(){
  const ids=wbGet();
  if(ids.length===0){alert('錯題本是空的——先去練習吧！');return;}
  let pool=shuffle(ids.map(i=>QUESTIONS[i]));
  state.course='錯題本';
  state.pool=pool;state.perms=pool.map(()=>shuffle([0,1,2,3]));
  state.answers=new Array(pool.length).fill(null);state.cur=0;
  go('quiz');renderQ();
}
const LB_KEY='cn_history_leaderboard_xizhou';

/* ============================================================
   全班跨裝置共享排行榜（後台）
   部署 Google Apps Script 後，把網址（以 /exec 結尾）貼在下面
   兩個引號之間即可。留空則只用本機儲存。
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzMZQGIINcsd0y41J_X6urgh9V84g4Xd6mrfb-DIYMbUsPGD6EA9NKu8tTf8BtpKR9A/exec";

function localGet_(){
  return (async function(){
    try{
      if(window.storage){const r=await window.storage.get(LB_KEY,true);return r?JSON.parse(r.value):[];}
      if(window.localStorage){const v=localStorage.getItem(LB_KEY);return v?JSON.parse(v):[];}
    }catch(e){}
    return [];
  })();
}
// 讀取排行榜：先試 fetch 讀 JSON，失敗再用 JSONP，雙保險避開 CORS
function fetchJson_(){
  return (async function(){
    try{
      var r=await fetch(BACKEND_URL+'?t='+Date.now(),{method:'GET'});
      if(r&&r.ok){var j=await r.json(); if(j&&Array.isArray(j.list))return j.list;}
    }catch(e){}
    return null;
  })();
}
function jsonp_(){
  return new Promise(function(resolve){
    var cb='lbcb_'+Math.floor(Math.random()*1e9),done=false;
    var s=document.createElement('script');
    function fin(v){if(done)return;done=true;try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);resolve(v);}
    window[cb]=function(d){fin(d&&Array.isArray(d.list)?d.list:[]);};
    s.onerror=function(){fin(null);};
    s.src=BACKEND_URL+'?callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
    setTimeout(function(){fin(null);},10000);
  });
}
async function getLeaderboard(){
  if(BACKEND_URL){
    var a=await fetchJson_(); if(a)return a;
    var b=await jsonp_();     if(b)return b;
    return [];
  }
  return localGet_();
}
// 儲存成績：用 GET 傳參數，避開 POST 轉址問題
async function saveScore(entry){
  if(BACKEND_URL){
    try{
      var qs='?action=save'
        +'&name='+encodeURIComponent(entry.name)
        +'&cls='+encodeURIComponent(entry.cls)
        +'&no='+encodeURIComponent(entry.no)
        +'&score='+encodeURIComponent(entry.score)
        +'&total='+encodeURIComponent(entry.total)
        +'&pct='+encodeURIComponent(entry.pct)
        +'&topic='+encodeURIComponent(entry.topic||'西周的封建')
        +'&t='+Date.now();
      await fetch(BACKEND_URL+qs,{method:'GET',mode:'no-cors'});
    }catch(e){}
    return;
  }
  try{
    let list=await localGet_();
    list.push(entry);
    list.sort((a,b)=>b.pct-a.pct||b.score-a.score||new Date(a.date)-new Date(b.date));
    list=list.slice(0,50);
    if(window.storage){await window.storage.set(LB_KEY,JSON.stringify(list),true);}
    else if(window.localStorage){localStorage.setItem(LB_KEY,JSON.stringify(list));}
  }catch(e){}
}
async function openLeaderboard(){
  const list=await getLeaderboard();
  const t=document.getElementById('lbTable');
  let html='<div class="lb-row head"><span>排名</span><span>學生</span><span class="sc">得分</span><span class="dt">日期</span></div>';
  if(list.length===0){html+='<div class="lb-empty">暫無紀錄，快來成為第一名！</div>';}
  else{
    list.slice(0,10).forEach((e,i)=>{
      const d=new Date(e.date),md=(d.getMonth()+1)+'/'+d.getDate();
      const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
      html+='<div class="lb-row '+cls+'"><span class="rank">'+(i+1)+'</span><span>'+esc(e.name)+'（'+esc(e.cls)+'）</span><span class="sc">'+e.score+'/'+e.total+'</span><span class="dt">'+md+'</span></div>';
    });
  }
  t.innerHTML=html;document.getElementById('lbModal').classList.add('show');
}
function closeLeaderboard(){document.getElementById('lbModal').classList.remove('show');}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
document.getElementById('lbModal').addEventListener('click',e=>{if(e.target.id==='lbModal')closeLeaderboard();});
</script>
