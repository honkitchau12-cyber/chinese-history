  {topic:"漢·獨尊儒術的原因",q:"下列關於漢初「無為而治」遺留問題的說法，哪些正確？\n(1) 無為而治使中央財政長期空虛、國庫一無所有\n(2) 同姓諸侯王勢力坐大，危及中央\n(3) 商賈豪強兼併土地、操控物價，民生困苦\n(4) 和親政策無助減少匈奴騷擾，反壯大其野心",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——漢初與民休息反令國庫充盈、府庫餘財，問題在於放任所生的內憂外患，並非國庫一無所有。"},
  {topic:"漢·獨尊儒術的原因",q:"下列關於武帝尊儒前「其他學派不合時宜」的說法，哪些正確？\n(1) 法家因秦尚法速亡而不被輿論擁戴，漢不敢公然重用\n(2) 道家黃老最切合武帝『有為』的統治需要\n(3) 墨家兼愛非攻、刻苦耐勞，不利中央集權\n(4) 縱橫家被視為亂世僥倖求利之工具，對國家無貢獻",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——黃老無為正與武帝『有為』格格不入，並不切合其統治需要，故武帝改尊儒術。"},
  {topic:"漢·獨尊儒術的原因",q:"下列關於「漢初儒學影響力漸大」的說法，哪些正確？\n(1) 高祖取消「挾書律」後，不少儒生向朝廷獻書\n(2) 高祖曾命儒生叔孫通制定朝儀\n(3) 漢初朝廷明令禁絕儒家、獨立黃老為唯一官學\n(4) 文景時所置博士以儒生人數最多",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——漢初雖尊黃老，但對各學派一視同仁、皆立為官學，並無明令禁絕儒家。"},
  {topic:"漢·獨尊儒術的原因",q:"下列關於董仲舒改造儒學的說法，哪些正確？\n(1) 提出「天人三策」、建議尊儒\n(2) 主張「大一統、隆君權、興教化」\n(3) 糅合陰陽家「君權天授」與源於法家的「三綱」\n(4) 為武帝強化皇權、集權中央提供理論根據",options:["只有(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)","(1)、(2)、(3)及(4)"],answer:3,explain:"四項皆正確：天人三策、大一統隆君權興教化、糅合陰陽家與法家、為集權提供理論，皆為董仲舒改造儒學的內容與作用。"},
  {topic:"漢·獨尊儒術的原因",q:"下列關於武帝尊儒「主觀」因素的說法，哪些正確？\n(1) 自幼受舅父田蚡、老師王臧影響，對儒家有好感\n(2) 十六歲即位、好勝進取，與黃老無為格格不入\n(3) 董仲舒的主張迎合其中央集權需要\n(4) 武帝即位即無人掣肘，隨即獨尊儒術",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——武帝即位之初仍受崇尚黃老的竇太后掣肘，待其病逝後才得以獨尊儒術，並非即位即無人掣肘。"},
  {topic:"漢·加強中央集權",q:"武帝為削弱相權，擴大尚書、侍中等近臣職權，於宮中形成的新決策機構稱為？",options:["外朝","內朝","三公","郡國"],answer:1,explain:"武帝擴大尚書、侍中等近臣職權，於宮中形成「內朝」決策，丞相九卿等「外朝」淪為執行機關。"},
  {topic:"漢·加強中央集權",q:"武帝任用出身布衣的何人為相，藉以降低丞相地位、使其唯皇帝之命是從？",options:["晁錯","主父偃","公孫弘","蕭何"],answer:2,explain:"武帝一改任用功臣為相的傳統，以平民出身的公孫弘為相，藉此降低丞相地位、強化皇權。"},
  {topic:"漢·加強中央集權",q:"武帝接納主父偃建議、規定諸侯王須把部分領地分封子弟為侯的措施是？",options:["酎金奪爵","附益之法","左官之律","推恩令"],answer:3,explain:"「推恩令」令諸侯王傳嫡長子之餘須分封子弟為侯，封地改隸於郡，使封國越分越小、無力威脅中央。"},
  {topic:"漢·加強中央集權",q:"推恩令下，諸侯王其他子弟受封的侯國封地，改為隸屬於？",options:["受中央管轄的郡（地位相當於縣）","原來的王國","中央的內朝","京師七郡的司隸校尉"],answer:0,explain:"受封子弟的侯國不再隸屬王國，改隸於受中央管轄的郡、地位相當於縣，故封國勢力被層層分割。"},
  {topic:"漢·加強中央集權",q:"諸侯勢力瓦解後得以「全面推行」、由皇帝任免全部官員的地方制度是？",options:["郡國並行制","郡縣制","封建制","三省六部制"],answer:1,explain:"諸侯勢力瓦解後郡縣制全面推行，全國郡達八十餘，官員由皇帝任免、聽命中央，中央完全掌控地方。"},
  {topic:"漢·加強中央集權",q:"杜佑《通典》載漢初「丞相進，天子御座為起……丞相有病，皇帝親至問疾」。此最能說明武帝設內朝之前的情況是？",options:["丞相只是擺設、毫無實權","皇帝與丞相地位平等而互不統屬","丞相位高權重，足以威脅皇權","丞相由平民擔任、地位低微"],answer:2,explain:"此載突顯漢初丞相位高權重、禮遇甚隆，正是武帝其後設內朝削相權、移決策入宮中的背景。"},
  {topic:"漢·加強中央集權",q:"主父偃稱推恩令「上以德施，實分其國，不削稍弱矣」。此語最能說明推恩令的高明之處在於？",options:["以武力強行削奪、立竿見影","完全恢復封建、還權諸侯","令諸侯國面積越分越大","以「推恩」之名行分割之實，使諸侯不削而自弱、減少反抗"],answer:3,explain:"推恩令名為施恩分封子弟，實則層層分割封國，使諸侯「不削稍弱」，較直接削藩更少激起反抗。"},
  {topic:"漢·加強中央集權",q:"有指推恩令體現「儒表法裡」：「推恩」合儒家仁愛推廣之義，「令」則具強制之意。這最能說明武帝施政的特色是？",options:["以儒家旗號包裝、實達法家集權之目的","純以儒家仁政治國、毫無強制","純以法家暴力治國、不講名義","完全放棄中央集權"],answer:0,explain:"「推恩」披儒家外衣、「令」具法家強制，正體現武帝以儒為表、以法為裡，藉仁義之名行集權之實。"},
  {topic:"漢·加強中央集權",q:"下列「原因→結果」配對，哪一組成立？",options:["因設內朝，故丞相權力大增","因推恩令層層分封子弟，故封國越分越小、無力威脅中央","因酎金奪爵，故諸侯國數量大增","因派刺史六條問事，故中央失去對地方的監察"],answer:1,explain:"只有「推恩令→封國越分越小」成立；內朝是削相權、酎金是減諸侯、刺史是強化監察，其餘三組皆與史實相反。"},
  {topic:"漢·加強中央集權",q:"史載武帝在位五十餘年間用相達十三人、平均任期不足五年，且有丞相被罷免或下獄處死。此現象最能反映？",options:["武帝極為尊重相權、放手讓相治國","丞相多因年老自然退任","武帝刻意降低並控制相權，使丞相唯命是從","漢初非有功不得拜相的慣例仍未打破"],answer:2,explain:"頻繁任免、罷免下獄反映武帝有意壓低相權、使丞相不敢與皇帝作對，從而獨掌大權。"},
  {topic:"漢·加強中央集權",q:"下列關於武帝以「內朝」削弱相權的說法，哪些正確？\n(1) 擴大尚書、侍中等近臣職權，於宮中形成內朝\n(2) 丞相、九卿等外朝淪為執行政務的機關\n(3) 設「大司馬大將軍領尚書事」為內朝領袖，多以外戚出任\n(4) 內朝的設立反而令丞相權力大為增強",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——內朝架空丞相，將決策移入宮中，丞相權力大為削弱，並非令丞相權力增強。"},
  {topic:"漢·加強中央集權",q:"下列關於武帝削奪封國權力的措施，哪些正確？\n(1) 「推恩令」由晁錯向武帝建議推行\n(2) 頒「推恩令」分封諸侯子弟為侯\n(3) 以「酎金奪爵」廢去大批諸侯之爵\n(4) 立「左官之律」，使曾任諸侯官屬者不得再到中央任官",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——推恩令由主父偃建議；晁錯是景帝時主張削藩之臣。"},
  {topic:"漢·加強中央集權",q:"下列關於武帝任用酷吏、打擊豪強的說法，哪些正確？\n(1) 強制各地豪強遷離現居地以削弱其勢力\n(2) 「酎金奪爵」是武帝打擊地方豪強的主要措施\n(3) 任用趙禹、張湯、杜周等酷吏打擊不法\n(4) 增補《漢律》、刑名繁苛，與漢初「約法省禁」相反",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——酎金奪爵是削奪諸侯爵位的措施；打擊豪強靠強制遷徙與任用酷吏。"},
  {topic:"漢·加強中央集權",q:"下列關於武帝建立皇權象徵的措施，哪些正確？\n(1) 首創年號，第一個年號為「建元」\n(2) 制定新曆「太初曆」、改正月為歲首\n(3) 下令重修《氏族志》、列劉氏皇族為第一等\n(4) 登泰山封禪，祭告上帝以使政權合法化",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——《氏族志》是唐太宗命高士廉所修、列李姓皇族第一，並非漢武帝之事。"},
  {topic:"漢·加強中央集權",q:"下列關於武帝加強地方監察的說法，哪些正確？\n(1) 刺史地位凌駕郡守之上、總攬地方行政大權\n(2) 劃全國為十三監察區（州）、派刺史監察\n(3) 刺史以「六條問事」監察郡縣官吏及豪強\n(4) 於京師七郡設司隸校尉、彈劾公卿貴戚",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——刺史雖權重卻位卑，職在監察而非總攬地方行政，地位並不凌駕郡守之上。"},
  {topic:"漢·開創士人政府",q:"武帝接納董仲舒建議，於京師設置太學，置教授《詩》《書》《禮》《易》《春秋》的是？",options:["五經博士","六條問事官","榷酤官","司隸校尉"],answer:0,explain:"武帝在太學置五經博士教授《五經》，並遣散其他學派博士，使官學專於儒家。"},
  {topic:"漢·開創士人政府",q:"武帝在地方推行、由郡國長官每年選拔孝子廉吏推舉至中央的選官制度是？",options:["九品中正制","察舉制（舉孝廉）","科舉制","世卿世祿制"],answer:1,explain:"武帝納董仲舒議行察舉制，郡國每年舉孝子、廉吏各一（舉孝廉），使政府從全國吸納人才。"},
  {topic:"漢·開創士人政府",q:"武帝以出身布衣的儒生公孫弘為相、後封「平津侯」，其制度意義是？",options:["恢復世卿世祿制","確立宦官專政","打破漢初「非有功不得封侯、非封侯不得拜相」的慣例，提高儒生政治地位","廢除丞相一職"],answer:2,explain:"公孫弘以布衣拜相封侯，開儒生任政府首領之先例，打破功臣壟斷相位的慣例，儒生地位大升。"},
  {topic:"漢·開創士人政府",q:"武帝下令於郡設「學」、縣設「校」、鄉設「庠」、村設「序」，其作用是？",options:["設置鹽鐵專賣機構","劃分十三監察州","建立內朝決策機構","確立地方官學制度、傳揚儒學"],answer:3,explain:"郡學、縣校、鄉庠、村序確立了地方官學制度，使儒學循各級學校傳揚開去。"},
  {topic:"漢·開創士人政府",q:"錢穆稱「漢代的政府，是一個崇尚文治的政府，即士人政府」。此語最能肯定武帝哪一方面的影響？",options:["起用儒生、建立士人主導的文治政府","以酷吏嚴刑治國","恢復封建貴族政治","以外戚把持朝政"],answer:0,explain:"錢穆以「崇尚文治」「士人政府」概括武帝起用儒生、轉宗室功臣政府為士人政府的文治成就。"},
  {topic:"漢·開創士人政府",q:"博士弟子員「成績優異者為郎官（中央官）、次者為郡吏（地方官）」。此制度最重要的開創意義是？",options:["恢復按軍功封爵的舊制","開闢了「讀書入仕」的途徑，使平民可憑學問為官","確立由皇帝親自考核武藝選官","令官位只能用錢買賣"],answer:1,explain:"太學弟子按成績授官，把讀書與入仕掛鈎，開平民憑學問為官之途，是士人政府的制度基礎。"},
  {topic:"漢·開創士人政府",q:"傅樂成謂「儒家之反功利思想，使漢朝無法訂立進取性的政策……更直接阻礙進取人才的發展」。此屬對獨尊儒術的？",options:["正面肯定","純粹史實記述","負面評價（指其偏狹、妨礙進取）","對武帝開疆拓土的讚揚"],answer:2,explain:"傅樂成指儒家反功利使漢難立進取政策、阻礙進取人才，屬對獨尊儒術流弊的負面評價。"},
  {topic:"漢·開創士人政府",q:"有學者指武帝「尊儒而不用儒」，董仲舒等大儒「尊而不重用」，真正重用的是趙禹、張湯等酷吏。這最能說明？",options:["武帝完全不信任儒生、全用道家","董仲舒實際掌握朝政大權","武帝徹底廢除法家、專任大儒","武帝表面尊儒、實則倚重法家能吏（儒表法裡）"],answer:3,explain:"尊董仲舒之名而重用張湯等酷吏，正說明武帝以儒為表、以法吏為實際施政骨幹。"},
  {topic:"漢·開創士人政府",q:"下列關於武帝開創士人政府的措施，哪些正確？\n(1) 於京師設太學、置五經博士\n(2) 行察舉制、令郡國舉孝廉\n(3) 以布衣儒生公孫弘為相\n(4) 規定丞相一職只能由開國功臣子弟世襲擔任",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——武帝正是要打破功臣子弟壟斷相位的慣例、起用布衣儒生，並非規定丞相由功臣子弟世襲。"},
  {topic:"漢·開創士人政府",q:"下列關於士人政府形成及其影響的說法，哪些正確？\n(1) 士人政府之下，「郎官」屬地方官、「郡吏」屬中央官\n(2) 把教育、考試與選官相結合，建立文官制度的基礎\n(3) 打破漢初宗室、功臣壟斷政治的局面\n(4) 平民可循學習與被舉途徑入仕，推動社會流動",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——剛好相反——郎官是中央官、郡吏是地方官。"},
  {topic:"漢·開創士人政府",q:"下列關於「儒表法裡」（外儒內法）的說法，哪些正確？\n(1) 公孫弘「習文法吏事」而又「緣飾以儒術」\n(2) 汲黯稱許武帝「外施仁義、內行德政」\n(3) 有學者指武帝「尊儒而不用儒」，真正重用趙禹、張湯等酷吏\n(4) 武帝不能公開以法家治國，因秦尚法暴亡、人人諱言法家",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——汲黯之語是「內多欲而外施仁義」的譏評，並非稱許其內行德政。"},
  {topic:"漢·開創士人政府",q:"下列關於太學與博士弟子員的說法，哪些正確？\n(1) 太學置五經博士教授《五經》\n(2) 太學兼授道、法、墨各家學說、兼容並蓄\n(3) 公孫弘建議選優秀青年為博士弟子員\n(4) 弟子員成績優者為郎官、次者為郡吏",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——武帝置五經博士並遣散他派博士，太學專授儒家經典，並非兼容諸家。"},
  {topic:"漢·新經濟政策",q:"武帝推行新經濟政策，主要與哪位理財之臣商議籌劃？",options:["桑弘羊","董仲舒","主父偃","叔孫通"],answer:0,explain:"武帝與桑弘羊、張湯等商議推行新經濟政策，桑弘羊更是統一幣制、均輸、平準等措施的主要建議者。"},
  {topic:"漢·新經濟政策",q:"武帝下令禁止私鑄、規定為全國唯一合法貨幣、由中央統一鑄造的是？",options:["半兩錢","五銖錢","刀幣","交子"],answer:1,explain:"武帝採桑弘羊議禁私鑄、定五銖錢為唯一合法貨幣由中央鑄造，收回貨幣發行權、解決通貨膨脹。"},
  {topic:"漢·新經濟政策",q:"武帝把哪幾項利潤豐厚的生活用品收歸國家專賣、嚴禁私營？",options:["米、布、絲","茶、馬、瓷","鹽、鐵、酒","紙、墨、書"],answer:2,explain:"武帝把鹽、鐵、酒收歸國家專賣，設鹽官、鐵官、榷酤官管理產銷，奪商人財源、充實國庫。"},
  {topic:"漢·新經濟政策",q:"接納桑弘羊建議、令郡國貢品交當地官員運往高價地出售再採購京師所需的措施是？",options:["平準法","算緡令","推恩令","均輸法"],answer:3,explain:"均輸法令郡國貢品交均輸官運高價地出售、再購京師所需，省運費、減負擔，並為官府增利。"},
  {topic:"漢·新經濟政策",q:"在長安設官員「賤買貴賣」以調節物價、打擊囤積居奇的措施是？",options:["平準法","均輸法","告緡令","酎金奪爵"],answer:0,explain:"平準法在長安設平準官搜羅貨物、賤買貴賣，調節供求、平抑物價、杜絕囤積，並從中增收。"},
  {topic:"漢·新經濟政策",q:"《史記》謂新經濟政策推行後「民不益賦而天下用饒」。此語最能說明新經濟政策的特點是？",options:["主要靠大幅加徵農民田租","主要以抑商增收為手段，未直接加重一般農民的田賦負擔","全面放任工商、藏富於商","以對外掠奪充實國庫"],answer:1,explain:"「民不益賦而天下用饒」指主要打擊壟斷商賈以增收，並未直接加重農民田賦，故國用充足而民賦未增。"},
  {topic:"漢·新經濟政策",q:"桓寬《鹽鐵論》載官府監製的鐵器「質劣而價昂，鐮刀無法收割」。此最能說明鹽鐵專賣的？",options:["成效：大幅提升農具質素","成效：徹底解決土地兼併","局限：官營質素難保、定價偏高，反損民生","背景：商賈質素低劣"],answer:2,explain:"官營鐵器質劣價昂、損及農事，正點出鹽鐵專賣「官製質素難保」的局限。"},
  {topic:"漢·新經濟政策",q:"《史記》謂告緡令推行後「商賈中家以上大抵破」。此最能說明告緡的？",options:["對農民田賦影響甚大","令商人更加富裕","與商業全無關係","對商人勢力打擊極大，導致大量商人破產"],answer:3,explain:"「中家以上大抵破」反映告緡沒收財產、嚴打瞞報，對商人勢力打擊極大、令大量商人破產。"},
  {topic:"漢·新經濟政策",q:"下列「原因→結果」配對，哪一組成立？",options:["因鹽鐵酒收歸專賣，故商人財源被奪、勢力受抑","因鑄五銖錢，故通貨膨脹更趨嚴重","因行均輸法，故京師貢品運費大增","因徵算緡，故商人財富不受影響"],answer:0,explain:"只有「專賣→奪商人財源」成立；五銖錢是解決而非加劇通脹、均輸是省運費、算緡正打擊商人財富，其餘皆與史實相反。"},
  {topic:"漢·新經濟政策",q:"武帝雖大力抑商，卻仍保持「三十稅一」低田租、遷徙豪強、推廣代田法。這最能說明新經濟政策？",options:["同時重稅打擊農民","抑商之餘仍重視農業、未損一般農民利益","旨在扶植大商人","完全放棄農業生產"],answer:1,explain:"保持低田租、遷豪強、推廣代田法等顯示武帝抑商之餘仍重農，新經濟政策以抑商為主而未損農民。"},
  {topic:"漢·新經濟政策",q:"下列關於武帝推行新經濟政策背景的說法，哪些正確？\n(1) 漢初放任工商，豪商壟斷鹽鐵、囤積居奇、操控物價\n(2) 民間私鑄錢幣導致幣制紊亂、通貨膨脹\n(3) 漢初國庫早已空虛，故武帝即位即被迫增稅\n(4) 武帝好大喜功、對外征戰，軍費龐大、財用不足",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——武帝財用不足是因其本人征戰奢侈耗盡文景積蓄，而非漢初國庫早已空虛、即位即被迫增稅。"},
  {topic:"漢·新經濟政策",q:"下列關於統一幣制（五銖錢）的說法，哪些正確？\n(1) 下令禁止私鑄錢幣\n(2) 以五銖錢為全國唯一合法貨幣、中央統一鑄造\n(3) 五銖錢質量高、難以仿鑄，私鑄無利可圖\n(4) 武帝放任諸侯與富商繼續私鑄以增貨幣供應",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——統一幣制正是要禁私鑄、收回貨幣發行權，並非放任諸侯富商繼續私鑄。"},
  {topic:"漢·新經濟政策",q:"下列關於鹽鐵酒專賣的說法，哪些正確？\n(1) 專賣使民間獲利豐厚，商人因而更加富裕\n(2) 把鹽、鐵、酒收歸國家專賣、嚴禁私營\n(3) 設鹽官、鐵官、榷酤官管理產銷\n(4) 奪去商人財源、充實國庫，卻被視為與民爭利",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——專賣正是要奪商人財源、收利於官，商人因而失去財源、勢力受抑，並非更加富裕。"},
  {topic:"漢·新經濟政策",q:"下列關於均輸法與平準法的說法，哪些正確？\n(1) 均輸法令貢品就近高價出售、再購京師所需，省卻運費\n(2) 均輸、平準之法由董仲舒所創議\n(3) 平準法在長安設平準官賤買貴賣、平抑物價\n(4) 兩法皆有官員藉以壟斷牟利、損害民生的流弊",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——均輸、平準由桑弘羊建議推行，並非董仲舒。"},
  {topic:"漢·新經濟政策",q:"下列關於算緡與告緡的說法，哪些正確？\n(1) 算緡向商人按財產徵稅\n(2) 商人須據實申報財產，藏匿不報者罰戍邊、財產充公\n(3) 算緡告緡只針對豪強官吏，與商人全無關係\n(4) 告緡鼓勵舉報，告發人可得被充公財產之半",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——算緡告緡正是針對商人徵財產稅與舉報瞞報，並非與商人無關。"},
  {topic:"漢·開疆拓土",q:"武帝一改和親政策、主動出擊匈奴，所重用的兩位名將是？",options:["蕭何、張良","趙禹、張湯","主父偃、晁錯","衛青、霍去病"],answer:3,explain:"武帝派名將衛青、霍去病三次大舉北伐匈奴，收復河套、把匈奴逐至漠北，解除其對漢室的威脅。"},
  {topic:"漢·開疆拓土",q:"武帝北伐匈奴後，在河西走廊設置的「河西四郡」是指？",options:["張掖、武威、酒泉、敦煌","上谷、漁陽、右北平、遼西","南海、桂林、象郡、合浦","隴西、北地、上郡、雲中"],answer:0,explain:"武帝逐匈奴至漠北後置河西四郡（張掖、武威、酒泉、敦煌），鞏固對河西的控制。"},
  {topic:"漢·開疆拓土",q:"張騫出使西域的最重要長遠影響是？",options:["即時消滅匈奴主力","開闢漢與西域往來的道路，奠定「絲綢之路」基礎","使西域諸國盡入漢版圖","引入科舉制度"],answer:1,explain:"張騫出使雖未即時聯成夾擊，卻開通漢與西域道路、奠定絲綢之路基礎，並使漢室聲威傳至西域。"},
  {topic:"漢·開疆拓土",q:"武帝開疆拓土的成效可概括為「版圖擴大」與「聲威遠播」。下列何者屬「聲威遠播」一面？",options:["設河西四郡鞏固河西","收復河套地區","張騫通西域後，西域國家相繼入貢稱臣","在南越設置郡縣"],answer:2,explain:"西域諸國相繼入貢稱臣屬「聲威遠播」；設郡、收河套、置河西四郡則屬「版圖擴大」的實土經營。"},
  {topic:"漢·開疆拓土",q:"張騫出使西域原本的軍事目的是「斷匈奴右臂」，意指？",options:["切斷匈奴與南越的聯繫","封鎖匈奴的海上通道","聯合朝鮮進攻匈奴","聯合西域（如大月氏）夾擊匈奴、削其側翼"],answer:3,explain:"「斷匈奴右臂」指聯合西域大月氏等夾擊匈奴、削其側翼，配合北伐以解除匈奴威脅。"},
  {topic:"漢·開疆拓土",q:"與漢初對匈奴的政策相比，武帝的對匈政策最大轉變是？",options:["由被動和親求和，轉為主動出擊征伐","由主動出擊轉為和親","由征伐轉為閉關自守","始終維持不變的和親政策"],answer:0,explain:"漢初行和親求和，武帝則一改和親、主動派將北伐，這是對匈政策由守轉攻的最大轉變。"},
  {topic:"漢·開疆拓土",q:"下列關於武帝北伐匈奴的說法，哪些正確？\n(1) 一改漢初和親政策、主動出擊\n(2) 派衛青、霍去病三次大舉征伐\n(3) 北伐之後，武帝在漠北設置河西四郡\n(4) 收復河套、把匈奴逐至漠北",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——河西四郡設於河西走廊，並非漠北。"},
  {topic:"漢·開疆拓土",q:"下列關於武帝開疆拓土的說法，哪些正確？\n(1) 兩次派張騫出使西域、奠定絲綢之路基礎\n(2) 平定南越、東征朝鮮、通西南夷、制服羌族\n(3) 在征服之地設置郡縣，拓展漢朝版圖\n(4) 武帝開拓所得版圖反較秦朝為小",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——武帝開拓邊疆使版圖遠較秦朝廣大，並非較秦為小。"},
  {topic:"漢·開疆拓土",q:"下列關於張騫出使西域的說法，哪些正確？\n(1) 原為結交盟友、共抗匈奴而出使\n(2) 欲聯大月氏夾擊匈奴、斷其右臂\n(3) 出使奠定絲綢之路基礎、使漢聲威傳至西域\n(4) 張騫成功與大月氏結盟、合力夾擊匈奴",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——大月氏無意東還復仇，結盟夾擊之議未成；張騫之功在開通西域。"},
  {topic:"漢·評價得失",q:"下列哪一項屬於漢武帝的「功績」？",options:["以推恩令、刺史等鞏固中央統治","造成外戚專政","學術發展趨於偏狹","虛耗國力、民不聊生"],answer:0,explain:"鞏固中央統治屬功績；外戚專政、學術偏狹、虛耗國力則屬武帝施政的過失。"},
  {topic:"漢·評價得失",q:"武帝設內朝削相權，所埋下的長遠禍患是？",options:["宦官從此把持朝政","外戚藉內朝要職干政，埋下王莽篡漢之禍","諸侯王再度坐大","丞相世襲不替"],answer:1,explain:"內朝多以外戚出任領袖，遇幼主則皇權旁落外戚，埋下外戚干政、王莽篡漢的禍根。"},
  {topic:"漢·評價得失",q:"獨尊儒術對中國學術的長遠負面影響是？",options:["促成百家爭鳴重現","令法家成為正統","百家爭鳴不再，學術思想走上偏狹","使道家長期主導思想"],answer:2,explain:"士子為求仕進皆專研儒學，他派思想不受重視，百家爭鳴不再，學術思想趨於偏狹。"},
  {topic:"漢·評價得失",q:"武帝晚年「天下虛耗、人復相食」，他及時發表以與民休息、力本農為旨的詔書是？",options:["《推恩令》","《求賢詔》","《太初曆》","《輪台詔》"],answer:3,explain:"武帝晚年虛耗國力、民變漸起，遂發《輪台詔》承諾停止征伐、與民休息，西漢得免亡於武帝之手。"},
  {topic:"漢·評價得失",q:"夏侯勝評武帝「多殺士眾，竭民財力，奢泰亡度，天下虛耗……亡德澤於民，不宜為立廟樂」。此屬？",options:["對武帝的負面評價（責其虛耗害民）","對武帝的全面肯定","對文景之治的批評","對秦始皇的評價"],answer:0,explain:"夏侯勝指武帝竭民財力、天下虛耗、無德澤於民，故反對為其立廟樂，屬對武帝的負面評價。"},
  {topic:"漢·評價得失",q:"班固贊武帝「雄材大略」，並謂「如武帝……不改文、景之恭儉以濟斯民，雖《詩》《書》所稱何有加焉」。班固的評價可概括為？",options:["全盤否定武帝","肯定其雄才大略，惟惋惜其不及文景恭儉愛民（褒中有貶）","認為武帝一無是處","認為武帝完美無缺、毫無過失"],answer:1,explain:"班固既贊雄材大略，又惋惜其未能如文景恭儉濟民，屬褒中帶貶、肯定為主而指出不足的評價。"},
  {topic:"漢·評價得失",q:"司馬光謂武帝「有亡秦之失而免亡秦之禍」，所持的理由主要是？",options:["武帝從不窮奢極欲、與秦全然不同","武帝對外從不用兵","武帝晚年改過、顧託得人，故未蹈秦速亡之覆轍","武帝徹底廢除嚴刑峻法"],answer:2,explain:"司馬光指武帝雖有窮奢黷武等近於秦之失，但因晚年改過、託付得人，故得免於秦速亡之禍。"},
  {topic:"漢·評價得失",q:"就「秦皇漢武」比較而言，下列哪一項是兩者的共同點？",options:["皆以法家為唯一治國思想、毫不掩飾","皆因暴政而二世速亡","皆主動推行和親、避免對外用兵","皆銳意加強中央集權、對外開疆拓土，且耗用大量民力財力"],answer:3,explain:"秦皇漢武皆強化集權、對外開拓並大耗民力財力；惟武帝儒表法裡、晚年改過，故漢以興而秦以亡。"},
  {topic:"漢·評價得失",q:"呂思勉謂武帝理財「終誅求刻剝之意多，裒多益寡之意少，故終弊餘於利，至於民愁盜起」。此最能說明？",options:["新經濟政策後期流於誅求聚斂，弊多於利、激起民變","新經濟政策毫無流弊、有利無弊","武帝理財旨在均貧富、成效卓著","武帝從不向商人徵稅"],answer:0,explain:"呂思勉指其理財刻剝聚斂多於濟貧，終致弊多於利、民愁盜起，點出新經濟政策後期的流弊。"},
  {topic:"漢·評價得失",q:"下列關於漢武帝「功績」的說法，哪些正確？\n(1) 造成外戚專政、埋下篡漢禍根\n(2) 鞏固中央統治、消除地方對中央的威脅\n(3) 開放國家政權、起用平民儒生\n(4) 打擊商賈、拓寬財源以助國用",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——造成外戚專政、埋下篡漢禍根屬武帝的過失，不應列入功績。"},
  {topic:"漢·評價得失",q:"下列關於漢武帝「過失」的說法，哪些正確？\n(1) 設內朝削相權，間接造成外戚專政\n(2) 開創士人政府、奠定文治基礎\n(3) 獨尊儒術致學術發展偏狹\n(4) 新經濟政策抑商過甚、扼殺工商業發展",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——開創士人政府、奠定文治基礎屬武帝的功績，不應列入過失。"},
  {topic:"漢·評價得失",q:"下列關於武帝「虛耗國力」的說法，哪些正確？\n(1) 本人生活奢侈、大興土木\n(2) 好大喜功、屢興對外戰爭\n(3) 武帝終身窮兵黷武、至死不肯反省悔改\n(4) 重用李廣利征大宛，費時四年、出動二十萬人而所獲無幾",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——武帝晚年發《輪台詔》、承諾停止征伐、及時悔改，並非至死不肯反省。"},
  {topic:"漢·評價得失",q:"下列關於史家對漢武帝評價的說法，哪些正確？\n(1) 夏侯勝責其竭民財力、天下虛耗\n(2) 班固贊其雄材大略、惟惜不及文景恭儉\n(3) 司馬光謂其「有亡秦之失而免亡秦之禍」\n(4) 呂思勉指其理財終「弊餘於利、民愁盜起」",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)"],answer:0,explain:"四項皆正確：夏侯勝、班固、司馬光、呂思勉之評，皆為史家對武帝功過得失的論斷。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"唐朝的開國皇帝（唐高祖）是？",options:["李淵","李世民","李建成","李元吉"],answer:0,explain:"鎮守太原的李淵起兵、攻下隋都大興，建立唐朝、是為唐高祖；李世民為其次子。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"唐朝得以平定各地割據、於628年統一全國，主要憑藉哪位的軍事才能？",options:["太子李建成","次子李世民","四子李元吉","大將李靖"],answer:1,explain:"唐室憑高祖次子李世民的軍事才能平定群雄，於628年統一全國。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"626年，李世民在太極宮玄武門附近發動、殺死太子與齊王的流血政變稱為？",options:["渭水之盟","安史之亂","玄武門之變","七國之亂"],answer:2,explain:"玄武門之變中，秦王李世民殺太子李建成、四子李元吉，繼而被立為太子、迫高祖禪位。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"李世民即位後所改的年號是？",options:["武德","開皇","建元","貞觀"],answer:3,explain:"李世民即位後改元「貞觀」，是為唐太宗，其治世史稱「貞觀之治」。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"傅樂成謂玄武門之變「留給後世不良的影響……世民應負首開惡例的責任」。此最能說明？",options:["玄武門之變為唐代宮廷骨肉相殘開了惡例","玄武門之變奠定貞觀盛世的制度","玄武門之變使唐室從此再無內鬥","玄武門之變屬正當的禪讓"],answer:0,explain:"傅樂成指太宗殺兄迫父、首開唐代宮廷鬥爭惡例，故晚年又有太子承乾、李泰之爭，影響深遠。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"下列事件按時間先後排列，何者正確？\n(甲) 李世民發動玄武門之變\n(乙) 李淵起兵、建立唐朝\n(丙) 李世民即位、改元貞觀",options:["甲→乙→丙","乙→甲→丙","丙→乙→甲","乙→丙→甲"],answer:1,explain:"李淵起兵建唐（乙）在先，繼而李世民發動玄武門之變（甲），其後即位改元貞觀（丙）。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"下列關於唐朝建立與唐太宗即位的說法，哪些正確？\n(1) 李世民是經兄長太子建成主動讓位而和平登基\n(2) 李淵起兵太原、攻下隋都大興\n(3) 唐憑李世民的軍事才能於628年統一全國\n(4) 李世民發動玄武門之變、殺太子建成與齊王元吉",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——李世民是發動玄武門之變、殺兄迫父才得太子之位，並非太子建成主動讓位、和平登基。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"下列關於玄武門之變的說法，哪些正確？\n(1) 事變發生於武德九年（626年）\n(2) 事變後李淵立即被處死、唐室大亂\n(3) 李世民於事變後被立為皇太子、不久高祖禪位\n(4) 事變為唐代宮廷骨肉相殘開了惡例",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——玄武門之變後高祖李淵禪位為太上皇，並未被處死；唐室亦未因此大亂。"},
  {topic:"貞觀·唐太宗與玄武門之變",q:"下列關於唐朝建立與統一的說法，哪些正確？\n(1) 李淵起兵太原、攻下隋都大興\n(2) 唐朝一建立即天下太平、全無割據勢力\n(3) 唐高祖的年號為「武德」\n(4) 唐憑李世民軍功於628年平定群雄、統一全國",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——唐建立後仍須李世民歷年平定各地割據，並非一建立即天下太平、全無割據。"},
  {topic:"貞觀·政治措施",q:"貞觀年間沿襲並加以完善的中央政制是？",options:["郡國並行制","三省六部制","九品中正制","內外朝制"],answer:1,explain:"太宗繼承並完善隋代三省六部制：中書起草、門下審議、尚書執行，六部分掌政務。"},
  {topic:"貞觀·政治措施",q:"中書與門下因封駁爭論不休、影響效率，太宗遂設立供三省長官合議政事的機關，名為？",options:["弘文館","國子監","政事堂","安西都護府"],answer:2,explain:"太宗設政事堂為三省長官合議之所，他官加銜「同平章事」可入堂議政為相，多相合議提高效率。"},
  {topic:"貞觀·政治措施",q:"太宗在州、縣之上按山川形勢把全國劃分為「十道」，其作用是？",options:["作為一級行政區、取代州縣","作為軍事屯田區","作為科舉考區","作為監察區、加強對地方的監察"],answer:3,explain:"太宗沿用州縣二級制，於其上按山川形勢分全國為十道作監察區，不定期派巡察使監察刺史施政。"},
  {topic:"貞觀·政治措施",q:"貞觀時期發展為完善制度、以「明經」「進士」兩科最重要的選官制度是？",options:["科舉制","察舉制","九品中正制","世卿世祿制"],answer:0,explain:"隋僅具科舉雛形，貞觀發展為完善的科舉制，分常科特科，以明經、進士兩科最重要。"},
  {topic:"貞觀·政治措施",q:"太宗命高士廉重修、以「立功立德立言」為品評門第標準、列皇族李姓為第一等的是？",options:["《五經正義》","《氏族志》","《唐律》","《貞觀政要》"],answer:1,explain:"太宗命高士廉重修《氏族志》，以三不朽為標準、列皇族第一、外戚第二、山東士族第三以下，以平抑門第。"},
  {topic:"貞觀·政治措施",q:"太宗命長孫無忌、房玄齡等以「寬仁、慎刑」為宗旨編訂、較《開皇律》更寬簡的法典是？",options:["《開皇律》","《大業律》","《唐律》","《九章律》"],answer:2,explain:"太宗廢隋末苛法，命長孫無忌、房玄齡等編《唐律》，廢鞭背斷趾等酷刑，較《開皇律》更寬簡。"},
  {topic:"貞觀·政治措施",q:"錢穆認為唐代三省制發揮了「三權分立」特色、是政府開明的象徵。此說最能肯定三省制？",options:["令君主可隨意獨斷專行","使相權集中於一人","廢除一切審議程序","三省互相制約，防止宰相專權、亦制約君主獨斷"],answer:3,explain:"錢穆以「三權分立」稱許三省：中書起草、門下審議、尚書執行互相制約，既防權臣專擅、亦制君主獨斷。"},
  {topic:"貞觀·政治措施",q:"時人有「不經鳳閣（中書）鸞台（門下），何名為敕」之說。此語最能反映唐代？",options:["詔令須經中書起草、門下審議，否則不算正式詔敕","皇帝詔令可不經任何機關直接生效","中書門下可任意篡改皇命","尚書省獨掌一切立法"],answer:0,explain:"此語說明正式詔敕須經中書起草、門下審議的程序，否則不被承認，體現三省對君權的制約。"},
  {topic:"貞觀·政治措施",q:"太宗得人後喜言「天下英雄，入吾彀中矣！」此語最能說明科舉制對統治者的作用是？",options:["科舉使人才流失於民間","把天下人才納入朝廷彀中、為政權所用","科舉削弱了中央集權","科舉令皇帝失去用人之權"],answer:1,explain:"「入吾彀中」喻天下英才皆為朝廷羅致任用，反映科舉既廣納人才，又鞏固了統治者的用人權。"},
  {topic:"貞觀·政治措施",q:"與隋文帝「開科取士僅具雛形」相比，唐太宗時科舉制的最大發展是？",options:["完全廢除考試、回復門第取士","只考武藝、不考經義","發展為分常科、特科、經禮部與吏部多重考選的完善制度","由皇帝一人親自面試取錄全部官員"],answer:2,explain:"隋僅具科舉雛形，貞觀時發展為常科特科、經禮部試與吏部覆核的完善制度，較隋大為健全。"},
  {topic:"貞觀·政治措施",q:"下列「原因→結果」配對，哪一組成立？",options:["因分全國為十道，故十道取代州縣成為一級行政區","因重修《氏族志》，故山東士族地位升為第一等","因推行科舉，故門閥士族壟斷更牢固","因設政事堂行多相合議，故較易取得決策共識、提高行政效率"],answer:3,explain:"只有「政事堂多相合議→提高效率」成立；十道只是監察區、《氏族志》是降抑士族、科舉是打破門閥，其餘皆與史實相反。"},
  {topic:"貞觀·政治措施",q:"下列關於唐代三省六部制的說法，哪些正確？\n(1) 中書省起草、門下省審議、尚書省執行\n(2) 尚書省下轄吏戶禮兵刑工六部\n(3) 三省長官中以中書令獨攬決策、其餘二省僅供差遣\n(4) 三省分工協作又互相牽制、避免大臣獨攬大權",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——三省並立、互相牽制，並非中書令獨攬決策；門下可封駁中書詔令，尚書執行，彼此制約。"},
  {topic:"貞觀·政治措施",q:"下列關於太宗設「政事堂」的說法，哪些正確？\n(1) 因中書門下封駁爭論不休、削弱行政效率而設\n(2) 為三省長官合議政事的機關\n(3) 他官加銜「同平章事」可入堂議政成為宰相\n(4) 政事堂的設立令宰相由一人獨攬大權",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——政事堂行多相合議、取得決策共識，正是分散相權、避免一人獨斷，並非令宰相一人獨攬。"},
  {topic:"貞觀·政治措施",q:"下列關於貞觀推行科舉制的說法，哪些正確？\n(1) 科舉令門閥士族壟斷仕途更為鞏固\n(2) 分每年一次的常科與不定期的特科\n(3) 士人經生徒或鄉貢、再通過禮部試\n(4) 平民得以晉身政壇、促進社會階級流動",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——科舉使平民可憑考試入仕、門閥士族無法壟斷仕途，門第勢力逐漸消融，並非令其壟斷更鞏固。"},
  {topic:"貞觀·政治措施",q:"下列關於太宗平抑門第與整頓吏治的說法，哪些正確？\n(1) 命高士廉重修《氏族志》、列皇族李姓為第一等\n(2) 太宗極力維護山東士族、定其為天下第一等\n(3) 主張「功臣代世冑，科舉代門第」\n(4) 命房玄齡省併冗員、派黜陟大使巡視地方",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——太宗正要平抑門第，《氏族志》列皇族第一、山東士族降至第三等以下，並非維護山東士族為第一。"},
  {topic:"貞觀·政治措施",q:"下列關於太宗改良刑法（《唐律》）的說法，哪些正確？\n(1) 廢隋末苛法，命長孫無忌、房玄齡等編《唐律》\n(2) 寬仁：廢鞭背、斷趾等酷刑，較《開皇律》更寬簡\n(3) 《唐律》刑罰較《開皇律》更嚴酷繁苛\n(4) 慎刑：京師死刑須「五複奏」、地方「三複奏」方可執行",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——《唐律》以寬仁慎刑為旨、較《開皇律》更寬簡，並非更嚴酷繁苛。"},
  {topic:"貞觀·經濟措施",q:"貞觀初年國家控制的戶口僅約二百多萬，太宗增加人口的措施「不」包括下列哪一項？",options:["協助貧困男女完婚","下令大舉徵兵遠征以開疆","下令生男者獎粟一石","釋放僧尼、招撫流民回鄉墾殖"],answer:1,explain:"助婚配、獎生育、釋僧尼、招撫流民皆為增加人口、解放生產力的措施；大舉徵兵遠征反耗人力，並非增口措施。"},
  {topic:"貞觀·經濟措施",q:"貞觀末年至高宗永徽三年，全國戶口由二百多萬增加到約多少？",options:["二百萬戶","五百萬戶","三百八十萬戶","一千萬戶"],answer:2,explain:"在助婚、獎生育、招撫流民等政策下，戶口由貞觀初二百多萬增至約三百八十萬戶，課稅戶大增。"},
  {topic:"貞觀·經濟措施",q:"唐代均田制規定田地「不可買賣」，其主要用意是？",options:["增加政府賣地收入","鼓勵商人投資土地","擴大奴婢受田","防止土地兼併"],answer:3,explain:"規定田地不可買賣，可防止土地兼併、保障農民有田可耕，受田農民列為國家編戶、增加課稅戶。"},
  {topic:"貞觀·經濟措施",q:"貞觀年間沿用隋代、保持輕徭薄賦特色的賦稅制度是？",options:["租庸調制","兩稅法","一條鞭法","攤丁入畝"],answer:0,explain:"太宗沿用隋租庸調制：每丁納粟、服役、納絹；貞觀田租約四十稅一，較漢文景三十稅一更低。"},
  {topic:"貞觀·經濟措施",q:"錢穆分析租庸調制「與均田制配合，令『為民制產』與『為官收租』兩事並舉」。此最能說明租庸調制？",options:["與均田制毫無關係","建基於均田授田：百姓有田則有租、有身則有庸、有戶則有調","旨在重稅打擊農民","只向商人徵收"],answer:1,explain:"租庸調與均田相配：受田之民有田納租、有身服庸、有戶納調，使為民制產與為官收租並舉，是其優點。"},
  {topic:"貞觀·經濟措施",q:"貞觀年間米價由每斗四、五錢減至兩錢、牛馬遍野、天下饒足。這最能說明貞觀盛況中的？",options:["四夷賓服","君臣一體","經濟復甦","制度完善"],answer:2,explain:"米價大降、牛馬遍野反映農業豐裕、物價穩定、人民富足，正對應貞觀盛況的「經濟復甦」。"},
  {topic:"貞觀·經濟措施",q:"太宗規定「狹鄉授田減半、鼓勵百姓遷往寬鄉」。此措施最能體現均田制的哪一精神？",options:["鼓勵土地兼併","放任豪強佔田","廢除授田制度","因地制宜、更合理地分配田地"],answer:3,explain:"狹鄉減半、鼓勵遷寬鄉，旨在按地少地多調節授田，使土地分配更合理，體現為民制產的精神。"},
  {topic:"貞觀·經濟措施",q:"下列「原因→結果」配對，哪一組成立？",options:["因輕徭薄賦、低稅率刺激生產意欲，故農民增產而國家稅收反增","因規定田地不可買賣，故土地兼併更趨嚴重","因釋放僧尼，故國家戶口大減","因發展對外貿易，故絲綢之路從此斷絕"],answer:0,explain:"只有「輕徭薄賦→增產增收」成立；不可買賣是抑兼併、釋僧尼是增戶口、貿易是令絲路暢通，其餘皆與史實相反。"},
  {topic:"貞觀·經濟措施",q:"下列關於太宗「增加人口」措施的說法，哪些正確？\n(1) 協助貧困或未婚男女成婚\n(2) 下令生男者獎粟一石\n(3) 強令百姓晚婚少生以節省糧食\n(4) 釋放僧尼十餘萬、招撫流民回鄉墾殖",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——太宗是鼓勵婚育、招撫流民以增人口、解放生產力，並非強令晚婚少生。"},
  {topic:"貞觀·經濟措施",q:"下列關於唐代均田制（較隋之改良）的說法，哪些正確？\n(1) 丁男授口分田、永業田，口分田死後交還\n(2) 規定田地不可買賣、防止兼併\n(3) 廢除婦女受田規定、並免其賦役以減輕農戶負擔\n(4) 丁男授永業田八十畝、口分田二十畝",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——唐制丁男授口分田八十畝、永業田二十畝，兩者數目剛好相反。"},
  {topic:"貞觀·經濟措施",q:"下列關於貞觀租庸調制與輕徭薄賦的說法，哪些正確？\n(1) 貞觀賦役較前代為重、以充軍費\n(2) 沿用隋代租庸調制\n(3) 貞觀田租約四十稅一、較漢文景更低\n(4) 下令各州縣正賦之外不得隨便加徵",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——貞觀以輕徭薄賦為特色，田租四十稅一、力役較漢少，賦役較前代為輕，並非為充軍費而加重。"},
  {topic:"貞觀·經濟措施",q:"下列關於貞觀發展對外貿易的說法，哪些正確？\n(1) 擊敗高昌、西突厥後，絲綢之路重新暢通\n(2) 回紇、阿拉伯、波斯商人紛紛來華，兩京商旅雲集\n(3) 海路有波斯、天竺、日本等商船來華，揚州、廣州成商業城市\n(4) 太宗命韋堅開鑿廣運潭，使外國商船直達長安",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——廣運潭是唐玄宗時韋堅所開鑿，屬開元年間之事，並非貞觀。"},
  {topic:"貞觀·文教措施",q:"太宗在京師設國子監，下設國學、太學、四門學、律學、書學、算學，合稱？",options:["六部","六學","六條","六藝"],answer:1,explain:"太宗於京師國子監下設國學、太學、四門學、律學、書學、算學「六學」，以名儒為學官、招官民子弟。"},
  {topic:"貞觀·文教措施",q:"太宗命顏師古校訂《五經》文字、命孔穎達修撰、作為科舉讀本標準的是？",options:["《氏族志》","《唐律》","《五經正義》","《貞觀政要》"],answer:2,explain:"太宗命顏師古校訂五經文字、孔穎達疏解修《五經正義》，作科舉讀本，儒生治經應試須以此為標準。"},
  {topic:"貞觀·文教措施",q:"貞觀年間，太宗支持由印度取經返國、從事譯經工作的高僧是？",options:["鑑真","法顯","一行","玄奘"],answer:3,explain:"玄奘由印度取經返國，太宗支持其譯經、並命房玄齡親自迎接，反映太宗對佛教的重視與宗教開放態度。"},
  {topic:"貞觀·文教措施",q:"日本的首都平城京仿照唐代長安城佈局來設計。這最能說明貞觀盛況中的？",options:["文化廣傳四方","經濟復甦","四夷賓服的軍事征服","君臣一體"],answer:0,explain:"日本、高麗、吐蕃遣子弟來學、平城京仿長安而建，反映唐典章文化廣傳四方，屬「文化廣傳」之況。"},
  {topic:"貞觀·文教措施",q:"太宗命孔穎達修《五經正義》、定為科舉應試標準。其最主要的作用是？",options:["廢除儒家經典","統一經文解釋、便利教育與考試","禁止士人讀經","以佛經取代五經"],answer:1,explain:"唐初五經版本不一、解釋有異，不利教考；《五經正義》統一經義、作科舉標準，便利教育與取士。"},
  {topic:"貞觀·文教措施",q:"太宗於文學館、弘文館常與學士「講論學術，兼及治國之道」。這最能反映太宗？",options:["沉迷享樂、荒廢政事","排斥一切學術","重視文教、並善於汲取治國之道","只重武功、輕視文治"],answer:2,explain:"太宗與學士徹夜論學兼論治道，反映其重視文教、廣納學識以資治國，奠定貞觀文治的基礎。"},
  {topic:"貞觀·文教措施",q:"下列關於貞觀興辦學校的說法，哪些正確？\n(1) 京師國子監下設「六學」、以名儒為學官\n(2) 太宗禁止外族子弟來華求學、嚴限學額\n(3) 另置弘文館、崇文館招收皇族與宰相子弟\n(4) 地方設州學、縣學，優異者可獲薦應科舉",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——日本、高麗、吐蕃諸國皆遣子弟來華學習、京師學生近萬人，太宗並未禁外族來學。"},
  {topic:"貞觀·文教措施",q:"下列關於貞觀整理經史的說法，哪些正確？\n(1) 命顏師古校訂《五經》文字、頒《五經定本》\n(2) 命孔穎達修《五經正義》作科舉標準讀本\n(3) 太宗下令焚毀前朝史籍、禁止修史\n(4) 開史館修晉、北周、北齊、梁、陳、隋等六朝史",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——太宗正是開史館、大力修撰前朝史籍，並非焚毀史籍、禁止修史。"},
  {topic:"貞觀·文教措施",q:"下列關於太宗宗教政策的說法，哪些正確？\n(1) 以道教為國教、奉老子為「太上玄元皇帝」\n(2) 支持玄奘譯經、命房玄齡迎接\n(3) 對景教、祆教、摩尼教等採開放態度、容其自由傳教\n(4) 太宗曾勒令僧尼一萬二千人還俗、收回寺院土地",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——勒令僧尼還俗、收回寺田是唐玄宗接納姚崇建議的措施，並非太宗。"},
  {topic:"貞觀·文教措施",q:"下列關於太宗弘揚學術的說法，哪些正確？\n(1) 國子監「六學」包括國學、太學、四門學、史學、書學、算學\n(2) 設文學館、以房玄齡、虞世南等十八人為學士\n(3) 設弘文館、收書二十餘萬卷並選名儒校理典籍\n(4) 常與館中學士講論學術、兼及治國之道",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——六學為國學、太學、四門學、律學、書學、算學，並無史學。"},
  {topic:"貞觀·軍事與外族",q:"貞觀年間沿襲隋代並加改良、行「兵農合一」的軍事制度是？",options:["募兵制","世兵制","屯田制","府兵制"],answer:3,explain:"太宗改良隋府兵制：農忙務農、農閒訓練、輪番宿衛戍邊，戰罷兵還於府、將歸於朝，兵將分離防擁兵作亂。"},
  {topic:"貞觀·軍事與外族",q:"唐代府兵制規定府兵「從富戶中的壯健者徵選」，其好處『不』包括？",options:["令貧苦百姓承擔沉重征戍之苦","兵源充足、戰鬥力強","府兵有財力自備資糧、節省軍費","貧苦百姓得免於征戍之苦"],answer:0,explain:"從富戶壯健者選兵，可保兵源戰力、自備資糧省軍費，並使貧苦百姓免受征戍，並非加重貧民征戍之苦。"},
  {topic:"貞觀·軍事與外族",q:"太宗派李靖、李勣等率大軍討伐、俘其領袖頡利可汗的是哪一外族？",options:["吐蕃","東突厥","吐谷渾","高昌"],answer:1,explain:"太宗趁東突厥內亂派李靖、李勣討伐、俘頡利可汗，東突厥降唐，消除北疆邊患。"},
  {topic:"貞觀·軍事與外族",q:"太宗接受吐蕃領袖松贊干布的請求，下嫁哪位公主以維持友好？",options:["平陽公主","太平公主","文成公主","義成公主"],answer:2,explain:"吐蕃領袖松贊干布遣使朝貢求婚，太宗以文成公主下嫁，貞觀一朝唐與吐蕃維持友好關係。"},
  {topic:"貞觀·軍事與外族",q:"太宗自言「自古皆貴中華，賤夷狄，朕獨愛之如一，故其種落皆依朕如父母」。此最能解釋太宗被尊為天可汗，除武力外還因？",options:["以武力強迫各族臣服","對外族課以重稅","禁止各族來朝","平等對待少數民族、恩威並施，獲各族誠心擁戴"],answer:3,explain:"太宗以「愛之如一」平等待外族、恩威並施，故除武功外更獲各族誠心擁戴、共尊天可汗。"},
  {topic:"貞觀·軍事與外族",q:"基於「關中本位政策」，全國六百多個折衝府中近八成兵力集中於關中及其鄰近地區。此安排的用意是？",options:["保證中央軍力雄厚、防止地方叛亂（舉天下不敵關中）","削弱中央、強化地方","便利對外貿易","均勻分散全國兵力"],answer:0,explain:"折衝府近八成兵力集中關中及河東、河南，旨在「舉天下不敵關中」，保證中央軍力、防地方叛亂。"},
  {topic:"貞觀·軍事與外族",q:"與隋文帝對突厥的策略相比，唐太宗平東突厥的共通之處是？",options:["皆純靠和親、從不用兵","皆乘突厥內部分裂／內亂而加以討伐、降服","皆放棄北疆、任突厥南下","皆與突厥結為兄弟之國、平起平坐"],answer:1,explain:"隋文帝離間使突厥分裂、唐太宗趁東突厥內亂出兵，兩者皆乘突厥內部分裂而降服之，手法相通。"},
  {topic:"貞觀·軍事與外族",q:"下列關於唐代府兵制（兵農合一）的說法，哪些正確？\n(1) 府兵為世襲職業軍人、平時不事生產\n(2) 農忙務農、農閒訓練，輪番宿衛戍邊\n(3) 戰罷兵還於府、將歸於朝，避免將帥擁兵作亂\n(4) 府兵從富戶壯健者徵選、自備資糧而省軍費",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——唐府兵兵農合一、平時務農，並非世襲職業軍人、平時不事生產。"},
  {topic:"貞觀·軍事與外族",q:"下列關於太宗對外族措施的說法，哪些正確？\n(1) 對外征戰以蕃將蕃兵為主力，如阿史那杜爾、契苾何力\n(2) 文成公主下嫁回紇可汗以維持和好\n(3) 派李靖等討東突厥、俘頡利可汗\n(4) 派侯君集滅高昌、置安西都護府",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——文成公主下嫁的是吐蕃領袖松贊干布，並非回紇可汗。"},
  {topic:"貞觀·軍事與外族",q:"下列關於太宗「天可汗」與民族政策的說法，哪些正確？\n(1) 西北各族君長尊太宗為「天可汗」\n(2) 太宗主張「胡漢一家」、平等對待少數民族\n(3) 太宗主張『貴中華、賤夷狄』、歧視外族\n(4) 設「參天可汗道」以便各族到長安朝見",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——太宗自言「自古皆貴中華、賤夷狄，朕獨愛之如一」，主張胡漢一家，並非歧視外族。"},
  {topic:"貞觀·軍事與外族",q:"下列關於太宗經營西域的說法，哪些正確？\n(1) 派李靖、侯君集出兵征討吐谷渾，河西走廊交通漸通\n(2) 征服吐谷渾後，太宗在其地設置河西四郡\n(3) 派侯君集攻滅高昌、置安西都護府\n(4) 派郭孝恪討平入侵鄰國的龜茲",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——河西四郡（張掖、武威、酒泉、敦煌）是漢武帝所設，並非太宗征吐谷渾後之置。"},
  {topic:"貞觀·盛況成效",q:"貞觀年間裁減冗官冗員、君臣守法成風，史稱「官在得人，不在員多」。這最能說明哪一盛況？",options:["人口增加","文化廣傳","吏治清明","四夷賓服"],answer:2,explain:"留心吏治、裁汰冗官、君臣守法、良吏輩出，正對應貞觀盛況的「吏治清明」。"},
  {topic:"貞觀·盛況成效",q:"貞觀四年，全國判死刑者不過二十九人、民間夜不閉戶。這最能反映哪一盛況？",options:["制度完善","君臣一體","文化廣傳","社會安定"],answer:3,explain:"死刑者極少、夜不閉戶反映政治清明、社會富庶、盜賊少有，正對應「社會安定」之況。"},
  {topic:"貞觀·盛況成效",q:"太宗降服東西突厥、平吐谷渾、撫吐蕃，被尊為天可汗，疆域比漢還大。這體現哪一盛況？",options:["四夷賓服","經濟復甦","吏治清明","制度完善"],answer:0,explain:"武功顯赫、各族來朝共尊天可汗、疆域比漢更大，正對應貞觀盛況的「四夷賓服、四海一家」。"},
  {topic:"貞觀·盛況成效",q:"太宗一朝制度多為後世採用：科舉、六部為宋至清沿用，府兵制更成為明代何種制度的設計參考？",options:["行省制","衛所制","八旗制","保甲制"],answer:1,explain:"貞觀制度完善、為後世師法：科舉與六部宋至清沿用，府兵制則成為明代衛所制的設計參考之一。"},
  {topic:"貞觀·盛況成效",q:"《貞觀政要》稱當時「官吏多自清謹……大姓豪猾之伍，皆畏威屏跡，無敢侵欺細人」。此最能說明？",options:["貞觀官吏貪污橫行","豪強橫行無忌","貞觀吏治清明、豪強受制、百姓得安","百姓飽受官吏侵欺"],answer:2,explain:"此載指官吏清謹、豪強畏威斂跡、不敢侵欺百姓，正反映貞觀「吏治清明」、社會安定之況。"},
  {topic:"貞觀·盛況成效",q:"下列何者屬於「貞觀盛況／治世標準」？\n(1) 制度完善、吏治清明\n(2) 人才濟濟、人口增加\n(3) 經濟復甦、社會安定\n(4) 四夷賓服、君臣一體",options:["只有(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)","(1)、(2)、(3)及(4)"],answer:3,explain:"四項皆正確：制度完善、吏治清明、人才濟濟、人口增加、經濟復甦、文化廣傳、社會安定、四夷賓服、君臣一體，皆屬貞觀盛況。"},
  {topic:"貞觀·盛況成效",q:"下列關於貞觀盛況的配對，哪些正確？\n(1) 經濟復甦——米價大降、牛馬遍野、天下饒足\n(2) 文化廣傳——日本平城京仿長安而建\n(3) 四夷賓服——各族共尊太宗為天可汗\n(4) 人口增加——貞觀戶口反較隋開皇大減而不復",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——貞觀戶口由二百多萬回升至約三百八十萬戶，屬「人口增加」，並非大減而不復。"},
  {topic:"貞觀·盛況成效",q:"下列關於貞觀盛況的說法，哪些正確？\n(1) 人才濟濟：太宗用人唯才、名臣輩出\n(2) 君臣一體：君臣相處如老朋友、坦誠相見\n(3) 貞觀君臣互相猜忌、形同水火\n(4) 魏徵病太宗親往探視、死後親為寫墓碑",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——貞觀君臣感情融洽、君臣一體，並非互相猜忌、形同水火。"},
  {topic:"貞觀·個人特質與評價",q:"太宗用人「房謀杜斷」，指善於謀劃與果敢決斷的兩位宰相是？",options:["魏徵、王珪","李靖、李勣","房玄齡、杜如晦","長孫無忌、褚遂良"],answer:2,explain:"太宗用人唯才：以善謀的房玄齡、善斷的杜如晦為相（房謀杜斷），魏徵王珪為諫官，李靖李勣為將。"},
  {topic:"貞觀·個人特質與評價",q:"太宗把太子冠禮由「二月」改為「十月」舉行，主要用意是？",options:["遷就外族朝貢","配合科舉考期","方便巡遊享樂","避開農忙、不妨礙百姓耕作"],answer:3,explain:"二月為農忙、十月為農閒；太宗改期以免妨礙百姓耕作，體現其關注民生、以民為本。"},
  {topic:"貞觀·個人特質與評價",q:"太宗晚年的過失『不』包括下列哪一項？",options:["廢除科舉、回復門第取士","漸驕傲自滿、疏遠賢臣、拒納諫言","奢華巡遊、廣建宮室","親征高麗無功而還"],answer:0,explain:"晚年太宗驕傲拒諫、奢華巡遊、東征高麗無功、追求長生；惟科舉制終貞觀一朝行之不替，並未廢除。"},
  {topic:"貞觀·個人特質與評價",q:"魏徵死後，太宗慨嘆「以人為鏡，可以明得失……今魏徵死，朕失一鏡矣」。此最能反映太宗？",options:["厭惡魏徵的直諫","珍視諫臣、深明納諫之益","認為諫臣無足輕重","主張閉塞言路"],answer:1,explain:"太宗以「失一鏡」痛惜魏徵之死，反映其珍視諫臣、深明兼聽納諫對明察得失的重要。"},
  {topic:"貞觀·個人特質與評價",q:"《舊唐書》贊太宗「聽斷不惑，從善如流，千載可稱，一人而已」。此屬對太宗的？",options:["全面否定","僅針對其晚年的批評","高度正面的評價","純粹史實記述"],answer:2,explain:"《舊唐書》以「從善如流、千載一人」極稱太宗能聽斷納諫，屬對其的高度正面評價。"},
  {topic:"貞觀·個人特質與評價",q:"呂思勉謂太宗之治平強盛「承久亂之後……塞外亦無強部，皆時會為之，非盡由於人力也」。他特別強調貞觀致治的關鍵在於？",options:["全憑太宗個人才能","全靠魏徵一人","與外族形勢無關","時勢／客觀環境的配合"],answer:3,explain:"呂思勉指貞觀之治「皆時會為之、非盡人力」，特別強調久亂思治、塞外無強部等時勢因素的作用。"},
  {topic:"貞觀·個人特質與評價",q:"《劍橋中國隋唐史》稱太宗「文治武功理想地結合……謙虛耐心聽取群臣意見……接近儒家納諫愛民為治國之本」。此評價最側重太宗？",options:["納諫愛民、文治武功兼備的施政作風","窮兵黷武的軍事擴張","奢侈逸樂的生活","拒諫獨斷的作風"],answer:0,explain:"《劍橋隋唐史》推崇太宗文治武功結合、納諫愛民、君臣水乳交融，側重其納諫愛民的施政理想。"},
  {topic:"貞觀·個人特質與評價",q:"就「玄武門之變」評價而言，下列「正面／負面」並陳何者最為恰當？",options:["正面：廣開言路；負面：奢華巡遊","正面：展現其英勇與果決；負面：殺兄迫父有悖倫常、首開宮廷鬥爭惡例","正面：輕徭薄賦；負面：東征高麗","正面：制度完善；負面：追求長生"],answer:1,explain:"只有此組緊扣玄武門本身：事變顯其英勇果決為正面，殺兄迫父、首開宮廷鬥爭惡例為負面；其餘各組所指不相應。"},
  {topic:"貞觀·個人特質與評價",q:"就「貞觀之治的成因」而言，錢穆強調太宗個人才識、呂思勉強調時勢。綜合而言最持平的看法是？",options:["全因太宗一人之力，與時勢無關","全因時勢使然，與太宗無關","貞觀之治是太宗的雄才與納諫等個人因素，配合久亂思治的時勢共同促成","與君臣、制度、時勢皆無關係"],answer:2,explain:"錢穆重個人、呂思勉重時勢；持平之論應兼採兩說：太宗的才識納諫配合久亂思治的時勢共同促成貞觀之治。"},
  {topic:"貞觀·個人特質與評價",q:"下列關於太宗「用人唯才、不問出身」的說法，哪些正確？\n(1) 「苟或不才，雖親不用」是魏徵勸諫太宗的名言\n(2) 以善謀的房玄齡、善斷的杜如晦為相\n(3) 重用出身寒微的馬周、隋末降將尉遲敬德等\n(4) 不計前嫌重用建成舊臣魏徵",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——「苟或不才，雖親不用」是太宗自言的用人原則，並非魏徵的諫言。"},
  {topic:"貞觀·個人特質與評價",q:"下列關於太宗「善於納諫」的說法，哪些正確？\n(1) 以隋煬帝拒諫招亡為戒、廣開言路\n(2) 太宗厭惡進諫、屢將直諫之臣治罪處死\n(3) 魏徵上疏二百餘策、屢次犯顏直諫\n(4) 規定三品以上官員議事時諫官隨從、有錯速諫",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——太宗鼓勵並賞賜進諫者、虛心納諫，使百官敢言，並非厭惡進諫、將直諫者治罪處死。"},
  {topic:"貞觀·個人特質與評價",q:"下列關於太宗「以民為本、崇尚節儉」的說法，哪些正確？\n(1) 關中水旱即開倉濟民、減免災區賦稅\n(2) 贖回隋末被擄掠及賣身的百姓\n(3) 太宗窮奢極侈、自奉甚厚而苛待百姓\n(4) 遣散宮女三千餘人、免去四方珍貢",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——太宗平素儉約、自奉很儉而待民則寬，並非窮奢極侈、苛待百姓。"},
  {topic:"貞觀·個人特質與評價",q:"下列關於唐太宗晚年過失的說法，哪些正確？\n(1) 漸驕傲自滿、疏遠賢臣、拒納諫言\n(2) 奢華巡遊、廣建宮室如玉華宮、顯仁宮\n(3) 晚年寵信道士、服金石丹藥以求長生\n(4) 晚年益發勤儉納諫、施政更勝貞觀之初",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——太宗晚年漸驕奢拒諫、未能貫徹始終，並非益發勤儉納諫、施政更勝初年。"},
  {topic:"貞觀·個人特質與評價",q:"下列關於太宗東征高麗的說法，哪些正確？\n(1) 太宗東征高麗時，魏徵臨終仍上表勸阻\n(2) 晚年好大喜功、不顧群臣勸阻親征\n(3) 親征敗北、將士傷亡甚眾\n(4) 房玄齡臨終仍上表勸阻",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——臨終上表勸阻東征者是房玄齡；魏徵早在東征之前已病逝。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"開創「開元之治」的唐朝皇帝是？",options:["唐玄宗（李隆基）","唐太宗（李世民）","武則天","唐睿宗（李旦）"],answer:0,explain:"唐玄宗李隆基為睿宗第三子，712年睿宗傳位予他，改元開元，開創「開元之治」。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"唐玄宗即位後所改的年號是？",options:["貞觀","開元","武德","天可汗"],answer:1,explain:"李隆基即位後改元「開元」，其治世史稱「開元之治」，後期改元天寶，並爆發安史之亂。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"中國歷史上唯一的女皇帝、曾廢唐自立、建國號「周」的是？",options:["韋后","楊貴妃","武則天","文成公主"],answer:2,explain:"武則天廢唐自立、建國號周，是中國史上唯一的女皇帝；其後韋后欲干政，被李隆基平定。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"李隆基即位前曾平定哪一位企圖干政的人物？",options:["安祿山","李林甫","松贊干布","韋后"],answer:3,explain:"韋后欲干政，被睿宗之子李隆基平定；睿宗繼而傳位予李隆基，是為玄宗。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列哪一項屬於武則天、韋后當政時期遺留下來、玄宗即位後須糾正的問題？",options:["濫賞官位、賣官鬻爵造成冗官","輕徭薄賦、府庫充盈","三省制度健全、相權制衡","吏治清明、官員精簡"],answer:0,explain:"武韋濫賞官位、增員外官、賣官鬻爵（斜封官），令京官多達一萬七千人（太宗時僅六百四十人），冗官嚴重。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"武后時官員劉禕之謂「不經鳳閣（中書）鸞台（門下），何名為敕？」此語最能反映武后時期？",options:["三省制度運作健全","詔令多不經三省，三省制度遭到破壞","相權凌駕於皇權之上","科舉制度十分嚴謹"],answer:1,explain:"此語慨嘆武后詔令不經中書門下，反映武后事無大小盡由君主決斷、三省制遭破壞，為玄宗恢復三省的背景。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"武則天提倡佛教，時人有「十分天下之財而佛有七八」之說。這最能說明當時？",options:["佛教使國家財政更充裕","寺院踴躍納稅助國","寺院經濟膨脹，僧尼免役、佔田過多，嚴重損害國家經濟","僧尼勤於耕作生產"],answer:2,explain:"僧尼寺院大增、佔大量土地又免賦役，百姓遁入佛門逃役，「佛有七八」反映寺院經濟嚴重損害國家經濟。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列事件按時間先後排列，何者正確？\n(甲) 李隆基即位、改元開元\n(乙) 武則天廢唐自立、建國號周\n(丙) 李隆基平定韋后",options:["甲→乙→丙","丙→乙→甲","乙→甲→丙","乙→丙→甲"],answer:3,explain:"武則天稱帝建周（乙）在先，其後李隆基平定韋后（丙），睿宗繼而傳位、李隆基即位改元開元（甲）。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列關於武則天、韋后當政時期遺留問題的說法，哪些正確？\n(1) 武韋時期厲行節儉、府庫因而日益充裕\n(2) 濫賞官位、增設員外官，官僚人數劇增\n(3) 賣官鬻爵，凡出三十萬錢即可獲授「斜封官」\n(4) 武氏詔令常不經三省，三省制度遭破壞",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——武韋時期後宮奢侈、濫賞揮霍，並非厲行節儉令府庫充裕；節儉是玄宗即位後糾正的措施。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列關於唐玄宗的說法，哪些正確？\n(1) 他是唐睿宗李旦的第三子\n(2) 玄宗在位四十餘年，全用「開元」一個年號\n(3) 即位前曾平定欲干政的韋后\n(4) 在位前後四十餘年、為唐朝在位最久的皇帝",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——玄宗後期改元「天寶」，並非全用開元一個年號。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列關於武則天的說法，哪些正確？\n(1) 曾廢唐自立、建國號「周」\n(2) 在位時厲行裁汰冗官、官僚精簡\n(3) 為中國歷史上唯一的女皇帝\n(4) 在位時大幅增加進士錄取名額、選官太濫",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——武則天濫賞官位、選官太濫造成冗官，並非厲行裁汰、官僚精簡。"},
  {topic:"開元·玄宗即位與武韋遺風",q:"下列關於武韋時期遺留問題的說法，哪些正確？\n(1) 均田制漸成空文、土地兼併嚴重、逃戶甚多\n(2) 寺院佔大量土地、僧尼免役，「十分天下之財而佛有七八」\n(3) 武韋時期吏治清明、府庫充盈、邊防鞏固\n(4) 府兵制漸趨敗壞、逃兵漸多",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——武韋時期冗官奢侈、弊政叢生，並非吏治清明、府庫充盈、邊防鞏固。"},
  {topic:"開元·政治措施",q:"針對武后詔令不經三省的弊端，玄宗的相應措施是？",options:["恢復三省原有權力，政令重歸中書草擬、門下審議","廢除三省、由皇帝獨斷","擴大內朝架空三省","把宰相人數增至十餘人"],answer:0,explain:"玄宗恢復三省權力：政令重歸中書草擬、門下審議，並把宰相人數限制在三人內，恢復相權制衡、提高決策效率。"},
  {topic:"開元·政治措施",q:"玄宗把太宗時的「十道」改為「十五道」，並於各道設置定期巡視、考核地方官的是？",options:["節度使","採訪使","黜陟大使","刺史"],answer:1,explain:"玄宗把十道改為十五道，各道置採訪使定期巡視、考核地方官政績，確保官員用心管治、保障民生。"},
  {topic:"開元·政治措施",q:"針對武韋「選官太濫」造成的冗官問題，玄宗革新科舉的措施是？",options:["大幅增加進士錄取名額","恢復門第取士、廢除考試","規定明經、進士等科每年及第人數不得超過一百人","容許自薦、試官以廣納人才"],answer:2,explain:"玄宗收緊科舉錄取，規定明經進士每年及第不超百人，並重申及第後須經吏部甄選方可授官，以確保官員質素。"},
  {topic:"開元·政治措施",q:"武韋時期凡出三十萬錢即可獲授、玄宗即位後加以罷免的官職俗稱？",options:["採訪使","彍騎","長征健兒","斜封官"],answer:3,explain:"武韋賣官鬻爵，出三十萬錢即得「斜封官」（不按常規冊封的官職）；玄宗即位後罷免大批斜封官以澄清吏治。"},
  {topic:"開元·政治措施",q:"玄宗任用哪兩位賢相改革積弊、罷去武韋以來所置冗官數千人？",options:["姚崇、宋璟","李林甫、楊國忠","裴耀卿、韋堅","房玄齡、杜如晦"],answer:0,explain:"玄宗任用姚崇、宋璟改革積弊，罷武韋以來冗官數千、限內外文武官為一萬八千多人，澄清吏治。"},
  {topic:"開元·政治措施",q:"按張九齡建議推行、藉以打破「重京官、輕外任」風氣的措施是？",options:["賣官鬻爵","京官與地方官互調（內外官互調）","設置斜封官","增設員外官"],answer:1,explain:"玄宗納張九齡議行內外官互調：京官優秀者外調為都督刺史、地方優秀者擢為京官，改善地方吏治、消除中央地方隔閡。"},
  {topic:"開元·政治措施",q:"黃中業指內外官互調「使地方上的吏治大為改善……中央政府的官員更能瞭解下情、體察民情」。此最能說明該制度？",options:["只利地方、無益中央","只是徒具形式、毫無作用","兼利中央與地方吏治，促進開元盛世","令中央地方隔閡加深"],answer:2,explain:"黃中業指內外官互調既改善地方吏治、又使中央官員體察下情，兼利中央與地方，推動開元盛世。"},
  {topic:"開元·政治措施",q:"下列「原因→結果」配對，哪一組成立？",options:["因恢復三省權力，故君主得以事無大小獨斷","因罷免斜封官，故官僚人數劇增","因設採訪使，故地方再無監察","因規定明經進士每年及第不超百人、及第須經吏部甄選，故官員質素得以提升"],answer:3,explain:"只有「收緊科舉→官員質素提升」成立；恢復三省是制衡君權、罷斜封官是裁冗官、採訪使是加強監察，其餘皆與史實相反。"},
  {topic:"開元·政治措施",q:"下列關於玄宗政治改革的說法，哪些正確？\n(1) 恢復三省權力，政令重歸中書草擬、門下審議\n(2) 把宰相人數限制在三人之內\n(3) 大幅放寬科舉錄取、增設斜封官以廣納人才\n(4) 把十道改為十五道、置採訪使考核地方官",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——玄宗正是要收緊科舉、罷免斜封官以裁冗官，並非放寬錄取、增設斜封官。"},
  {topic:"開元·政治措施",q:"下列關於玄宗裁汰冗官的說法，哪些正確？\n(1) 罷免大批武韋以來的「斜封官」\n(2) 任用姚崇、宋璟罷去冗官數千人\n(3) 限定內外文武官員為一萬八千多人\n(4) 為收攬民心而大量增設員外官、濫授官職",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——大量增設員外官、濫授官職是武韋之弊，玄宗正是要裁汰冗官，並非再大量增設。"},
  {topic:"開元·政治措施",q:"下列關於玄宗革新科舉與整頓吏治的說法，哪些正確？\n(1) 重京官、輕外任，禁止京官外調地方\n(2) 規定明經、進士每年及第不超過一百人\n(3) 重申及第後須經吏部甄選方可授官\n(4) 親自考核縣令、黜退表現不合格者",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——玄宗正是要打破「重京官、輕外任」、推行內外官互調，並非禁止京官外調地方。"},
  {topic:"開元·政治措施",q:"下列關於玄宗刑法措施的說法，哪些正確？\n(1) 流放武周時僥倖未被清算的酷吏、勒令其子孫不得入仕\n(2) 沿用武后嚴刑峻法、廣任酷吏治國\n(3) 嚴禁屠割刑人骨肉，違者依法治罪\n(4) 把偷盜罪量刑由杖一百減為杖六十",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——玄宗正是要罷免酷吏、廢除酷刑、減輕刑罰，並非沿用武后嚴刑峻法、廣任酷吏。"},
  {topic:"開元·政治措施",q:"下列關於玄宗恢復三省權力的說法，哪些正確？\n(1) 武后詔令常不經三省、三省制遭破壞\n(2) 玄宗令政令重歸中書草擬、門下審議\n(3) 把宰相人數限制在三人之內\n(4) 恢復三省後反令君主可事無大小獨斷專行",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——恢復三省正是要重建相權制衡皇權、使政務重歸官員掌理，並非令君主獨斷專行。"},
  {topic:"開元·經濟措施",q:"玄宗命哪位大臣清查全國戶口及土地、以增加課稅戶與稅收？",options:["裴耀卿","宇文融","韋堅","宋璟"],answer:1,explain:"玄宗命宇文融清查全國戶口土地，公佈重附籍逃戶免六年賦役，查出逃戶約八十萬、土地數百萬畝，充實國家稅收。"},
  {topic:"開元·經濟措施",q:"宇文融清查戶籍時，為吸引逃戶重新附籍而採取的辦法是？",options:["將逃戶一律處死","強徵逃戶充軍","讓重新附籍的逃戶免除六年賦役","沒收逃戶全部財產"],answer:2,explain:"玄宗公佈條例，讓重新附籍的逃戶免除六年賦役，藉此吸引約八十萬逃戶重新成為國家編戶、增加稅收。"},
  {topic:"開元·經濟措施",q:"玄宗接納姚崇建議、勒令約一萬二千名僧尼還俗，主要目的是？",options:["擴建佛寺、宣揚佛教","削減農業人口","增加免役人數","納入課稅戶、收回寺院土地以增國家收入"],answer:3,explain:"寺院經濟損害國家財政，玄宗納姚崇議勒令一萬二千僧尼還俗、納課稅，收回寺院土地、禁建佛寺，增加國家收入。"},
  {topic:"開元·經濟措施",q:"玄宗振興農業，下令在西北和黃河沿岸各地推行的是？",options:["大興屯田","裁汰僧尼","清查戶籍","改革漕運"],answer:0,explain:"玄宗下令在西北及黃河沿岸大興屯田，新增耕地約五百萬畝，並修建五十多項水利工程，增加田賦收入。"},
  {topic:"開元·經濟措施",q:"玄宗命裴耀卿施行、把江南糧食運往關中的方法是？",options:["和糴法","分段運輸法","均輸法","平準法"],answer:1,explain:"玄宗命裴耀卿施行分段運輸法、把江南糧食運至關中，每年運量增加十倍而運費大減；又命韋堅開鑿廣運潭。"},
  {topic:"開元·經濟措施",q:"杜甫《憶昔》謂「小邑猶藏萬家室……公私倉廩俱豐實」。配合整理戶籍、均田、租庸調等措施，此最能說明開元？",options:["國庫空虛、民不聊生","賦稅沉重、民怨四起","課稅戶增加、為民制產，國庫與民間倉廩俱充實","均田制全面崩潰"],answer:2,explain:"整理戶籍增課稅戶、配合均田租庸調為民制產、獎勵農桑，故「公私倉廩俱豐實」，成就開元全盛。"},
  {topic:"開元·經濟措施",q:"裁汰僧尼一萬二千人、勒令還俗納稅，對國家經濟的直接作用是？",options:["減少國家稅收","削弱農業生產","加重百姓賦役","增加課稅戶與勞動力、收回寺院土地，增國家收入"],answer:3,explain:"僧尼還俗成課稅戶、寺院土地收歸國有，既增稅收又增勞動力，直接改善因寺院經濟而受損的國家財政。"},
  {topic:"開元·經濟措施",q:"下列「原因→結果」配對，哪一組成立？",options:["因裴耀卿行分段運輸、韋堅鑿廣運潭，故關東江淮糧食得以順利運抵長安","因清查戶籍，故逃戶大增","因裁汰僧尼，故寺院土地增加","因大興屯田，故耕地面積大減"],answer:0,explain:"只有「改革漕運→糧運順暢」成立；清查戶籍是減逃戶、裁僧尼是收回寺田、屯田是增耕地，其餘皆與史實相反。"},
  {topic:"開元·經濟措施",q:"下列關於玄宗清查戶籍的說法，哪些正確？\n(1) 命宇文融清查全國戶口及土地\n(2) 讓重新附籍的逃戶免除六年賦役\n(3) 清查後國家戶口與稅收不增反減\n(4) 查出逃戶約八十萬、土地數百萬畝",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——清查戶籍把大量逃戶重新編為課稅戶、查收大量土地，國家戶口與稅收因而增加，並非不增反減。"},
  {topic:"開元·經濟措施",q:"下列關於玄宗振興農業與漕運的說法，哪些正確？\n(1) 在西北及黃河沿岸大興屯田、新增耕地約五百萬畝\n(2) 修建五十多項水利工程、改善灌溉\n(3) 命裴耀卿行分段運輸法、運量大增而運費大減\n(4) 廢除均田制與租庸調制、改行重稅",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——玄宗繼續實行均田制及租庸調制、保持輕徭薄賦，並非廢除二制、改行重稅。"},
  {topic:"開元·經濟措施",q:"下列關於玄宗裁汰僧尼的說法，哪些正確？\n(1) 玄宗大建佛寺、鼓勵百姓出家為僧\n(2) 因寺院佔田過多、僧尼免役損害國家經濟\n(3) 接納姚崇建議、勒令約一萬二千僧尼還俗\n(4) 寺院土地收歸國有、禁止再建佛寺造佛像",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——玄宗正是要裁汰僧尼、禁建佛寺以增收入，並非大建佛寺、鼓勵出家。"},
  {topic:"開元·經濟措施",q:"下列關於玄宗改革漕運的說法，哪些正確？\n(1) 因關中糧產有限、關東江淮糧食難運首都\n(2) 改革漕運後關中糧食更難運入、長安日益衰落\n(3) 命裴耀卿施行分段運輸法、運量大增而運費大減\n(4) 命韋堅開鑿廣運潭、使官倉糧食直運長安",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——改革漕運使糧食順利運抵長安、關中蓬勃發展、長安繁榮，並非更難運入、長安衰落。"},
  {topic:"開元·文教措施",q:"玄宗設置、禮聘學士研經講學並搜羅繕寫天下遺書的機構是？",options:["梨園","集賢院","弘文館","安西都護府"],answer:1,explain:"玄宗置集賢院、禮聘學士研經講學，搜羅繕寫天下遺書、整理後得圖書四萬八千卷，保存大量典籍。"},
  {topic:"開元·文教措施",q:"玄宗命張說等修撰、記載唐代禮法風俗的禮書是？",options:["《五經正義》","《唐六典》","《開元禮》","《貞觀政要》"],answer:2,explain:"玄宗命張說等修撰《開元禮》（五禮），又命張九齡等編《唐六典》記錄典章制度，使唐朝禮制法度更趨完備。"},
  {topic:"開元·文教措施",q:"玄宗命張九齡等人編纂、記錄唐代典章制度的是？",options:["《開元禮》","《五經定本》","《氏族志》","《唐六典》"],answer:3,explain:"《唐六典》記錄唐代典章制度，與《開元禮》同為玄宗朝編修的典籍，使唐朝禮制法度更趨完備。"},
  {topic:"開元·文教措施",q:"玄宗選樂工、宮女教授樂曲，所設、後世稱「皇帝梨園子弟」的是？",options:["梨園","集賢院","國子監","政事堂"],answer:0,explain:"玄宗於梨園選樂工宮女教授樂曲（皇帝梨園子弟），又親制《霓裳羽衣曲》、以詩賦取士，文學藝術鼎盛。"},
  {topic:"開元·文教措施",q:"玄宗親自制定音律、創作的著名樂曲是？",options:["《秦王破陣樂》","《霓裳羽衣曲》","《廣陵散》","《十事要說》"],answer:1,explain:"玄宗精通音律、親作《霓裳羽衣曲》，又設梨園教習樂曲、以詩賦取士，反映開元文教與藝術之盛。"},
  {topic:"開元·文教措施",q:"開元年間高麗、百濟、新羅、吐蕃君長派子弟來華入學、形成「漢字文化圈」。這最能說明？",options:["唐被迫向外族學習","唐文化從此衰落","唐文教興盛、典章文化廣傳四方","外族拒絕接受唐文化"],answer:2,explain:"四方學者雲集、外族遣子弟入學並應科舉，形成漢字文化圈，反映開元文教興盛、唐文化廣傳四方。"},
  {topic:"開元·文教措施",q:"玄宗命修《開元禮》《唐六典》、置集賢院編書的整體作用是？",options:["削弱中央集權","廢除一切禮法","打擊儒家學術","完備唐代禮制法度、保存大量典籍"],answer:3,explain:"《開元禮》定禮法、《唐六典》記典制、集賢院搜書四萬八千卷，整體使唐禮制法度更完備、保存大量典籍。"},
  {topic:"開元·文教措施",q:"下列關於玄宗編修典籍的說法，哪些正確？\n(1) 下令焚毀前代典籍、禁止講學\n(2) 置集賢院、禮聘學士研經講學\n(3) 搜羅繕寫天下遺書、整理後得圖書四萬八千卷\n(4) 命張說修《開元禮》、張九齡編《唐六典》",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——玄宗正是大力搜書、編典、聘儒講學，並非焚毀典籍、禁止講學。"},
  {topic:"開元·文教措施",q:"下列關於開元文教興盛的說法，哪些正確？\n(1) 四方學者雲集長安、形成「漢字文化圈」\n(2) 玄宗排斥外來文化、嚴禁胡風傳入\n(3) 高麗、新羅、吐蕃等遣子弟入學\n(4) 日本人晁衡等外國學生曾在唐應考科舉",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——唐對各族文化兼容並蓄、雜染胡風，發展多采的唐文化，並非排斥外來文化、嚴禁胡風。"},
  {topic:"開元·文教措施",q:"下列關於開元文教措施的說法，哪些正確？\n(1) 置集賢院、搜羅繕寫天下遺書\n(2) 命張說修《開元禮》、張九齡編《唐六典》\n(3) 玄宗廢除科舉、不再以詩賦取士\n(4) 設梨園教習樂曲、玄宗親制《霓裳羽衣曲》",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——玄宗以詩賦取士、文教鼎盛，並非廢除科舉、不再取士。"},
  {topic:"開元·軍事與外族",q:"玄宗因府兵制敗壞，接納張說建議廢府兵、改行的兵制是？",options:["世兵制","屯田制","府兵徵兵制","募兵制"],answer:3,explain:"府兵受田不足、逃兵漸多，玄宗納張說議廢府兵（徵兵制）、改行募兵制，招募兵員守衛京師及戍邊。"},
  {topic:"開元·軍事與外族",q:"玄宗招募約十二萬兵員充當京師禁衛軍，後改稱為？",options:["彍騎","長征健兒","府兵","蕃兵"],answer:0,explain:"玄宗募兵十二萬充京師禁衛、初稱「長從宿衛」後改稱「彍騎」；地方則募「長征健兒」代府兵戍邊。"},
  {topic:"開元·軍事與外族",q:"玄宗時招募、代替府兵長期戍守邊疆的是？",options:["彍騎","長征健兒","折衝府","採訪使"],answer:1,explain:"玄宗把募兵制推廣至地方，招募「長征健兒」代府兵長期戍邊；守衛京師則由「彍騎」負責，兵農分離各專其業。"},
  {topic:"開元·軍事與外族",q:"玄宗為加強邊防，在邊疆設置「十大兵鎮」，其長官稱為？",options:["採訪使","巡察使","節度使","黜陟大使"],answer:2,explain:"玄宗在邊疆設十大兵鎮、置節度使兼領當地軍政財大權，並募長征健兒戍守，十鎮統兵共四十八萬。"},
  {topic:"開元·軍事與外族",q:"《劍橋中國隋唐史》指十大兵鎮「使壓倒一切的兵權集中在少數人手中……仍是產生危險的潛在根源」。此最能說明置兵鎮？",options:["徹底消除一切邊患與內憂","使兵權分散於中央","與安史之亂全無關係","雖鞏固邊防，卻使兵權過度集中，埋下日後動亂的隱憂"],answer:3,explain:"《劍橋隋唐史》指兵鎮雖一時鞏固邊防，卻令兵權集中少數節度使，成為潛在危險，正是安史之亂的伏線。"},
  {topic:"開元·軍事與外族",q:"玄宗接納姚崇、宋璟的勸諫，沿用太宗以來「睦鄰四方」的政策，例子是？",options:["與吐蕃、奚、契丹和親，與西域諸國互市","大舉征伐、不事招撫","閉關鎖國、斷絕往來","廢除天可汗地位"],answer:0,explain:"玄宗納姚宋之諫、行睦鄰政策，與吐蕃奚契丹和親、與西域互市，使唐天子保持天可汗地位、聲威遠播。"},
  {topic:"開元·軍事與外族",q:"與玄宗「早年加強邊防、不輕啟邊釁」相比，其「晚年」對外的最大轉變是？",options:["徹底放棄邊防","好大喜功、輕啟邊釁，屢次對吐蕃、南詔等用兵","完全停止一切戰爭","裁撤所有兵鎮"],answer:1,explain:"玄宗早年設兵鎮防邊、不輕啟戰端；晚年則好大喜功、屢征吐蕃南詔（怛羅斯、南詔之戰慘敗），虛耗國力。"},
  {topic:"開元·軍事與外族",q:"下列關於玄宗改革兵制的說法，哪些正確？\n(1) 因府兵受田不足、逃兵漸多而改革\n(2) 接納張說建議，廢府兵、改行募兵制\n(3) 改革後恢復府兵世襲、兵農合一的舊制\n(4) 募兵分為守衛京師的彍騎與戍邊的長征健兒",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——玄宗是廢府兵、改行募兵制，使兵農分離，並非恢復府兵世襲、兵農合一的舊制。"},
  {topic:"開元·軍事與外族",q:"下列關於玄宗置十大兵鎮的說法，哪些正確？\n(1) 因吐蕃、契丹等外族勢力擴張及府兵廢弛而設\n(2) 設節度使兼領當地軍事、民政、財政大權\n(3) 十大兵鎮統兵共約四十八萬人\n(4) 「長征健兒」由各地府兵輪番充任",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——長征健兒是招募的職業兵，並非由府兵輪番充任。"},
  {topic:"開元·軍事與外族",q:"下列關於玄宗對外族措施的說法，哪些正確？\n(1) 派郭虔瓘迎擊、大破侵邊的突厥軍\n(2) 多次派兵征討吐蕃、得勝而回\n(3) 納姚崇宋璟之諫、與吐蕃奚契丹和親、與西域互市\n(4) 「參天可汗道」由唐玄宗下令開設",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——參天可汗道設於唐太宗之時，並非玄宗。"},
  {topic:"開元·軍事與外族",q:"下列關於彍騎與長征健兒的說法，哪些正確？\n(1) 彍騎之設出自張九齡的建議\n(2) 彍騎由募兵組成、負責守衛京師\n(3) 長征健兒代替府兵長期戍守邊疆\n(4) 兩者取代崩壞的府兵、分擔守京與戍邊任務",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——募兵改革（彍騎）出自張說的建議，並非張九齡。"},
  {topic:"開元·盛況成效",q:"開元年間（約740年）全國戶數迅速增至約多少、成為唐朝戶口的最高紀錄？",options:["二百萬戶","三百八十萬戶","八百四十餘萬戶","一千五百萬戶"],answer:2,explain:"唐初編戶約二百萬、貞觀末三百八十萬，開元（740）增至八百四十餘萬戶、人口四千八百餘萬，為唐戶口最高紀錄。"},
  {topic:"開元·盛況成效",q:"據《通典》，天寶八年全國各地庫存糧食達九千六百萬石。這最能反映開元盛況中的？",options:["四夷賓服","社會安定","人口激增","國家富庶"],answer:3,explain:"府庫積儲充盈、田租粟帛動以萬計、庫存糧達九千六百萬石，正反映開元盛況的「國家富庶」。"},
  {topic:"開元·盛況成效",q:"據《通典》，開元年間「米斗至十三文……兩京米斗不至二十文」。這最能說明？",options:["物價低廉、百姓生活富足","物價飛漲、民不聊生","糧食短缺、餓殍遍野","通貨膨脹嚴重"],answer:0,explain:"米斗十三文、兩京物價低廉，反映開元社會物產豐盛、物價低廉、百姓生活富足。"},
  {topic:"開元·盛況成效",q:"開元二十五年，全國判死刑者僅五十九人。這最能說明哪一盛況？",options:["人口激增","社會安定","國家富庶","文教興盛"],answer:1,explain:"玄宗廢酷吏酷刑、經濟繁榮、百姓安居，故社會治安良好、犯罪者不多，死刑僅五十九人，反映「社會安定」。"},
  {topic:"開元·盛況成效",q:"杜甫《憶昔》「憶昔開元全盛日，小邑猶藏萬家室……九州道路無豺虎，遠行不勞吉日出」。此詩最能描繪開元？",options:["戰亂頻仍、民不聊生","國庫空虛、盜賊橫行","人口眾多、物產豐盛、社會安定的全盛景象","邊患不絕、流離失所"],answer:2,explain:"杜甫追憶開元全盛：小邑萬家、倉廩豐實、道路無豺虎，描繪人口眾多、物產豐盛、社會安定的盛世景象。"},
  {topic:"開元·盛況成效",q:"開元、天寶年間突厥、回紇、吐蕃酋長在長安任職、西域商人雲集販賣珠寶香料。這最能說明哪一盛況？",options:["社會動盪不安","對外閉關自守","文教衰落","首都成為國際大都會"],answer:3,explain:"各族酋長在長安任職、西域商人雲集，反映政治清明、經濟富庶、國防穩固，首都長安成為國際大都會。"},
  {topic:"開元·盛況成效",q:"下列何者屬於「開元盛況／治世標準」？\n(1) 人口激增\n(2) 國家富庶\n(3) 社會安定\n(4) 首都成為國際大都會",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)"],answer:0,explain:"四項皆正確：人口激增、國家富庶、社會安定、首都成為國際大都會，皆屬開元之治的治世盛況。"},
  {topic:"開元·盛況成效",q:"下列關於開元盛況的說法，哪些正確？\n(1) 開元戶口反較貞觀大減、國勢一蹶不振\n(2) 全國戶數增至八百四十餘萬、為唐戶口最高紀錄\n(3) 府庫積儲充盈、物價低廉\n(4) 突厥、回紇、吐蕃酋長在長安任職，西域商人雲集",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——開元戶口增至八百四十餘萬、為唐最高紀錄，國勢鼎盛，並非較貞觀大減、一蹶不振。"},
  {topic:"開元·盛況成效",q:"下列關於開元盛世景象的說法，哪些正確？\n(1) 開元二十五年全國判死刑者僅五十九人\n(2) 開元年間物價飛漲、民不聊生\n(3) 杜甫《憶昔》描繪「公私倉廩俱豐實」「九州道路無豺虎」\n(4) 長安成為各族雲集的國際大都會",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——開元物價低廉、百姓富足，並非物價飛漲、民不聊生。"},
  {topic:"開元·個人特質與評價",q:"玄宗即位之初為糾正武韋奢風，崇尚節儉的措施『不』包括？",options:["焚燒宮中錦繡、金銀器玩於殿前","罷兩京織錦坊、禁開採珠玉造錦繡","遣散宮女以節省宮廷開支","大興土木、擴建華清宮"],answer:3,explain:"焚錦繡、罷織錦坊、遣散宮女皆為早年崇儉之舉；大興土木、擴建華清宮與楊貴妃享樂是其晚年奢侈之失。"},
  {topic:"開元·個人特質與評價",q:"玄宗開元前期任用、被《資治通鑑》比擬為唐太宗時「房杜」的兩位賢相是？",options:["姚崇、宋璟","李林甫、楊國忠","裴耀卿、韋堅","房玄齡、杜如晦"],answer:0,explain:"姚崇應變成務、宋璟守法持正，二人協心輔佐如太宗時「房杜」，《資治通鑑》謂「前稱房杜，後稱姚宋」。"},
  {topic:"開元·個人特質與評價",q:"姚崇曾上《十事要說》勸玄宗，其主要內容是？",options:["勸玄宗大興佛寺","勸玄宗糾正武則天、韋后當權時期的弊政","勸玄宗多開邊釁","勸玄宗重用宦官"],answer:1,explain:"姚崇上《十事要說》，勸玄宗行仁恕、勿貪邊功、厲行法治、勿令宦官外戚干政、減租稅等，糾正武韋弊政。"},
  {topic:"開元·個人特質與評價",q:"玄宗以哪位先帝為榜樣、虛懷納諫、下詔求諫？",options:["隋文帝","漢武帝","唐太宗","唐高祖"],answer:2,explain:"玄宗以太宗為榜樣、虛懷納諫，下詔求諫、恢復諫官議政之制（宰相議政諫官隨從），重用敢言的韓休、張九齡。"},
  {topic:"開元·個人特質與評價",q:"《資治通鑑》謂「開元二十四年罷張九齡相，專任李林甫，此理亂之分也」。此句點出玄宗一朝？",options:["開元盛世的開端","府兵制改革的成果","睦鄰政策的成效","由盛轉衰、由治趨亂的轉捩點"],answer:3,explain:"罷賢相張九齡、專任口蜜腹劍的李林甫，被視為玄宗朝由治趨亂的轉捩點，自此政局日漸敗壞。"},
  {topic:"開元·個人特質與評價",q:"玄宗晚年埋下安史之亂伏線的用人之失是？",options:["重用胡將安祿山，令其一人兼領三鎮節度使，形成「外重內輕」","罷免一切節度使","廢除募兵制","親自統領十大兵鎮"],answer:0,explain:"玄宗晚年任胡人安祿山一人兼平盧、范陽、河東三鎮節度使、掌邊鎮重兵，形成外重內輕，埋下安史之亂伏線。"},
  {topic:"開元·個人特質與評價",q:"《資治通鑑》謂「姚崇應變成務，宋璟守法持正……唐世賢相，前稱房、杜，後稱姚、宋」。此最能說明開元前期？",options:["奸臣當道、政局敗壞","賢相輩出、各有所長，造就開元治世","君主獨斷、不用賢臣","宦官專權、賢相被逐"],answer:1,explain:"《資治通鑑》以姚宋比擬房杜、稱為唐世賢相，反映開元前期賢相輩出、各有所長，協心輔政造就開元治世。"},
  {topic:"開元·個人特質與評價",q:"杜牧稱讚姚崇「首佐玄宗起中興業」。此最能肯定姚崇？",options:["其晚年誤國之失","其貪贓枉法之行","輔佐玄宗革除武韋弊政、開創開元盛世之功","其窮兵黷武之策"],answer:2,explain:"杜牧以「首佐玄宗起中興業」稱姚崇，肯定其上《十事要說》、輔玄宗革除武韋弊政、開創開元盛世之功。"},
  {topic:"開元·個人特質與評價",q:"就「玄宗一生功過」而言，下列「正面／負面」並陳何者最為恰當？",options:["正面：平定韋后；負面：恢復三省","正面：節儉；負面：納諫","正面：清查戶籍；負面：裁汰僧尼","正面：開元前期勵精圖治、開創盛世；負面：晚年荒怠任奸、釀成安史之亂"],answer:3,explain:"只有此組緊扣玄宗一生功過：前期勵精圖治開創開元之治為正面，晚年荒怠任奸、釀安史之亂為負面；其餘各組正反所指不相應。"},
  {topic:"開元·個人特質與評價",q:"杜甫《兵車行》「邊庭流血成海水，武皇開邊意未已」。此詩最能批評玄宗晚年？",options:["好大喜功、輕啟邊釁，致民眾賦役沉重、國力虛耗","勵精圖治、與民休息","崇尚節儉、愛惜民力","虛懷納諫、選賢任能"],answer:0,explain:"《兵車行》借「武皇開邊」諷玄宗晚年好大喜功、屢啟邊釁，致流血成海、賦役沉重、虛耗國力。"},
  {topic:"開元·個人特質與評價",q:"下列關於玄宗「崇尚節儉」的說法，哪些正確？\n(1) 自奉儉約，禁三品以下朝臣及后妃穿戴繡服珠玉\n(2) 為示豪富而大造珠玉錦繡、廣賞群臣\n(3) 罷兩京織錦坊、禁各地開採珠玉造錦繡\n(4) 把宮中錦繡、金銀器玩焚於殿前",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——玄宗早年崇儉、禁造珠玉錦繡，並非為示豪富而大造珠玉、廣賞群臣。"},
  {topic:"開元·個人特質與評價",q:"下列關於玄宗「知人善任」的說法，哪些正確？\n(1) 不計前嫌任用武后舊臣姚崇、宋璟\n(2) 姚崇多謀善斷、薦剛直的宋璟為相\n(3) 姚崇曾上《十事要說》，勸玄宗多開邊功以振國威\n(4) 韓休、張九齡以敢言直諫見用",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——《十事要說》是勸玄宗「勿貪邊功」等以糾正武韋弊政，並非勸多開邊功。"},
  {topic:"開元·個人特質與評價",q:"下列關於唐玄宗「晚年」過失的說法，哪些正確？\n(1) 荒怠朝政、縱情聲色，寵幸楊貴妃\n(2) 奢侈揮霍、迷信鬼神，擴建華清宮\n(3) 罷賢相張九齡、專任李林甫、楊國忠等佞臣\n(4) 益發勤政納諫、施政更勝開元前期",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——玄宗晚年荒怠拒諫、未能貫徹始終，並非益發勤政納諫、施政更勝前期。"},
  {topic:"開元·個人特質與評價",q:"比較玄宗「早年」與「晚年」，下列說法哪些正確？\n(1) 晚年依然從諫如流、廣納直言\n(2) 早年勵精圖治、奉行節儉\n(3) 早年唯才是舉、虛懷納諫\n(4) 晚年好大喜功、輕啟邊釁",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——玄宗晚年拒諫，諫官周子諒因進言被杖打流放而死，朝野噤若寒蟬，並非依然從諫如流。"},
  {topic:"開元·個人特質與評價",q:"下列關於玄宗晚年用人之失的說法，哪些正確？\n(1) 罷賢相張九齡、專任口蜜腹劍的李林甫\n(2) 晚年大權落入李林甫、楊國忠等奸臣之手\n(3) 晚年仍堅持唯才是舉、賢相滿朝\n(4) 任胡將安祿山一人兼領三鎮節度使、形成外重內輕",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——玄宗晚年罷賢相、任奸佞、用胡將安祿山，並非堅持唯才是舉、賢相滿朝。"},
  {topic:"安史·爆發原因（人為）",q:"安史之亂爆發時，在位的唐朝皇帝是？",options:["唐玄宗","唐太宗","唐肅宗","唐代宗"],answer:0,explain:"安史之亂於玄宗天寶年間爆發；其後玄宗奔蜀、太子李亨於靈武即位為肅宗，肅宗死後代宗繼位。"},
  {topic:"安史·爆發原因（人為）",q:"唐玄宗踏入天寶年間怠於政事，最主要因為他？",options:["勵精圖治、事必躬親","沉迷聲色、寵幸楊貴妃，荒於政事","虛懷納諫、廣開言路","崇尚節儉、體恤民情"],answer:1,explain:"天寶年間玄宗失去勵精圖治之心，寵幸楊貴妃、縱情聲色、不願早朝，將朝政交託李林甫、楊國忠，政治日壞。"},
  {topic:"安史·爆發原因（人為）",q:"玄宗用人不當，先後任用的兩位敗壞朝政的宰相是？",options:["姚崇、宋璟","郭子儀、李光弼","李林甫、楊國忠","房玄齡、杜如晦"],answer:2,explain:"玄宗怠政，先任口蜜腹劍的李林甫為相，後因寵楊貴妃而任其堂兄楊國忠為相，二人以權謀私、排斥賢才。"},
  {topic:"安史·爆發原因（人為）",q:"建議玄宗「以胡人為節度使」、被視為安史之亂直接原因之一的宰相是？",options:["楊國忠","張九齡","高力士","李林甫"],answer:3,explain:"李林甫為壟斷相位、堵塞邊將入相之途，以胡人勇悍寒微無黨援為由說服玄宗用胡人為節度使，為安祿山叛變提供條件。"},
  {topic:"安史·爆發原因（人為）",q:"李林甫之所以主張用「胡人」為節度使，真正用意是？",options:["胡人多不識字、無法藉軍功內調為相，可保其壟斷相位","胡人忠誠可靠、絕不會叛變","胡人精通儒術、便於入朝拜相","為履行睦鄰四方、胡漢一家的政策"],answer:0,explain:"開元時節度使有政績可入朝為相；李林甫為堵塞此途、壟斷相位，遂藉口胡人寒微好戰，實因其不識字無法內調為相。"},
  {topic:"安史·爆發原因（人為）",q:"庸碌無能、靠楊貴妃裙帶關係出任宰相、一人兼四十餘職的是？",options:["李林甫","楊國忠","安祿山","高仙芝"],answer:1,explain:"楊國忠是楊貴妃堂兄，靠裙帶關係拜相，庸碌貪污、兼四十餘職、堵塞言路，又兩度征南詔喪師二十萬，朝政益形腐敗。"},
  {topic:"安史·爆發原因（人為）",q:"安祿山得以久任三鎮節度使、取得叛變資本，主要因為他？",options:["戰功彪炳、忠心耿耿","出身名門、深通儒術","賄賂李林甫、取悅楊貴妃、逢迎玄宗，博得玄宗寵信","力主削減邊鎮兵力"],answer:2,explain:"安祿山賄李林甫、取悅楊貴妃、逢迎玄宗，博得寵信，得久任范陽、平盧、河東三鎮節度使、合共十八萬兵力，取得叛變資本。"},
  {topic:"安史·爆發原因（人為）",q:"安祿山一人兼平盧、范陽、河東三鎮節度使、統兵十八萬，這打破了節度使的甚麼慣例？",options:["「兵農合一」的慣例","「將兵分離」的慣例","「三十稅一」的慣例","「不久任、不遙領、不兼統」的慣例"],answer:3,explain:"玄宗讓安祿山一人久任並兼統三鎮、擁兵十八萬（中央兩倍），打破節度使「不久任、不遙領、不兼統」的慣例，使其有力對抗中央。"},
  {topic:"安史·爆發原因（人為）",q:"玄宗收到安祿山叛變的消息時，最初竟以為是「惡祿山者詐為之」。這最能說明？",options:["玄宗對安祿山過分寵信、始終未能洞悉其野心","安祿山其實並無叛變","玄宗早已洞悉並有所防備","楊國忠誣告安祿山"],answer:0,explain:"玄宗誤以叛報為誣告，反映其對安祿山過分寵信、視為安邊長城，始終未察其野心，難辭其咎。"},
  {topic:"安史·爆發原因（人為）",q:"就安史之亂的人為責任而言，李林甫「建議用胡人為節度使」與楊國忠「迫反安祿山」分別屬？",options:["二者皆屬時勢因素","李林甫——直接原因；楊國忠——導火線","二者皆屬制度因素","李林甫——導火線；楊國忠——直接原因"],answer:1,explain:"李林甫薦胡人為節度使屬直接原因，楊國忠與安祿山不和、迫反安祿山則是觸發叛變的導火線。"},
  {topic:"安史·爆發原因（人為）",q:"下列關於唐玄宗對安史之亂責任的說法，哪些正確？\n(1) 晚年勵精圖治、及時識破並翦除安祿山的陰謀\n(2) 天寶年間怠於政事、寵幸楊貴妃、荒廢朝政\n(3) 用人不當，先後任用李林甫、楊國忠為相\n(4) 寵信安祿山、未能察覺其野心，更視之為「安邊長城」",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——玄宗始終未能洞悉安祿山野心，收到叛變消息仍以為是誣告，並非及時識破並翦除其陰謀。"},
  {topic:"安史·爆發原因（人為）",q:"下列關於李林甫責任的說法，哪些正確？\n(1) 為相十九年，口蜜腹劍、排斥異己\n(2) 極力舉薦賢才、廣開言路，使朝政清明\n(3) 堵塞言路，把諫官比作「立仗馬」、一進言即遭貶斥\n(4) 建議玄宗以胡人為節度使（直接原因）",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——李林甫排斥賢臣、堵塞言路，使玄宗受蒙蔽，並非舉薦賢才、廣開言路。"},
  {topic:"安史·爆發原因（人為）",q:"下列關於楊國忠責任的說法，哪些正確？\n(1) 靠楊貴妃裙帶關係拜相、庸碌貪污\n(2) 一人兼任四十餘職、接受官員行賄\n(3) 為人公正廉明、與安祿山關係融洽\n(4) 兩度發動對南詔的戰爭、喪師二十萬",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——楊國忠貪污庸碌，且與安祿山明爭暗鬥、將相不和，並非公正廉明、與安祿山融洽。"},
  {topic:"安史·爆發原因（人為）",q:"下列關於安祿山責任的說法，哪些正確？\n(1) 賄賂李林甫、取悅楊貴妃以博玄宗寵信\n(2) 蓄謀叛變、前後「謀逆十餘年」\n(3) 大量收編突厥、奚、契丹、同羅等胡人，建立胡人兵團\n(4) 起兵時以「誅楊貴妃，清君側」為號召",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——安祿山起兵的藉口是「誅國忠」（楊國忠），並非誅楊貴妃。"},
  {topic:"安史·制度與時勢因素",q:"安史之亂前，全國兵力分佈「邊鎮強、中央弱」的局面稱為？",options:["內重外輕","強幹弱枝","外重內輕","守內虛外"],answer:2,explain:"玄宗時十大兵鎮約四十八萬、中央彍騎僅約八萬，邊鎮兵力約為中央六倍，形成「外重內輕」之局。"},
  {topic:"安史·制度與時勢因素",q:"玄宗在邊境設置的「十大兵鎮」，其最高長官稱為？",options:["採訪使","刺史","折衝都尉","節度使"],answer:3,explain:"玄宗在邊境設十大兵鎮、置節度使為最高長官；其權力由軍權擴大至兼領州縣行政、財政，並可自行募兵。"},
  {topic:"安史·制度與時勢因素",q:"玄宗時十大兵鎮合共約四十八萬兵力，而中央「彍騎」僅約多少？",options:["八萬","四十八萬","二十萬","一百萬"],answer:0,explain:"十大兵鎮約四十八萬、中央彍騎僅約八萬且疏於戰陣，邊鎮約為中央六倍，造成外重內輕。"},
  {topic:"安史·制度與時勢因素",q:"唐初府兵集中於關中，關中及附近地區佔全國兵力約十分之八，此種分佈稱為？",options:["外重內輕","內重外輕","兵農分離","藩鎮割據"],answer:1,explain:"唐初府兵關中佔十分之四（連附近約十分之八），是「內重外輕」；玄宗改革兵制、廣設兵鎮後則轉為「外重內輕」。"},
  {topic:"安史·制度與時勢因素",q:"安史之亂能爆發的時勢因素之一，是河北地區「漢胡雜處、胡化甚深」，故玄宗多任用？",options:["科舉出身的文官為將帥","關中世族子弟為將帥","通曉胡語、了解胡族民風的胡人為將帥","南方士人為將帥"],answer:2,explain:"河北漢胡雜處、胡化甚深，玄宗因地制宜任用通曉胡語、了解胡風的胡人為將帥，重用安祿山為三鎮節度使。"},
  {topic:"安史·制度與時勢因素",q:"費正清《劍橋中國隋唐史》指十大兵鎮「使壓倒一切的兵權集中在少數人手中……仍是產生危險的潛在根源」。此最能說明？",options:["設兵鎮徹底消除一切危機","兵鎮兵權分散於中央","兵鎮與安史之亂全無關係","設兵鎮雖鞏固邊防，卻使兵權過度集中，埋下叛亂隱憂"],answer:3,explain:"兵鎮一時鞏固邊防，卻令兵權集中少數節度使、形成外重內輕，成為潛在危險，正是安史之亂的制度伏線。"},
  {topic:"安史·制度與時勢因素",q:"哥舒翰堅守潼關、李光弼等胡將竭力平亂。這最能說明？",options:["重用胡人不等於必然作亂，胡將忠奸取決於個人而非族屬","所有胡將都忠於唐室","所有胡將都背叛唐室","胡將完全無法作戰"],answer:0,explain:"哥舒翰守潼關、李光弼王思禮等忠於唐室平亂，說明重用胡人不等於必然叛亂，安史之亂的關鍵在人為與制度，而非族屬本身。"},
  {topic:"安史·制度與時勢因素",q:"下列「原因→結果」配對，哪一組成立？",options:["因唐初府兵集中關中，故形成外重內輕","因十大兵鎮坐大、中央彍騎薄弱，故形成外重內輕、叛亂時中央無力鎮壓","因河北胡化甚深，故唐室全面禁用胡人","因彍騎訓練有素，故中央兵力遠勝邊鎮"],answer:1,explain:"只有「兵鎮坐大、彍騎薄弱→外重內輕」成立；府兵集中關中是內重外輕、河北胡化反令多用胡人、彍騎疏於戰陣，其餘皆與史實相反。"},
  {topic:"安史·制度與時勢因素",q:"下列關於「外重內輕」局面形成的說法，哪些正確？\n(1) 中央兵力遠勝邊鎮，足以隨時鎮壓地方叛亂\n(2) 十大兵鎮節度使兼掌軍、政、財大權、可自行募兵\n(3) 邊鎮兵力約四十八萬，遠多於中央彍騎約八萬\n(4) 中央彍騎疏於戰陣、作戰力甚差",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——正因外重內輕、中央兵力遠遜邊鎮，叛亂時中央已無足夠強盛軍隊鎮壓，並非中央兵力遠勝邊鎮。"},
  {topic:"安史·制度與時勢因素",q:"下列關於唐代「重用胡將」傳統的說法，哪些正確？\n(1) 唐種族觀念淡薄、唐初起便重用蕃將蕃兵\n(2) 重用胡人必然導致叛亂，故所有胡將都背叛唐室\n(3) 玄宗用高仙芝、哥舒翰、李光弼等胡將\n(4) 河北胡化甚深，故多任胡人為當地將帥",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——重用胡人不等於必然作亂，哥舒翰守潼關、李光弼等胡將堅守唐室、竭力平亂，並非所有胡將皆叛。"},
  {topic:"安史·制度與時勢因素",q:"下列關於安史之亂前兵力分佈的說法，哪些正確？\n(1) 玄宗時十大兵鎮約四十八萬兵\n(2) 中央彍騎僅約八萬、疏於戰陣\n(3) 邊鎮兵力約為中央的六倍\n(4) 唐初府兵亦集中於邊疆、早已形成外重內輕",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——唐初府兵集中關中、屬「內重外輕」，外重內輕是玄宗廣設兵鎮後才形成。"},
  {topic:"安史·制度與時勢因素",q:"下列關於節度使權力的說法，哪些正確？\n(1) 節度使任期短暫、且不得一人兼統數鎮\n(2) 初時只領軍權，其後擴大至兼掌行政、財政\n(3) 可自行招募「長征健兒」\n(4) 十大兵鎮鎮兵長期與邊族交戰、實力強勁",options:["(1)、(2)、(3)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:1,explain:"(2)(3)(4)正確；(1)錯誤——玄宗讓安祿山久任並兼統三鎮，正打破節度使「不久任、不遙領、不兼統」的慣例。"},
  {topic:"安史·導火線與經過",q:"成為安史之亂「導火線」的事件是？",options:["玄宗廢除府兵制","李林甫罷免張九齡","楊國忠與安祿山不和、迫反安祿山","郭子儀借回紇兵"],answer:2,explain:"楊國忠忌恨安祿山得寵、多次指其謀反並包圍其京宅捕殺黨羽，安祿山遂以「誅國忠，清君側」為名起兵，是為導火線。"},
  {topic:"安史·導火線與經過",q:"安祿山起兵時所打的旗號（藉口）是？",options:["尊王攘夷","還政於民","推恩削藩","誅國忠，清君側"],answer:3,explain:"安祿山以「誅國忠，清君側」為藉口、從范陽率十五萬大軍南下叛唐，師出有名地取得發動叛變的口實。"},
  {topic:"安史·導火線與經過",q:"安祿山從范陽起兵南下，兩個月內攻下、並在當地稱帝的城市是？",options:["洛陽","長安","成都","靈武"],answer:0,explain:"安祿山率十五萬大軍南下，兩月攻下洛陽、在洛陽稱帝、國號「大燕」，繼而攻破潼關、西入長安。"},
  {topic:"安史·導火線與經過",q:"安祿山稱帝後所建的國號是？",options:["大周","大燕","大涼","大夏"],answer:1,explain:"安祿山攻下洛陽後稱帝、國號「大燕」；其後安史叛軍攻破潼關、西入長安。"},
  {topic:"安史·導火線與經過",q:"玄宗西奔途中，隨行軍士譁變、殺楊國忠並迫玄宗縊殺楊貴妃的事件稱為？",options:["玄武門之變","白登之圍","馬嵬驛之變","靖康之變"],answer:2,explain:"玄宗與楊國忠等奔蜀、行至馬嵬驛時隨行軍士譁變，殺楊國忠、迫玄宗縊殺楊貴妃，史稱「馬嵬驛之變」。"},
  {topic:"安史·導火線與經過",q:"玄宗奔蜀後，太子李亨北上靈武募兵、在宦官李輔國等擁戴下即位，是為？",options:["唐代宗","唐德宗","唐高宗","唐肅宗"],answer:3,explain:"太子李亨北上靈武募兵勤王，在宦官李輔國等擁戴下即位為唐肅宗，遙尊玄宗為太上皇，並命郭子儀等討伐叛軍。"},
  {topic:"安史·導火線與經過",q:"肅宗命郭子儀、李光弼集結西北軍隊討伐叛軍，又向哪一外族借兵助戰？",options:["回紇","吐蕃","南詔","契丹"],answer:0,explain:"肅宗命郭子儀、李光弼集結朔方、隴右等西北軍，又向回紇借兵助戰，最終收復長安、洛陽兩京。"},
  {topic:"安史·導火線與經過",q:"張巡、許遠死守哪一城池，成功阻遏叛軍南下、使亂事局限於北方而未蔓延江淮？",options:["潼關","睢陽","范陽","鄴郡"],answer:1,explain:"張巡、許遠死守睢陽，阻遏叛軍南下，使亂事局限於北方、未蔓延至富庶的江淮一帶，對保全江南至關重要。"},
  {topic:"安史·導火線與經過",q:"下列安史之亂事件按時間先後排列，何者正確？\n(甲) 馬嵬驛之變、楊貴妃被縊殺\n(乙) 安祿山以「誅國忠，清君側」起兵\n(丙) 太子李亨於靈武即位為肅宗",options:["甲→乙→丙","丙→乙→甲","乙→甲→丙","乙→丙→甲"],answer:2,explain:"安祿山起兵（乙）在先，叛軍逼近、玄宗西奔途中發生馬嵬驛之變（甲），其後太子李亨於靈武即位為肅宗（丙）。"},
  {topic:"安史·導火線與經過",q:"下列叛軍首領的更替次序，何者正確？",options:["史思明→安祿山→史朝義→安慶緒","安慶緒→安祿山→史朝義→史思明","史朝義→史思明→安慶緒→安祿山","安祿山→安慶緒→史思明→史朝義"],answer:3,explain:"安祿山為子安慶緒所殺，史思明殺安慶緒自立，史思明又為子史朝義所殺，史朝義最後自殺，動亂遂告結束。"},
  {topic:"安史·導火線與經過",q:"張巡、許遠死守睢陽一事，對日後「經濟重心南移」有何關鍵作用？",options:["阻遏叛軍南下、保全江南，使其經濟得以持續發展","使江南遭受嚴重戰火破壞","令北方經濟更為繁榮","直接導致長安失陷"],answer:0,explain:"睢陽之守使叛軍無法入侵富庶江南、長江流域未受戰火，江南得以持續發展，為日後經濟重心南移創造條件。"},
  {topic:"安史·導火線與經過",q:"下列關於安史之亂經過的說法，哪些正確？\n(1) 安祿山從范陽率大軍南下、兩月攻下洛陽\n(2) 安祿山在洛陽稱帝、國號「大燕」\n(3) 安祿山起兵後旋即攻入成都、俘虜玄宗\n(4) 玄宗西奔途中發生「馬嵬驛之變」、楊貴妃被縊殺",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——玄宗西奔成都避難，安祿山叛軍攻入的是長安而非成都，玄宗亦未被俘。"},
  {topic:"安史·導火線與經過",q:"下列關於平亂與叛軍首領更替的說法，哪些正確？\n(1) 肅宗命郭子儀、李光弼平亂，並向回紇借兵\n(2) 安祿山被其子安慶緒所殺\n(3) 史思明殺安慶緒、自稱「大燕皇帝」，後為其子史朝義所殺\n(4) 安史之亂只歷時一年即告平定",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——安史之亂前後持續約八年才平定，並非只歷時一年。"},
  {topic:"安史·導火線與經過",q:"下列關於安史之亂導火線的說法，哪些正確？\n(1) 楊國忠忌恨安祿山得寵、多次指其謀反\n(2) 安祿山起兵是因玄宗下令削奪其兵權\n(3) 楊國忠派人包圍安祿山京宅、捕殺其黨羽\n(4) 安祿山遂以「誅國忠，清君側」為名起兵",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——安史之亂的導火線是楊國忠迫反安祿山，並非玄宗下令削奪其兵權。"},
  {topic:"安史·導火線與經過",q:"下列關於肅宗即位與平亂的說法，哪些正確？\n(1) 太子李亨北上靈武募兵勤王\n(2) 在宦官李輔國等擁戴下即位為肅宗、遙尊玄宗為太上皇\n(3) 肅宗即位後旋即一舉殲滅叛軍、當年即平亂\n(4) 命郭子儀、李光弼集結西北軍並向回紇借兵",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——安史之亂前後持續約八年才平定，並非肅宗即位後當年即一舉平亂。"},
  {topic:"安史·藩鎮與宦官之禍",q:"唐代宗為求盡快平息安史之亂、策封安史降將為節度使，這種做法稱為？",options:["削藩政策","姑息政策","推恩政策","和親政策"],answer:1,explain:"代宗為速平亂，行姑息政策、策封安史降將為節度使、容其在河北舊地擁兵自重，形成日後藩鎮割據之局。"},
  {topic:"安史·藩鎮與宦官之禍",q:"安史降將獲封節度使、在河北舊地擁兵自重，史稱「河北三鎮」，又稱？",options:["中原防遏型藩鎮","東南財源型藩鎮","河朔割據型藩鎮","西北邊防型藩鎮"],answer:2,explain:"田承嗣（魏博）、李寶臣（成德）、李懷仙（盧龍）等「河北三鎮」屬河朔割據型，擁地方軍政財大權、對抗中央。"},
  {topic:"安史·藩鎮與宦官之禍",q:"安史之亂後，全國兵鎮數目急劇增加至約多少、形成「藩鎮割據」之局？",options:["十個","一百多個","三個","四十多個"],answer:3,explain:"代宗姑息降將、廣封功臣為節度使，兵鎮增至四十多個，繼續享有地方軍政財大權，形成藩鎮割據、威脅中央。"},
  {topic:"安史·藩鎮與宦官之禍",q:"安史之亂後開「宦官掌禁軍」先例、因擁立肅宗有功而掌管禁軍的宦官是？",options:["李輔國","高力士","高仙芝","魚朝恩"],answer:0,explain:"宦官李輔國擁立肅宗有功、得掌禁軍，開宦官掌禁軍先例；此後唐室常任宦官統領禁軍、藉軍權干預朝政。"},
  {topic:"安史·藩鎮與宦官之禍",q:"宦官自代宗起又獲授哪一官職，得以「出納王命、參預機要」、掌握中央政權？",options:["節度使","樞密使","採訪使","平準官"],answer:1,explain:"宦官自代宗起獲授樞密使、出納王命、參預機要，掌中央政權，釀成日後控制皇帝廢立、朋黨之爭等宦官之禍。"},
  {topic:"安史·藩鎮與宦官之禍",q:"安史之亂前唐代宦官未掌兵權，亂後卻長期掌禁軍、授樞密使。這一轉變的起點是？",options:["高力士助玄宗剷除太平公主","楊國忠兼任四十餘職","李輔國因擁立肅宗有功而掌禁軍，開宦官掌禁軍先例","郭子儀向回紇借兵"],answer:2,explain:"宦官掌權之禍的起點，是李輔國擁立肅宗有功而掌禁軍、開宦官掌禁軍先例，其後宦官藉軍權與樞密使長期干政。"},
  {topic:"安史·藩鎮與宦官之禍",q:"《資治通鑒》謂「開元二十四年罷張九齡相，專任李林甫，此理亂之分也」。配合藩鎮、宦官之禍，這最能說明安史之亂在唐史上的地位是？",options:["唐朝國勢更為鼎盛的起點","與唐朝興衰無關的小事","唐朝開國的標誌","唐朝由盛轉衰、由治趨亂的關鍵轉捩點"],answer:3,explain:"安史之亂引發藩鎮割據、宦官專權、邊族入侵等連鎖禍患，是唐朝由盛轉衰、由治趨亂的關鍵轉捩點。"},
  {topic:"安史·藩鎮與宦官之禍",q:"下列關於安史之亂後「藩鎮坐大」的說法，哪些正確？\n(1) 代宗趁勢削平天下藩鎮、中央集權大為加強\n(2) 代宗行姑息政策、策封安史降將為節度使\n(3) 河北三鎮（魏博、成德、盧龍）在河北擁兵自重\n(4) 全國兵鎮增至四十多個、形成藩鎮割據",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——代宗是姑息降將、廣封節度使，反令藩鎮割據之局形成，並非趁勢削平藩鎮、加強中央集權。"},
  {topic:"安史·藩鎮與宦官之禍",q:"下列關於安史之亂後「宦官掌權」的說法，哪些正確？\n(1) 李輔國因擁立肅宗有功而掌禁軍\n(2) 宦官出任的「監軍」，地位凌駕於節度使之上\n(3) 此後唐室常任宦官為禁軍統領\n(4) 宦官自代宗起獲授樞密使、參預機要",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——監軍地位僅次於節度使，並非凌駕其上。"},
  {topic:"安史·藩鎮與宦官之禍",q:"下列關於「河北三鎮」的說法，哪些正確？\n(1) 由安史降將獲封節度使而形成\n(2) 包括魏博、成德、盧龍三鎮\n(3) 在河北舊地擁兵自重、屬河朔割據型\n(4) 由中央直接派文官管治、聽命朝廷",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——河北三鎮由安史降將擁兵自重、割據對抗中央，並非由中央派文官管治、聽命朝廷。"},
  {topic:"安史·藩鎮與宦官之禍",q:"下列關於宦官之禍的說法，哪些正確？\n(1) 宦官憑藉掌握地方藩鎮的兵權而專政\n(2) 李輔國掌禁軍、開宦官掌禁軍先例\n(3) 宦官自代宗起獲授樞密使、參預機要\n(4) 宦官後來甚至能控制皇帝廢立",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——宦官專權的基礎是掌握中央禁軍與樞密，並非掌地方藩鎮兵權。"},
  {topic:"安史·邊族入侵",q:"安史之亂期間，唐室為平亂而向哪一外族借兵、收復兩京後該族卻兩度洗劫洛陽？",options:["回紇","吐蕃","南詔","契丹"],answer:0,explain:"肅宗向回紇借兵平亂、收復兩京，回紇卻兩度洗劫洛陽，亂後更自恃有功、百般苛索（和親、賞賜、互市）並借故入侵。"},
  {topic:"安史·邊族入侵",q:"安史之亂期間唐室把西北邊防軍內調平亂、邊防空虛，乘機入侵並一度攻佔長安的外族是？",options:["回紇","吐蕃","匈奴","突厥"],answer:1,explain:"唐室內調西北邊防軍平亂、邊防空虛，吐蕃乘機入侵、佔河西隴右、代宗時一度攻佔長安大掠而去；南詔亦攻四川。"},
  {topic:"安史·邊族入侵",q:"安史之亂後，唐室因要借回紇平亂、又遭吐蕃南詔入侵，國際地位下降，從此失去甚麼地位？",options:["「大燕皇帝」的地位","「太上皇」的地位","「天可汗」的地位","「節度使」的地位"],answer:2,explain:"唐須借回紇平亂、又遭吐蕃南詔入侵，國際聲威大降，失去自太宗以來「天可汗」的地位。"},
  {topic:"安史·邊族入侵",q:"德宗為抵禦吐蕃而實施的外交政策是？",options:["聯吐抗回","遠交近攻","閉關自守","聯回抗吐"],answer:3,explain:"德宗實施「聯回抗吐」、全力抵禦吐蕃，但安西四鎮及河西走廊之地盡失，唐在西域邊疆的威權勢衰。"},
  {topic:"安史·邊族入侵",q:"《舊唐書》載回紇於洛陽「直入府庫收財帛，於市井村坊剽掠三日而止」。這最能說明借回紇兵平亂的？",options:["代價沉重：回紇雖助平亂，卻洗劫掠奪、貽害百姓","回紇秋毫無犯、紀律嚴明","回紇拒絕協助唐室","回紇從不索取報酬"],answer:0,explain:"回紇助平亂卻洗劫洛陽、剽掠三日，反映借外族平亂代價沉重，亂後更苛索無度，加重唐室與百姓負擔。"},
  {topic:"安史·邊族入侵",q:"安史之亂中唐須借回紇之力平亂、吐蕃南詔又乘機入侵。這對唐的對外關係造成的根本影響是？",options:["唐版圖大為擴張","唐國際聲威與地位大降，失去「天可汗」的威權","唐與外族關係更為融洽","唐重新確立四夷賓服之局"],answer:1,explain:"借回紇平亂、遭吐蕃南詔入侵，使唐由盛唐「天可汗」的尊崇地位跌落，國際聲威與邊疆威權皆大為下降。"},
  {topic:"安史·邊族入侵",q:"下列「原因→結果」配對，哪一組成立？",options:["因唐打敗回紇，故須向其借兵","因吐蕃歸附唐室，故攻佔長安","因唐室內調西北邊防軍平亂、邊防空虛，故吐蕃乘機入侵、佔河西隴右","因南詔臣服，故唐疲於奔命八十餘年"],answer:2,explain:"只有「西北邊防空虛→吐蕃乘機入侵」成立；唐是向回紇借兵而非打敗它、吐蕃南詔是入侵而非歸附臣服，其餘皆與史實相反。"},
  {topic:"安史·邊族入侵",q:"下列關於安史之亂後「邊族入侵」的說法，哪些正確？\n(1) 回紇自恃平亂有功、不斷苛索財貨並借故入侵\n(2) 吐蕃乘西北邊防空虛入侵、一度攻佔長安\n(3) 安史亂後四夷賓服、唐之天可汗地位更為鞏固\n(4) 南詔進攻四川，唐疲於奔命達八十餘年",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——安史亂後唐須借回紇平亂、又遭吐蕃南詔入侵，反而失去天可汗地位，並非四夷賓服、地位更鞏固。"},
  {topic:"安史·邊族入侵",q:"下列關於回紇的說法，哪些正確？\n(1) 肅宗曾向回紇借兵平亂\n(2) 回紇乘唐室內調邊防軍之機，攻佔河西、隴右\n(3) 收復兩京後回紇兩度洗劫洛陽\n(4) 亂後回紇自恃有功、苛索和親賞賜互市",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——乘西北邊防空虛攻佔河西、隴右的是吐蕃，並非回紇。"},
  {topic:"安史·邊族入侵",q:"下列關於吐蕃、南詔入侵的說法，哪些正確？\n(1) 唐內調西北邊防軍平亂、致邊防空虛\n(2) 吐蕃乘機佔河西隴右、代宗時一度攻佔長安\n(3) 吐蕃南詔入侵反使唐重獲「天可汗」尊號\n(4) 德宗行「聯回抗吐」，但安西四鎮、河西走廊盡失",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——吐蕃南詔入侵使唐國際地位下降、失去天可汗地位，並非重獲尊號。"},
  {topic:"安史·社會經濟影響",q:"安史之亂對北方經濟造成的直接破壞是？",options:["江南遭嚴重戰火、生產停滯","全國糧倉充實、物價低廉","黃河流域田園荒蕪、洛陽附近數百里成廢墟，生產大受破壞","北方人口大增、經濟繁榮"],answer:2,explain:"安史之亂令黃河流域田園荒蕪、洛陽附近數百里成廢墟，北方經濟受嚴重破壞，加上人口銳減、戶籍散失，財政陷入危機。"},
  {topic:"安史·社會經濟影響",q:"天寶末年全國有戶近九百萬，安史亂後只剩約多少戶，反映人口戶口銳減？",options:["八百萬戶","五百萬戶","近九百萬戶","一百九十萬戶"],answer:3,explain:"天寶末年全國近九百萬戶，安史亂後只剩約一百九十萬戶、代宗大曆年間僅約一百三十萬戶，戶口銳減、租庸調無法施行。"},
  {topic:"安史·社會經濟影響",q:"安史之亂後戶籍散失、租庸調制無法施行，德宗時採納宰相楊炎建議改行的稅制是？",options:["兩稅法","租庸調制","一條鞭法","攤丁入畝"],answer:0,explain:"戶籍散失致租庸調制崩壞、國庫大減，德宗納宰相楊炎議改行「兩稅法」，以「量出制入」「按資產定稅額」徵稅，國庫收入大增。"},
  {topic:"安史·社會經濟影響",q:"「兩稅法」的徵稅原則是？",options:["按人丁平均徵收","量出制入、以資產多寡定稅額","以軍功多寡定稅額","一律免徵賦稅"],answer:1,explain:"兩稅法以「量出制入」、按資產多寡定稅額為原則徵稅，改變了傳統收稅理財方式，國庫收入大增、對後世稅制影響深遠。"},
  {topic:"安史·社會經濟影響",q:"安史之亂後，由於北方殘破而江南未受戰火，造成的長遠經濟格局轉變是？",options:["經濟重心北移","經濟重心西移","經濟重心開始南移","全國經濟同步衰退"],answer:2,explain:"北方殘破（推）、江南未受戰火（拉），大量北方人口南遷帶來技術勞動力資金，南方經濟漸趕上北方，經濟重心開始南移。"},
  {topic:"安史·社會經濟影響",q:"安史之亂後物資短缺，「米價比開元時高出三百倍」。這最能反映？",options:["經濟繁榮、物產豐盛","物價低廉、百姓富足","國庫充實、府庫滿溢","戰亂破壞生產、物價飛漲，民生困苦"],answer:3,explain:"米價較開元高三百倍，反映安史之亂後生產停滯、物資短缺、物價飛漲，民生較開元盛世時陷於困苦。"},
  {topic:"安史·社會經濟影響",q:"張巡許遠守睢陽使江南免於戰火、北方殘破，兩相對照促成的長遠後果是？",options:["北方人口南遷、南方經濟趕上，唐財政漸倚重江南","北方經濟更勝江南","江南經濟長期落後","唐財政完全倚重北方"],answer:0,explain:"江南未受戰火（拉）、北方殘破（推），北人南遷帶來技術資金，南方漸趕上北方，唐財政漸倚重江南（東南財源型）。"},
  {topic:"安史·社會經濟影響",q:"下列關於安史之亂後北方經濟與財政的說法，哪些正確？\n(1) 黃河流域田園荒蕪、洛陽附近數百里成廢墟\n(2) 人口銳減、戶籍散失，政府控制戶口大幅減少\n(3) 租庸調制無法施行、國庫收入大減\n(4) 安史亂後北方迅速復甦、府庫較開元更充實",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(3)正確；(4)錯誤——安史之亂令北方經濟蕭條、財政陷入危機，並非迅速復甦、府庫較開元更充實。"},
  {topic:"安史·社會經濟影響",q:"下列關於安史之亂引致改革稅制的說法，哪些正確？\n(1) 兩稅法仍按人丁徵稅、與租庸調制全無分別\n(2) 戶籍散失使租庸調制無法施行\n(3) 藩鎮截留地方賦稅，國庫收入大減\n(4) 德宗採宰相楊炎建議改行「兩稅法」",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:2,explain:"(2)(3)(4)正確；(1)錯誤——兩稅法改以資產定稅額、量出制入，與租庸調按丁徵稅大不相同，並非全無分別。"},
  {topic:"安史·社會經濟影響",q:"下列關於安史亂後戶口與財政的說法，哪些正確？\n(1) 天寶末年全國近九百萬戶\n(2) 安史亂後只剩約一百九十萬戶\n(3) 租庸調制無法施行、國庫收入大減\n(4) 安史亂後戶口不減反增、稅收大增",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——安史亂後戶口銳減至約一百九十萬戶、租庸調崩壞、國庫大減，並非戶口不減反增、稅收大增。"},
  {topic:"安史·社會經濟影響",q:"下列關於兩稅法的說法，哪些正確？\n(1) 兩稅法令國庫收入更少、加速唐亡\n(2) 因戶籍散失、租庸調制無法施行而推行\n(3) 由德宗採宰相楊炎建議改行\n(4) 以「量出制入」、按資產定稅額為原則",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——兩稅法使國庫收入大增、影響後世稅制深遠，並非令國庫更少、加速唐亡。"},
  {topic:"安史·整體評價與唐之衰亡",q:"安史之亂持續了大約多少年？",options:["三年","八年","十五年","二十年"],answer:1,explain:"安史之亂自安祿山范陽起兵至史朝義自殺、田承嗣等降唐，前後持續約八年，是唐朝由盛轉衰的關鍵。"},
  {topic:"安史·整體評價與唐之衰亡",q:"安史之亂造成的「三大即時影響」是？",options:["獨尊儒術、開疆拓土、輕徭薄賦","三省六部、科舉取士、府兵制","藩鎮坐大、宦官掌權、邊族入侵","推恩削藩、鹽鐵專賣、罷黜百家"],answer:2,explain:"安史之亂造成藩鎮坐大、宦官掌權、邊族入侵三大即時影響，並引致經濟蕭條、稅制改革、經濟重心南移等深遠後果。"},
  {topic:"安史·整體評價與唐之衰亡",q:"安史之亂在唐代歷史上最重要的地位是？",options:["唐朝開國的標誌","唐朝國勢鼎盛的起點","唐朝統一全國的關鍵","唐朝由盛轉衰的轉捩點"],answer:3,explain:"安史之亂引致藩鎮、宦官、邊患、經濟衰退等連鎖禍患，唐朝自此一蹶不振，是唐由盛轉衰的轉捩點。"},
  {topic:"安史·整體評價與唐之衰亡",q:"有史家認為安史之亂中「人為因素重於制度因素」。下列何者最能支持此說？",options:["兵鎮、胡將制度本身未必致亂，關鍵在玄宗怠政、用人不當與將相不和","叛亂純由兵制崩壞造成、與君臣無關","哥舒翰、李光弼等胡將皆叛唐","回紇、吐蕃才是叛亂的主謀"],answer:0,explain:"兵鎮、胡將制度未必必然致亂（哥舒翰李光弼即忠唐），叛亂關鍵在玄宗怠政、寵信安祿山、李楊亂政與將相不和，故人為重於制度。"},
  {topic:"安史·整體評價與唐之衰亡",q:"就唐代治亂而言，把「開元之治」與「安史之亂」並觀，最能說明？",options:["盛世與動亂全由天命決定","同一玄宗朝，前期勵精圖治成盛世、後期怠政任奸釀大亂，治亂繫於人君","制度一成不變、與治亂無關","安史之亂與玄宗毫無關係"],answer:1,explain:"玄宗前期勵精圖治開創開元之治、後期怠政任奸釀成安史之亂，同一君主前後judgement，最能說明治亂繫於人君的作為。"},
  {topic:"安史·整體評價與唐之衰亡",q:"綜合而言，安史之亂後「藩鎮割據、宦官專權、邊族入侵」三者的共同後果是？",options:["中央集權空前加強","唐室財政日益充裕","中央集權崩壞、唐室權威一蹶不振","四夷賓服、聲威更盛"],answer:2,explain:"藩鎮割據截留賦稅抗中央、宦官專權干預朝政、邊族入侵失天可汗地位，三者共令中央集權崩壞、唐室權威一蹶不振。"},
  {topic:"安史·整體評價與唐之衰亡",q:"下列關於安史之亂「整體影響」的說法，哪些正確？\n(1) 造成藩鎮割據、宦官掌權\n(2) 令唐朝國勢更為鼎盛、開創另一盛世\n(3) 回紇、吐蕃、南詔等邊族乘機入侵或苛索\n(4) 北方經濟蕭條、促成經濟重心南移",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(3)及(4)"],answer:3,explain:"(1)(3)(4)正確；(2)錯誤——安史之亂令唐朝由盛轉衰、一蹶不振，並非令國勢更鼎盛、開創另一盛世。"},
  {topic:"安史·整體評價與唐之衰亡",q:"綜論安史之亂的成因，下列說法哪些正確？\n(1) 人為因素：玄宗怠政、李林甫楊國忠亂政、安祿山蓄謀\n(2) 制度因素：兵鎮坐大、彍騎薄弱造成外重內輕\n(3) 上述各因素之中，制度因素遠重於人為因素\n(4) 時勢因素：唐重用胡將傳統、河北胡化",options:["只有(1)、(2)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(4)正確；(3)錯誤——課題指出人為因素（尤其玄宗用人之失）的影響「人為>>>制度」，並非制度因素遠重於人為因素。"},
  {topic:"安史·整體評價與唐之衰亡",q:"下列關於安史之亂三大即時影響的說法，哪些正確？\n(1) 藩鎮坐大、形成割據之局\n(2) 宦官掌權、藉禁軍與樞密使干政\n(3) 邊族入侵、唐失「天可汗」地位\n(4) 三者共令中央集權崩壞、唐室一蹶不振",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(4)"],answer:1,explain:"四項皆正確：藩鎮割據、宦官專權、邊族入侵三大影響，共令中央集權崩壞、唐室一蹶不振，皆為安史之亂的即時影響。"},
  {topic:"安史·整體評價與唐之衰亡",q:"下列各項，哪些屬於安史之亂的『制度／時勢因素』而非純人為因素？\n(1) 十大兵鎮坐大、彍騎薄弱造成外重內輕\n(2) 玄宗寵幸楊貴妃、怠於政事\n(3) 唐重用胡將的傳統\n(4) 河北漢胡雜處、胡化甚深",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——玄宗寵幸楊貴妃、怠於政事屬人為因素，並非制度／時勢因素。"},
  {topic:"晚唐·藩鎮之禍",q:"安史之亂後，全國藩鎮由十個急增至約多少個、形成林立之局？",options:["四十多個","十多個","一百多個","五個"],answer:0,explain:"安史之亂後藩鎮由十個急增至四十多個，鎮守一方、握有軍政財大權，更能世襲，猶如「獨立王國」。"},
  {topic:"晚唐·藩鎮之禍",q:"藩鎮節度使的職位可以世襲，自行繼立的繼承人稱為？",options:["採訪使","留後","樞密使","市舶使"],answer:1,explain:"藩鎮節度使死後，其子弟或部將往往自行繼立、稱為「留後」，再迫使中央追認，使藩鎮得以世襲如獨立王國。"},
  {topic:"晚唐·藩鎮之禍",q:"晚唐最不服從中央、甚至起兵反叛、形成「藩鎮割據」的是哪三鎮？",options:["關中三鎮","江淮三鎮","河北三鎮（魏博、成德、盧龍）","河西三鎮"],answer:2,explain:"河北三鎮（魏博、成德、盧龍）最為跋扈、不服中央號令、甚至起兵反叛，是「藩鎮割據」的典型。"},
  {topic:"晚唐·藩鎮之禍",q:"唐末以「宣武節度使」身份篡奪唐室、直接構成唐亡的是？",options:["李克用","黃巢","安祿山","朱溫"],answer:3,explain:"唐末宣武節度使朱溫篡位自立、定國號梁，唐朝名實俱亡，並演成其後的五代十國之局。"},
  {topic:"晚唐·藩鎮之禍",q:"在藩鎮的四種類型中，主要由安史餘孽組成、最跋扈而割據的是？",options:["河朔割據型","中原防遏型","邊疆禦邊型","東南財源型"],answer:0,explain:"河朔割據型主要由安史餘孽組成、最為跋扈；中原防遏型制衡河朔、邊疆禦邊型抗外族、東南財源型供財賦。"},
  {topic:"晚唐·藩鎮之禍",q:"史載晚唐「五十七個節度使，只有四個由中央任命」。這最能說明？",options:["中央對藩鎮控制嚴密","中央對地方藩鎮幾已失去控制","藩鎮皆由科舉選任","藩鎮全由皇族出任"],answer:1,explain:"絕大多數節度使由藩鎮自行繼立、非中央任命，反映中央對地方藩鎮幾已失去控制，藩鎮割據之勢已成。"},
  {topic:"晚唐·藩鎮之禍",q:"藩鎮種類中，被視為「維持唐朝生存的生命線」、向中央上貢稅收的是？",options:["河朔割據型","中原防遏型","東南財源型","邊疆禦邊型"],answer:2,explain:"東南財源型藩鎮向中央上貢財賦，是維持唐朝生存的生命線；河朔割據型反而割據對抗、貢獻最少。"},
  {topic:"晚唐·藩鎮之禍",q:"就藩鎮對唐室的最終影響而言，「亡」是指？",options:["藩鎮全部歸順中央","藩鎮被外族消滅","藩鎮自行解散","宣武節度使朱溫篡唐，直接構成唐的滅亡"],answer:3,explain:"藩鎮割據連綿衝突終致強藩崛起，宣武節度使朱溫篡唐、定國號梁，直接構成唐的滅亡。"},
  {topic:"晚唐·藩鎮之禍",q:"下列關於安史之亂後藩鎮概況的說法，哪些正確？\n(1) 「留後」必須由節度使的嫡長子出任\n(2) 全國藩鎮由十個急增至四十多個\n(3) 節度使握有地方軍、政、財大權\n(4) 職位可以世襲、自行繼立者稱「留後」",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——「留後」由節度使的子弟或部將自行繼立，並非限定嫡長子。"},
  {topic:"晚唐·藩鎮之禍",q:"下列關於藩鎮如何導致唐室衰亡的說法，哪些正確？\n(1) 藩鎮互相攻伐或對中央發動大型叛亂\n(2) 五十七個節度使中有逾半由中央任命\n(3) 河朔藩鎮控制戶口、大部分不上繳賦稅，削弱中央財政\n(4) 朝廷為平亂須渴財養兵、巧立苛稅",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——五十七個節度使中只有四個由中央任命，並非逾半。"},
  {topic:"晚唐·藩鎮之禍",q:"下列關於藩鎮四種類型的說法，哪些正確？\n(1) 河朔割據型主要由安史餘孽組成、最為跋扈\n(2) 四類藩鎮中以河朔割據型數目最多\n(3) 中原防遏型防遏河朔藩鎮、兼護東南漕運\n(4) 東南財源型向中央上貢財賦、是唐室的生命線",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(3)(4)正確；(2)錯誤——河朔割據型在類型上只佔四分之一、數目上約六分之一強，並非最多。"},
  {topic:"晚唐·藩鎮之禍",q:"下列關於藩鎮在「財政」上削弱唐室的說法，哪些正確？\n(1) 河朔藩鎮控制地方戶口、大部分不上繳賦稅\n(2) 朝廷為平亂須渴財養兵、巧立苛稅（如富商錢、三戶養一兵）\n(3) 割據藩鎮主動把全部賦稅上繳中央、使國庫充盈\n(4) 戰禍連年、生產大受破壞",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)","只有(1)、(2)及(4)"],answer:3,explain:"(1)(2)(4)正確；(3)錯誤——割據藩鎮控制戶口、截留賦稅，令中央財政收入大減，並非主動上繳全部賦稅使國庫充盈。"},
  {topic:"晚唐·宦官專權",q:"晚唐宦官得以專權的根本基礎，是他們自李輔國以來掌握了？",options:["禁軍（中央軍權）","科舉取士權","地方賦稅權","藩鎮節度使之位"],answer:0,explain:"宦官李輔國擁立肅宗有功而掌禁軍，開宦官控制軍權先例；此後宦官長期掌禁軍，權力不斷膨脹。"},
  {topic:"晚唐·宦官專權",q:"肅宗以後，唐室派往地方藩鎮、地位僅次於節度使的宦官稱為？",options:["留後","監軍","採訪使","市舶使"],answer:1,explain:"肅宗以後派宦官到地方監軍、監察藩鎮，監軍地位僅次節度使、可共決軍務，使宦官勢力由中央伸展到地方。"},
  {topic:"晚唐·宦官專權",q:"宦官俱文珍勾結藩鎮、迫順宗退位的事件稱為？",options:["甘露之變","涇原兵變","永貞內禪","馬嵬驛之變"],answer:2,explain:"順宗時王叔文改革，宦官俱文珍勾結藩鎮迫順宗退位，史稱「永貞內禪」，反映宦官能操控君主廢立、阻撓改革。"},
  {topic:"晚唐·宦官專權",q:"文宗謀誅宦官失敗、反被宦官仇士良禁閉的事件稱為？",options:["永貞內禪","元和中興","大中暫治","甘露之變"],answer:3,explain:"文宗謀除宦官不成、反被宦官仇士良禁閉，史稱「甘露之變」，此後皇帝更形同傀儡、受制於宦官。"},
  {topic:"晚唐·宦官專權",q:"自代宗以後，十二個皇帝中有八個由宦官擁立，更有皇帝為宦官所弒。被宦官毒死的「元和中興」之君是？",options:["憲宗","順宗","文宗","僖宗"],answer:0,explain:"代宗以後十二帝有八帝為宦官擁立，憲宗（元和中興之君）、敬宗更為宦官所弒，自憲宗至唐亡皇帝形同傀儡。"},
  {topic:"晚唐·宦官專權",q:"德宗以來，宦官常借哪一名義橫徵暴斂、強搶百姓財物？",options:["兩稅","宮市","市舶","度牒"],answer:1,explain:"德宗以來宦官常借「宮市」之名橫徵暴斂、強搶百姓財物，欺壓百姓、漁肉鄉里，終激起民憤、引致唐末民變。"},
  {topic:"晚唐·宦官專權",q:"仇俊卿謂「唐中葉武事不競，監軍誤之也」。此語最能說明？",options:["宦官善於用兵、戰功彪炳","監軍制度有效提升戰力","宦官任監軍干涉軍務，貽誤軍機、削弱唐室軍力","藩鎮才是軍事失利主因"],answer:2,explain:"仇俊卿指唐中葉軍事不振、實因宦官監軍誤事，點出宦官不諳軍事卻干涉作戰、貽誤軍機、削弱唐室軍力。"},
  {topic:"晚唐·宦官專權",q:"晚唐「自憲宗至唐亡，皇帝都形同傀儡」。這最能說明宦官專權的程度是？",options:["皇帝大權獨攬","宦官只管宮中雜務","宦官全聽命於皇帝","宦官已能操控君主廢立、甚至弒君，皇權旁落"],answer:3,explain:"代宗後十二帝八帝由宦官擁立、憲宗敬宗被弒、皇帝形同傀儡，反映宦官專權已到操控廢立、弒君的程度。"},
  {topic:"晚唐·宦官專權",q:"史載牛黨拉攏宦官王守澄、李黨拉攏宦官吐突承璀。這最能說明宦禍與黨爭的關係是？",options:["二者互相助長：朝臣依附宦官，宦禍與黨爭交相為惡","宦官與黨爭互不相干","宦官極力消弭黨爭","黨爭有效制止宦官專權"],answer:0,explain:"朝臣兩派各自依附宦官以自重，宦禍加劇黨爭、黨爭又助長宦禍，二者交相為惡、使朝政更亂。"},
  {topic:"晚唐·宦官專權",q:"下列關於宦官在「軍事」上導致唐室衰亡的說法，哪些正確？\n(1) 宦官掌禁軍、卻放任禁軍驕縱、戰力薄弱\n(2) 派宦官任監軍、干涉作戰而貽誤軍機\n(3) 宦官精通軍事、使中央禁軍成為勁旅\n(4) 中央軍事積弱，黃巢之亂時無力平亂、須依賴強藩",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——宦官不懂軍事、放任禁軍驕惰、又以監軍貽誤軍機，致中央軍弱，並非使禁軍成為勁旅。"},
  {topic:"晚唐·宦官專權",q:"下列關於宦官在「政治」上導致唐室衰亡的說法，哪些正確？\n(1) 代宗任宦官為樞密使、出納王命參預機要\n(2) 操控君主廢立、甚至弒殺皇帝\n(3) 阻撓改革，如俱文珍迫順宗退位（永貞內禪）\n(4) 宦官干政始於玄宗朝的高力士掌禁軍",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(3)正確；(4)錯誤——開宦官掌禁軍先例的是肅宗朝的李輔國；高力士雖得寵，未開掌禁軍之例。"},
  {topic:"晚唐·宦官專權",q:"下列關於宦官「監軍」的說法，哪些正確？\n(1) 肅宗以後派宦官到地方監軍、監察藩鎮\n(2) 監軍地位僅次節度使、可與其共決軍務\n(3) 宦官不諳軍事卻干涉作戰、貽誤軍機\n(4) 監軍制度使中央有效控制藩鎮、軍事大振",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——監軍多與藩鎮勾結、又貽誤軍機，反削弱唐室軍力，並非使中央有效控制藩鎮、軍事大振。"},
  {topic:"晚唐·宦官專權",q:"下列關於宦官操控君主的史例，哪些正確？\n(1) 敬宗在位時平定宦官之亂、重掌禁軍\n(2) 順宗時王叔文改革，被俱文珍迫退位（永貞內禪）\n(3) 憲宗創「元和中興」、卻被宦官陳弘志毒死\n(4) 文宗謀誅宦官不成、被仇士良禁閉（甘露之變）",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——敬宗為宦官所弒，並非平定宦官、重掌禁軍。"},
  {topic:"晚唐·牛李黨爭",q:"牛李黨爭大致發生於唐憲宗至宣宗約多少年間？",options:["十年","四十年","一百年","二百年"],answer:1,explain:"牛李黨爭約在憲宗至宣宗的四十年間，朝廷官員分為牛、李兩黨，因出身政見不合加上恩怨而黨同伐異。"},
  {topic:"晚唐·牛李黨爭",q:"牛李黨爭中，「牛黨」成員多屬甚麼出身？",options:["門蔭出身的士族","宦官","進士科出身的寒門","藩鎮武人"],answer:2,explain:"牛黨多為進士科出身的寒門，李黨多為門第出身的士族，雙方因出身、政見不合而長期黨爭。"},
  {topic:"晚唐·牛李黨爭",q:"牛李兩黨在「對藩鎮及邊患」的政見上分別主張？",options:["牛黨主戰、李黨主和","兩黨皆主和","兩黨皆主戰","牛黨主和、李黨主戰"],answer:3,explain:"兩黨雖有政見之爭：對藩鎮及邊患，牛黨主和、李黨主戰；但更多時候只顧爭權奪位、排擠異己。"},
  {topic:"晚唐·牛李黨爭",q:"牛李黨爭大致在哪位皇帝以後、因兩黨領導人相繼去世而漸趨平息？",options:["宣宗","憲宗","懿宗","昭宗"],answer:0,explain:"宣宗以後，牛、李兩黨的領導人相繼去世，黨爭遂漸趨平息。"},
  {topic:"晚唐·牛李黨爭",q:"牛李兩黨「為壯大勢力，分別與不同派系的宦官往來」。這對唐室政局的影響是？",options:["有效制衡宦官專權","助長宦官氣燄，使宦禍蔓延至外朝，國家更亂","使宦官退出朝政","令藩鎮歸順中央"],answer:1,explain:"兩黨依附宦官以自重，反助長宦官氣燄、使宦禍由內庭蔓延至外朝，國家更加混亂、加速唐衰亡。"},
  {topic:"晚唐·牛李黨爭",q:"就唐室衰亡而言，藩鎮、宦官、黨爭三者的共同作用是？",options:["互相制衡、鞏固中央","與唐衰亡毫無關係","互相勾結交織，令中央朝政日壞、加速唐室衰亡","使唐室國力更盛"],answer:2,explain:"藩鎮與宦官、朝臣勾結，宦官與黨爭交相為惡，三者交織使朝政日壞、中央日衰，共同加速唐室衰亡。"},
  {topic:"晚唐·牛李黨爭",q:"下列關於牛李黨爭如何加速唐室衰亡的說法，哪些正確？\n(1) 兩黨齊心輔政、使朝政清明穩定\n(2) 兩黨交替掌權、得勢時大力打壓對方，朝中人才盡去\n(3) 兩黨多顧爭權奪位、排擠異己\n(4) 兩黨分別與不同派系宦官往來、助長宦禍",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)","只有(2)、(3)及(4)"],answer:3,explain:"(2)(3)(4)正確；(1)錯誤——牛李黨爭使朝政混亂、人才盡去、助長宦禍，加速唐衰亡，並非齊心輔政、朝政清明。"},
  {topic:"晚唐·牛李黨爭",q:"下列關於牛李黨爭的說法，哪些正確？\n(1) 約在憲宗至宣宗的四十年間\n(2) 牛黨拉攏宦官吐突承璀、李黨拉攏王守澄\n(3) 牛黨多進士科寒門、李黨多門第士族\n(4) 對藩鎮邊患，牛黨主和、李黨主戰",options:["只有(1)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(3)(4)正確；(2)錯誤——剛好相反——牛黨拉攏王守澄、李黨拉攏吐突承璀。"},
  {topic:"晚唐·牛李黨爭",q:"下列關於牛李黨爭影響的說法，哪些正確？\n(1) 兩黨交替掌權、得勢時打壓對方致人才盡去\n(2) 黨爭使朝政混亂、國是日非\n(3) 黨爭使朝廷上下團結、政治清明\n(4) 與宦官勾結、使宦禍蔓延至外朝",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(2)(4)正確；(3)錯誤——黨爭使人才盡去、朝政混亂、助長宦禍，並非使朝廷團結、政治清明。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"唐末民變爆發的背景，下列哪一項『不』符合？",options:["政治腐敗、土地兼併劇烈","宦官藩鎮巧立名目、橫徵暴斂","政治清明、輕徭薄賦、君主賢明","天災頻仍、黃河中下游連年災荒"],answer:2,explain:"唐末政治腐敗、土地兼併、橫徵暴斂、天災頻仍、懿宗僖宗昏庸，終激發民變；政治清明、君主賢明與史實相反。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"懿宗時爆發、揭開晚唐大規模民變序幕的是？",options:["黃巾之亂","赤眉之亂","安史之亂","裘甫、龐勛之亂"],answer:3,explain:"懿宗時爆發裘甫、龐勛之亂，拉開晚唐大規模民變的序幕；僖宗時更爆發歷時九年的黃巢之亂。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"僖宗時，王仙芝起事後率眾響應、其後合併王仙芝部眾轉戰南北的民變領袖是？",options:["黃巢","朱溫","李克用","裘甫"],answer:0,explain:"僖宗時王仙芝起事、黃巢率眾響應；王仙芝戰死後，黃巢合併其部眾、轉戰南北各地，終攻陷長安。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"黃巢攻陷長安後自稱甚麼皇帝？",options:["大燕皇帝","大齊皇帝","大梁皇帝","大周皇帝"],answer:1,explain:"黃巢攻陷長安、自稱「大齊皇帝」；僖宗倉皇逃往四川、召藩鎮勤王，並借沙陀兵平亂。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"僖宗為平定黃巢之亂，除召藩鎮勤王外，還借哪一外族／部族之兵？",options:["回紇兵","吐蕃兵","沙陀兵","契丹兵"],answer:2,explain:"僖宗逃四川、召藩鎮勤王並借沙陀兵平亂；黃巢部將朱溫降唐倒戈，沙陀兵終收復長安。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"《全唐文》載唐末「天下百姓，哀號於道路，逃竄於山澤，夫妻不相活，父子不相救」。這最能說明？",options:["唐末社會富足安定","百姓安居樂業","天下太平無事","唐末民生極度困苦，終激發大規模民變"],answer:3,explain:"此載描繪唐末百姓流離哀號、骨肉不相顧，反映民生極度困苦，正是裘甫、龐勛、黃巢等民變爆發的背景。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"下列事件按時間先後排列，何者正確？\n(甲) 黃巢攻陷長安、自稱大齊皇帝\n(乙) 懿宗時爆發裘甫、龐勛之亂\n(丙) 黃巢兵敗自殺、亂事平息",options:["乙→甲→丙","甲→乙→丙","丙→乙→甲","乙→丙→甲"],answer:0,explain:"懿宗時裘甫龐勛之亂揭開序幕（乙），僖宗時黃巢攻陷長安稱帝（甲），其後黃巢兵敗自殺、亂事平息（丙）。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"下列關於唐末民變背景的說法，哪些正確？\n(1) 政治腐敗、土地兼併劇烈\n(2) 民變爆發時，朝廷迅速開倉賑濟、減免賦稅\n(3) 宦官與藩鎮巧立名目、橫徵暴斂\n(4) 天災頻仍、黃河中下游連年災荒",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——唐末朝廷腐敗、宦官藩鎮橫徵暴斂，並無迅速賑濟減賦之舉。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"下列關於黃巢之亂經過的說法，哪些正確？\n(1) 王仙芝戰死後黃巢合併其部眾、轉戰南北\n(2) 黃巢攻陷長安、自稱大齊皇帝\n(3) 黃巢之亂只歷時一年即被輕易平定\n(4) 僖宗逃四川、召藩鎮勤王並借沙陀兵",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——黃巢之亂前後歷時約九年、戰火波及全國，並非只歷時一年即被輕易平定。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"下列關於唐末民變序幕的說法，哪些正確？\n(1) 懿宗時爆發裘甫、龐勛之亂\n(2) 僖宗時王仙芝起事、黃巢率眾響應\n(3) 關東連年水旱為災、激發民變\n(4) 唐末諸帝勵精圖治、民變旋即被弭平",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)","只有(1)、(2)及(3)"],answer:3,explain:"(1)(2)(3)正確；(4)錯誤——懿宗、僖宗昏庸、政治腐敗，民變規模大且歷時久，並非諸帝勵精圖治、旋即弭平。"},
  {topic:"晚唐·唐末民變與黃巢之亂",q:"下列關於黃巢之亂經過的說法，哪些正確？\n(1) 黃巢稱帝後勵精圖治、長治久安\n(2) 黃巢攻陷長安、自稱大齊皇帝\n(3) 僖宗逃四川、召藩鎮勤王並借沙陀兵\n(4) 黃巢部將朱溫降唐、倒戈相向",options:["只有(2)、(3)及(4)","(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(3)及(4)"],answer:0,explain:"(2)(3)(4)正確；(1)錯誤——黃巢終被沙陀兵與降唐的朱溫等擊敗、兵敗自殺，並非稱帝後長治久安。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"黃巢之亂歷時九年、戰火波及全國，對唐室經濟最致命的打擊是？",options:["摧毀關中糧倉","摧殘江淮地區，使唐失去最重要的賦稅來源","令北方人口大增","使海上貿易斷絕"],answer:1,explain:"黃巢之亂波及全國，富甲天下的江淮地區也遭嚴重破壞，唐室最重要的賦稅來源頓失，動搖經濟基礎、加快唐亡。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"黃巢之亂後，黃河以北崛起、據河東的最大強藩是？",options:["宣武朱溫","成德李寶臣","沙陀部李克用","盧龍李懷仙"],answer:2,explain:"黃巢亂後強藩崛起：黃河以北為沙陀部、河東節度使李克用；黃河以南為宣武節度使朱溫，二者打破藩鎮均勢。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"朱溫本為誰的部將，後降唐被僖宗賜名「朱全忠」、封宣武節度使？",options:["李克用","王仙芝","安祿山","黃巢"],answer:3,explain:"朱溫本為黃巢部將，降唐後被僖宗賜名朱全忠、受重用封宣武節度使，最終卻篡唐自立。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"昭宗時，朱全忠應宰相崔胤之請入京，做了甚麼事？",options:["盡殺宦官","盡誅藩鎮","平定黃巢","收復河湟"],answer:0,explain:"昭宗時朱全忠應宰相崔胤之請入京盡殺宦官，繼而弒昭宗、另立哀帝，最終篡位定國號梁。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"朱溫篡位後所定的國號是？",options:["齊","梁","燕","唐"],answer:1,explain:"朱溫弒昭宗、立哀帝後篡位自立、定國號「梁」，唐朝名實俱亡，演成五代十國之局。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"黃巢亂前藩鎮勢力大致均衡，亂後卻出現朱溫、李克用等強藩。這一轉變對唐室的關鍵意義是？",options:["使藩鎮重歸中央control","令唐室國祚延長百年","打破藩鎮間的均勢，是唐室由「亂」變「亡」的關鍵","使藩鎮數目大減"],answer:2,explain:"黃巢亂後強藩兼併崛起、打破藩鎮均勢，無人再能牽制，朱溫終得篡唐，是唐室由「亂」變「亡」的關鍵。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"朱溫由「黃巢部將」到「篡唐建梁」的經歷，最能說明唐末政局的甚麼特徵？",options:["中央集權牢固","藩鎮忠於唐室","宦官保全唐室","中央積弱、須倚賴強藩，反為強藩所篡"],answer:3,explain:"朱溫降唐受重用、終篡唐建梁，反映唐末中央積弱、平亂須倚賴強藩，最終反為強藩所篡而亡。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"下列關於強藩崛起與朱溫篡唐的說法，哪些正確？\n(1) 黃巢亂後沙陀李克用、宣武朱溫等強藩崛起\n(2) 強藩自擅財賦、不受中央節制，中央號令不出長安\n(3) 朱溫盡殺宦官、弒昭宗、立哀帝後篡位定國號梁\n(4) 強藩崛起後唐室中央集權重新鞏固、國勢復振",options:["只有(1)、(2)及(3)","(1)、(2)、(3)及(4)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:0,explain:"(1)(2)(3)正確；(4)錯誤——強藩崛起打破藩鎮均勢、使唐名存實亡，並非令中央集權重新鞏固、國勢復振。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"下列關於黃巢之亂破壞唐室經濟的說法，哪些正確？\n(1) 戰火波及全國、歷時九年\n(2) 東都洛陽於亂後仍有居民數十萬戶\n(3) 亂軍南陷廣州、屠殺蕃商十二萬\n(4) 江淮地區遭嚴重破壞、唐室失去賦稅來源",options:["(1)、(2)、(3)及(4)","只有(1)、(3)及(4)","只有(1)、(2)及(3)","只有(2)、(3)及(4)"],answer:1,explain:"(1)(3)(4)正確；(2)錯誤——亂後洛陽只剩頹垣敗瓦、居民不滿百戶，並非數十萬戶。"},
  {topic:"晚唐·強藩崛起與朱溫篡唐",q:"下列關於朱溫篡唐的說法，哪些正確？\n(1) 朱溫本為黃巢部將、降唐後賜名朱全忠\n(2) 受封宣武節度使、成黃河以南最大強藩\n(3) 朱溫忠於唐室、終身未嘗篡位\n(4) 應宰相崔胤之請入京盡殺宦官",options:["(1)、(2)、(3)及(4)","只有(1)、(2)及(3)","只有(1)、(2)及(4)","只有(2)、(3)及(4)"],answer:2,explain:"(1)(2)(4)正確；(3)錯誤——朱溫弒昭宗、立哀帝後篡位自立、定國號梁，唐名實俱亡，並非終身未嘗篡位。"},
  {topic:"晚唐·延祚原因（政治）",q:"顧炎武《日知錄》謂「弱唐而不亡，諸候維之也」。這最能說明唐室延祚的原因是？",options:["宦官忠心護國","外族大力扶持","君主皆英明神武","藩鎮互相牽制，並無強藩可以獨大"],answer:3,explain:"顧炎武指唐雖弱而不亡，全賴藩鎮互相牽制：跋扈藩鎮無取代中央之力，多數藩鎮仍效忠或互相攻伐，無強藩獨大。"},
  {topic:"晚唐·延祚原因（政治）",q:"安史亂後唐室出現兩度短暫中興，其中憲宗一朝的中興稱為？",options:["元和中興","大中暫治","貞觀之治","開元之治"],answer:0,explain:"憲宗用杜黃裳、李吉甫等主戰大臣、改先弱後強逐個擊破之策削藩，使全國藩鎮名義服從中央，史稱「元和中興」。"},
